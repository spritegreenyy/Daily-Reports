ed parties (refiners) under the RFS.  The RVOs can be met if obligated parties bid up the price of D4 RINs to a", "u": "https://x.com/ScottIrwinUI/status/2072687888966238359", "lk": 6, "rt": 3, "rp": 1, "eng": 10, "lang": "en", "tags": ["commodities", "agri_softs", "academic"]}, {"h": "staunovo", "tier": 1, "b": "commodities", "t": "2026-07-02 15:42", "x": "For 75 years, petroleum has been the energy source that has powered the US more than any other. That’s about to change.\n\nBy the end of the decade, natural gas will likely surpass oil for the first time after the gap all but disappeared in 2025. This seismic shift will end a", "u": "https://x.com/staunovo/status/2072707579709444406", "lk": 6, "rt": 2, "rp": 0, "eng": 8, "lang": "en", "tags": ["commodities", "oil_energy", "sellside"]}, {"h": "HFI_Research", "tier": 1, "b": "commodities", "t": "2026-07-02 17:42", "x": "RT @Jon_Costello_: Refiners are operating in some of the strongest market conditions in their history, but I would not buy their stocks. Th…", "u": "https://x.com/HFI_Research/status/2072737593855480079", "lk": 0, "rt": 3, "rp": 0, "eng": 3, "lang": "en", "tags": ["commodities", "oil_energy", "nat_gas_lng"]}, {"h": "cer_hedge", "tier": 2, "b": "commodities", "t": "2026-07-02 18:22", "x": "#leanhogs- Which do we see next? 81 or 115? This long term continuation chart should be on every #leanhog producer's playbook of risk. A big picture- 6 year #wedge.", "u": "https://x.com/cer_hedge/status/2072747766674055309", "lk": 2, "rt": 0, "rp": 0, "eng": 2, "lang": "en", "tags": ["commodities", "agri_softs", "trader"]}, {"h": "aeberman12", "tier": 1, "b": "commodities", "t": "2026-07-02 10:42", "x": "Bloomberg's \n@mikemcglone11\n never disappoints\n\nNow it's a 7 mmb/d North American oil surplus because higher prices create \"super abundance\"\n\nIf we really had a surplus anywhere close to that, inventories would explode & oil wouldn't be trading anywhere near current prices\n\nRead a", "u": "https://x.com/aeberman12/status/2072631980038951366", "lk": 1, "rt": 0, "rp": 0, "eng": 1, "lang": "en", "tags": ["commodities", "oil_energy", "geology"]}, {"h": "fchollet", "tier": 2, "b": "weather", "t": "2026-07-02 20:30", "x": "Does it mean LLMs / LRMs go away? Not at all. In the short term, they are still the best way to perform intuition guidance (codegen). In the long term, even if they become obsolete for reasoning itself, we will still need models of language in order to communicate with AI systems", "u": "https://x.com/fchollet/status/2072780025968148733", "lk": 29, "rt": 0, "rp": 1, "eng": 30, "lang": "en", "tags": ["ai_semis", "ai_research", "models"]}, {"h": "BenNollWeather", "tier": 1, "b": "weather", "t": "2026-07-02 11:30", "x": "Humidity levels were extreme from New York to D.C. on Thursday morning  — on par with Miami, New Orleans and Houston.\n\nAround 104 million Americans will face oppressive 75-degree dew points (extreme humidity) through Friday.", "u": "https://x.com/BenNollWeather/status/2072643954638503976", "lk": 22, "rt": 6, "rp": 2, "eng": 30, "lang": "en", "tags": ["weather_climate", "enso", "global_weather"]}, {"h": "burgwx", "tier": 1, "b": "weather", "t": "2026-07-02 16:09", "x": "Central Park, NYC is at 96F as of 12pm. Out of all available data from 1950-present, Central Park reached >=96F by 12pm only 6 other times on record. All 6 days peaked at or above 100F in the afternoon.\n\nThe last time Central Park reached 100F was 7/18/2012, almost 14 years ago.", "u": "https://x.com/burgwx/status/2072714292655194125", "lk": 20, "rt": 6, "rp": 0, "eng": 26, "lang": "en", "tags": ["weather_climate", "models", "tropics"]}, {"h": "webberweather", "tier": 1, "b": "weather", "t": "2026-07-03 00:54", "x": "The linked study above (Lubis et al (2024)) created BSISO composites & used a linear baroclinic model and found that the anomalous convection south of Hawaii was the dominant force that drove the Pacific NW heat wave in 2021.\n\nThere are certainly a few similarities to 2021 here", "u": "https://x.com/webberweather/status/2072846496500965418", "lk": 13, "rt": 0, "rp": 5, "eng": 18, "lang": "en", "tags": ["weather_climate", "enso", "tropics"]}, {"h": "BenNollWeather", "tier": 1, "b": "weather", "t": "2026-07-03 05:11", "x": "Learn a little more about this oddball weather statistic in the \n@washingtonpost\n!\n\n\"Of course, weather model forecasts aren’t perfect, but there is enough confidence in them to say that D.C. will be hotter than much of the globe.\"\n\n Gift article", "u": "https://x.com/BenNollWeather/status/2072911091693441293", "lk": 10, "rt": 2, "rp": 1, "eng": 13, "lang": "en", "tags": ["weather_climate", "enso", "global_weather"]}, {"h": "webberweather", "tier": 1, "b": "weather", "t": "2026-07-03 01:44", "x": "Yeah this large scale wave pattern favors troughing in the eastern half of the US. Likely would persist so long as the forcing is there to maintain it. Can see this lingering around until it gets kicked by the GWO.", "u": "https://x.com/webberweather/status/2072858983640285388", "lk": 3, "rt": 1, "rp": 1, "eng": 5, "lang": "en", "tags": ["weather_climate", "enso", "tropics"]}, {"h": "MichaelEMann", "tier": 2, "b": "weather", "t": "2026-07-02 15:21", "x": "Our recent PNAS article (\nhttps://\npnas.org/doi/10.1073/pn\nas.2600021123\n…) quantified how new global temperature records are typically set during calendar year that begins w/ a peaking major El Niño event.\n\nWe can thus predict quite confidently that we will see a new global temperature record in 2027.", "u": "https://x.com/MichaelEMann/status/2072702196886442230", "lk": 2, "rt": 1, "rp": 0, "eng": 3, "lang": "en", "tags": ["weather_climate", "climate_science", "policy"]}, {"h": "PaulRoundy1", "tier": 1, "b": "weather", "t": "2026-07-02 20:51", "x": "Germany should not have shut down their nuclear power plants. Their electricity is needlessly expensive.", "u": "https://x.com/PaulRoundy1/status/2072785192570306725", "lk": 1, "rt": 0, "rp": 1, "eng": 2, "lang": "en", "tags": ["weather_climate", "enso", "mjo"]}, {"h": "climateguyw", "tier": 2, "b": "weather", "t": "2026-07-02 20:29", "x": "On 7/2 #HeatwaveBluestone was closing in on my historic CAT4 level as some Northeast stations were getting near all-time records.  The system should moderate some by the 4th. My criteria: \nhttp://\nguyonclimate.com/2026/05/11/e\n\n@KHayhoe\n \n@KBMcLeodFLA\n \n@WeatherProf\n \n@heathealth_info\n \n@MatthewCappucci", "u": "https://x.com/climateguyw/status/2072779787500658957", "lk": 1, "rt": 1, "rp": 0, "eng": 2, "lang": "en", "tags": ["weather_climate", "climate_science", "communication"]}, {"h": "PaulRoundy1", "tier": 1, "b": "weather", "t": "2026-07-02 20:16", "x": "Labeling climate change as a crisis is political. For scientists who do that, it reduces The credibility of those scientists, and the whole climate Science establishment. Scientists should communicate with the public in objective terms, accurately representing the scale of things", "u": "https://x.com/PaulRoundy1/status/2072776386381828528", "lk": 2, "rt": 0, "rp": 0, "eng": 2, "lang": "en", "tags": ["weather_climate", "enso", "mjo"]}, {"h": "webberweather", "tier": 1, "b": "weather", "t": "2026-07-03 01:43", "x": "It’s hard to say, if this ridge amplifies far enough to the north it is certainly possible. Definitely would be worried about wildfire/heat risks prior to that regardless", "u": "https://x.com/webberweather/status/2072858696917647411", "lk": 1, "rt": 0, "rp": 0, "eng": 1, "lang": "en", "tags": ["weather_climate", "enso", "tropics"]}, {"h": "PaulRoundy1", "tier": 1, "b": "weather", "t": "2026-07-02 18:59", "x": "The recycling problem you cite is true for almost all kinds of new technologies, such a solar power. All forms of Industries have material that will ultimately need to be discarded or otherwise dealt with. But we should be producing. You would silence that.", "u": "https://x.com/PaulRoundy1/status/2072756969933349095", "lk": 0, "rt": 0, "rp": 1, "eng": 1, "lang": "en", "tags": ["weather_climate", "enso", "mjo"]}, {"h": "PaulRoundy1", "tier": 1, "b": "weather", "t": "2026-07-02 18:21", "x": "That kind of extreme adjustment is driven mostly by the El Nino event emerging. It is one of the strongest El Nino emergent signals since the 1870s. I'm not sure why it should terrify anyone, it will result in drought in the lower Amazon and in Indonesia and india.", "u": "https://x.com/PaulRoundy1/status/2072747558842032274", "lk": 0, "rt": 0, "rp": 1, "eng": 1, "lang": "en", "tags": ["weather_climate", "enso", "mjo"]}, {"h": "PaulRoundy1", "tier": 1, "b": "weather", "t": "2026-07-02 14:34", "x": "It seems unlikely now that 100F will be achieved at my home in the capital region of New York. Recent rainfall has raised the humidity and the air thus requires substantially more energy to achieve that high temperature.", "u": "https://x.com/PaulRoundy1/status/2072690444488618383", "lk": 0, "rt": 0, "rp": 1, "eng": 1, "lang": "en", "tags": ["weather_climate", "enso", "mjo"]}, {"h": "PaulRoundy1", "tier": 1, "b": "weather", "t": "2026-07-03 01:11", "x": "Someone who actually spends time in nature should know this.", "u": "https://x.com/PaulRoundy1/status/2072850706910814587", "lk": 0, "rt": 0, "rp": 0, "eng": 0, "lang": "en", "tags": ["weather_climate", "enso", "mjo"]}, {"h": "PaulRoundy1", "tier": 1, "b": "weather", "t": "2026-07-02 23:22", "x": "I'm not saying the information isn't valid, you just lack the context of the rest of it. I'm not saying the reports are wrong, but you could just as easily have fixated on reports of any major new industry construction project.", "u": "https://x.com/PaulRoundy1/status/2072823339194741083", "lk": 0, "rt": 0, "rp": 0, "eng": 0, "lang": "en", "tags": ["weather_climate", "enso", "mjo"]}, {"h": "PaulRoundy1", "tier": 1, "b": "weather", "t": "2026-07-02 20:19", "x": "One could argue that that two or three celsius increase in temperature is the fault of fossil fuel companies, but n   function esc(s){return (s||"").replace(/[&<>]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;"}[c]})}
  function hl(s,q){s=esc(s);if(!q)return s;try{var re=new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");return s.replace(re,"<mark>$1</mark>")}catch(e){return s}}
  function fmt(n){return n>=1000?(n/1000).toFixed(n>=10000?0:1)+"k":""+n}
  function cur(){return DATA[st.date]}
  function jumpHandle(h){$("#q").value="@"+h;st.q="@"+h;$("#clr").style.display="block";st.board="all";buildPills();render();
    $("#stream").scrollIntoView({behavior:"smooth",block:"start"})}

  var dsel=$("#dateSel");
  DATES.forEach(function(d){var o=document.createElement("option");o.value=d;o.textContent=d;dsel.appendChild(o)});
  dsel.value=st.date;
  dsel.onchange=function(){st.date=dsel.value;st.board="all";renderAll()};

  function renderReport(){
    var r=cur().report,m=cur().meta;
    $("#win").textContent=m.window;
    $("#sub").textContent=m.subtitle;
    // insights
    var ih=$("#insights");ih.innerHTML="";
    r.insights.forEach(function(it,i){
      var c=document.createElement("div");c.className="icard";
      c.innerHTML='<h3><span class="inum">'+(i+1)+'</span><span>'+esc(it.title)+'</span></h3>'+
        '<ul>'+it.points.map(function(p){return "<li>"+p+"</li>"}).join("")+'</ul>';
      ih.appendChild(c);
    });
    // sections (board -> subdomain -> viewpoints)
    var sh=$("#sections");sh.innerHTML="";
    r.sections.forEach(function(pair){
      var name=pair[0],subs=pair[1],col=REPC[name]||"#5b8def";
      var box=document.createElement("div");box.className="bsec";
      var nvp=subs.reduce(function(a,s){return a+s[1].length},0);
      var inner=subs.map(function(sd){
        var subn=sd[0],rows=sd[1];
        return '<div class="sub"><div class="subh" style="--sc:'+col+';color:'+col+'">'+esc(subn)+'</div>'+
          rows.map(function(row){
            return '<div class="vp"><span class="vh" data-h="'+esc(row[0].replace("@",""))+'">'+esc(row[0])+'</span>'+
              '<span class="vr">'+esc(row[1])+'</span>'+row[2]+'</div>';
          }).join("")+'</div>';
      }).join("");
      box.innerHTML='<div class="bhead" style="background:'+col+'">'+esc(name)+
        ' <span style="font-weight:500;opacity:.75;font-size:12px">'+subs.length+' 领域 · '+nvp+' 条</span>'+
        '<span class="arrow">▾</span></div><div class="bbody">'+inner+'</div>';
      var bd=box.querySelector(".bbody"),hd=box.querySelector(".bhead");
      hd.onclick=function(){bd.style.display=bd.style.display==="none"?"":"none";
        box.querySelector(".arrow").textContent=bd.style.display==="none"?"▸":"▾"};
      sh.appendChild(box);
    });
    // wire viewpoint handles
    sh.querySelectorAll(".vh").forEach(function(v){v.onclick=function(){jumpHandle(v.dataset.h)}});
    // unique
    var uh=$("#unique");uh.innerHTML="";
    r.unique.forEach(function(u){
      var c=document.createElement("div");c.className="ucard";
      c.innerHTML='<div class="uh" data-h="'+esc(u[0].replace("@",""))+'">'+esc(u[0])+'</div>'+
        '<div class="uv">'+esc(u[1])+'</div><div class="ui">交易含义：'+esc(u[2])+'</div>';
      c.querySelector(".uh").onclick=function(){jumpHandle(u[0].replace("@",""))};
      uh.appendChild(c);
    });
  }

  function buildPills(){
    var tw=cur().tweets,wrap=$("#boardPills");wrap.innerHTML="";
    var counts={all:tw.length};Object.keys(BOARDS).forEach(function(k){counts[k]=0});
    tw.forEach(function(t){counts[t.b]=(counts[t.b]||0)+1});
    function mk(key,label,color){var p=document.createElement("button");p.className="pill";
      p.innerHTML=label+' <span class="cnt">'+(counts[key]||0)+'</span>';
      if(st.board===key){p.setAttribute("data-on","1");p.style.background=color;p.style.borderColor=color}
      p.onclick=function(){st.board=key;buildPills();render()};return p}
    wrap.appendChild(mk("all","全部","#e7b24d"));
    Object.keys(BOARDS).forEach(function(k){wrap.appendChild(mk(k,BOARDS[k].label,BOARDS[k].color))});
  }
  function pass(t){
    if(st.board!=="all"&&t.b!==st.board)return false;
    if(st.tier!=="all"&&(""+t.tier)!==st.tier)return false;
    if(st.lang!=="all"&&t.lang!==st.lang)return false;
    if(st.q){var q=st.q.toLowerCase();if((t.x+" @"+t.h).toLowerCase().indexOf(q)<0)return false}
    return true}
  function render(){
    var m=cur().meta,tw=cur().tweets.filter(pass);
    tw.sort(function(a,b){return st.sort==="hot"?b.eng-a.eng:(a.t<b.t?1:-1)});
    var kol=new Set(tw.map(function(t){return t.h})).size;
    $("#tstat").innerHTML='当前显示 <b>'+tw.length+'</b> / '+m.n_tweets+' 条 · <b>'+kol+'</b> 位 KOL · 监测 '+m.n_accounts+' 账号';
    var s=$("#stream");
    if(!tw.length){s.innerHTML='<div class="empty">没有匹配的推文 —— 换个词或点「重置」。</div>';return}
    s.innerHTML="";
    tw.forEach(function(t){
      var B=BOARDS[t.b]||{short:"其他",color:"#5b8def"};
      var c=document.createElement("div");c.className="card";c.tabIndex=0;c.style.setProperty("--bc",B.color);
      var tags=(t.tags||[]).map(function(x){return '<span class="tag" data-tag="'+esc(x)+'">'+esc(x)+'</span>'}).join("");
      c.innerHTML='<div class="chead"><span class="hand" data-h="'+esc(t.h)+'">@'+esc(t.h)+'</span>'+
        '<span class="bchip" style="background:'+B.color+'">'+B.short+'</span>'+
        (t.tier===1?'<span class="t1">一线</span>':'')+'<span class="lang">'+(t.lang==="zh"?"中":"EN")+'</span>'+
        '<span class="time mono">'+esc(t.t)+'</span></div>'+
        '<div class="cbody">'+hl(t.x,st.q)+'</div>'+
        '<div class="cfoot"><span class="eng mono"><span>♥ '+fmt(t.lk)+'</span><span>⟲ '+fmt(t.rt)+'</span><span>💬 '+fmt(t.rp)+'</span></span>'+
        '<span class="tags">'+tags+'</span><span class="open">打开 ↗</span></div>';
      var body=c.querySelector(".cbody");
      requestAnimationFrame(function(){if(body.scrollHeight>body.clientHeight+4){body.classList.add("clamp");
        var mm=document.createElement("span");mm.className="more";mm.textContent="展开全文 ▾";body.after(mm);
        mm.onclick=function(e){e.stopPropagation();body.classList.toggle("open");body.classList.toggle("clamp");
          mm.textContent=body.classList.contains("open")?"收起 ▴":"展开全文 ▾"}}});
      c.onclick=function(){window.open(t.u,"_blank","noopener")};
      c.onkeydown=function(e){if(e.key==="Enter")window.open(t.u,"_blank","noopener")};
      c.querySelector(".hand").onclick=function(e){e.stopPropagation();jumpHandle(t.h)};
      c.querySelectorAll(".tag").forEach(function(tg){tg.onclick=function(e){e.stopPropagation();
        $("#q").value=tg.dataset.tag;st.q=tg.dataset.tag;$("#clr").style.display="block";render()}});
      s.appendChild(c);
    });
  }
  function renderAll(){renderReport();buildPills();render()}

  var qi=$("#q"),clr=$("#clr");
  qi.oninput=function(){st.q=qi.value.trim();clr.style.display=qi.value?"block":"none";render()};
  clr.onclick=function(){qi.value="";st.q="";clr.style.display="none";qi.focus();render()};
  document.addEventListener("keydown",function(e){
    if(e.key==="/"&&document.activeElement!==qi){e.preventDefault();qi.focus()}
    if(e.key==="Escape"&&document.activeElement===qi){qi.value="";st.q="";clr.style.display="none";render()}});
  function seg(id,key){var el=$(id);el.querySelectorAll("button").forEach(function(b){b.onclick=function(){
    el.querySelectorAll("button").forEach(function(x){x.removeAttribute("data-on")});b.setAttribute("data-on","1");st[key]=b.dataset.v;render()}})}
  seg("#sortSeg","sort");seg("#tierSeg","tier");seg("#langSeg","lang");
  $("#reset").onclick=function(){st.board="all";st.tier="all";st.lang="all";st.sort="hot";st.q="";qi.value="";clr.style.display="none";
    [["#sortSeg","hot"],["#tierSeg","all"],["#langSeg","all"]].forEach(function(p){var el=$(p[0]);
      el.querySelectorAll("button").forEach(function(x){x.setAttribute("data-on",x.dataset.v===p[1]?"1":"")})});
    buildPills();render()};
  renderAll();
})();
</script>
</div>
</body>
</html>
