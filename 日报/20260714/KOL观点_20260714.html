ts to core CPI, and whether the core CPI index lands near the market consensus of <b class=\"em\">336.93</b>. <span style=\"color:#8fa0b3\">Trading implication: If core CPI exceeds expectations, it will strengthen the probability of a rate hike and weigh on risk assets; if below expectations, it may ease tightening pressures.</span>"], ["@elerianm", "Macro Economist", "Fed Chair Warsh's reform agenda shows he is seriously pushing for central bank transformation, not just in professional capability but also involving deep adjustments to governance structure and policy framework. <span style=\"color:#8fa0b3\">Trading implication: Warsh's reform direction may alter the Fed's reaction function, increasing uncertainty in future policy paths.</span>"], ["@biancoresearch", "", "Fed funds futures show a <b class=\"em\">45%</b> probability of a rate hike on <b class=\"em\">7</b>th month <b class=\"em\">29</b>th (<b class=\"em\">55%</b> hold steady). Tomorrow's CPI and Warsh testimony will set the tone. If the Fed panics and hikes, it may instead curb yield increases, creating a 'panic ends panic' trading logic. <span style=\"color:#8fa0b3\">Trading implication: If the rate hike expectation materializes, short-term rate upside risk is released, but beware of the long-side logic being weakened if inflation expectations do not fall in tandem.</span>"]]], ["Macroeconomics", [["@AndreasSteno", "", "Although the current market state bypasses old constraints, by the time of the <b class=\"em\">10</b>th month/<b class=\"em\">11</b>th month midterm elections, mathematical laws will re-emerge, and pressures may erupt in a concentrated manner. <span style=\"color:#8fa0b3\">Trading implication: The window before the midterm elections may be the last respite for risk assets; volatility hedging should be arranged in advance.</span>"]]]]], ["Geopolitics", [["Middle East", [["@tparsi", "Iran Expert", "Trump imposes a <b class=\"em\">20%</b> transit fee on every oil tanker, while Iran originally planned only <b class=\"em\">1</b><b class=\"em\">-2%</b> (of cargo value). This is essentially an upgraded economic blockade that will significantly raise shipping costs. <span style=\"color:#8fa0b3\">Trading implication: If implemented, oil prices and shipping insurance rates will surge simultaneously, exacerbating inflationary pressures.</span>"], ["@shashj", "", "The UK Home Secretary announced that Iran's Islamic Revolutionary Guard Corps (IRGC) is designated as a national security threat, and new powers are used to ban support for it, further isolating Iran diplomatically. <span style=\"color:#8fa0b3\">Trading implication: May trigger retaliatory measures from Iran, increasing risks to Middle East shipping and energy supply.</span>"], ["@james_acton32", "", "The US-Iran nuclear deal memorandum of understanding collapsed due to vague terms; the core disagreement is over control of the Strait of Hormuz, not the nuclear program itself. <span style=\"color:#8fa0b3\">Trading implication: Vagueness makes the agreement fragile; any future new agreement will require clearer enforcement mechanisms.</span>"]]], ["Other Geopolitics", [["@joshua_landis", "", "Syrian activists thank al-Shara for overthrowing the Assad regime but worry he may repeat oppression, lack anti-corruption checks, and hold power long-term. <span style=\"color:#8fa0b3\">Trading implication: Uncertainty in Syria's political transition may delay reconstruction and foreign capital inflows.</span>"]]]]], ["Commodities", [["Crude Oil", [["@PeterL Brandt", "", "The current WTI crude pattern can be seen as an inverse head and shoulders bottom; if it breaks below Monday's low, the pattern is invalidated. <span style=\"color:#8fa0b3\">Trading implication: The head and shoulders bottom is a reversal signal, but requires a close confirmation; otherwise, the long-side logic is invalid.</span>"], ["@tparsi", "Iran Expert", "Trump proposes charging Iranian ships a <b class=\"em\">20%</b> fee, far higher than Iran's original <b class=\"em\">1</b><b class=\"em\">-2%</b> transit fee, potentially altering the cost structure of tanker passage. <span style=\"color:#8fa0b3\">Trading implication: If implemented, the surge in tanker transit costs will push up crude transport costs, indirectly supporting oil prices.</span>"]]], ["Metals", [["@Ole_S_Hansen", "Saxo Bank, Commodity Strategy", "As Brent crude approaches <b class=\"em\">$85</b>, gold stops falling and returns above <b class=\"em\">$4000</b>, with the traditional negative correlation loosening. <span style=\"color:#8fa0b3\">Trading implication: If the negative correlation continues to weaken, gold may no longer be suppressed by oil prices and could strengthen independently.</span>"]]]]], ["Weather & Climate", []], ["AI & Semiconductors", []]]}, "tweets": [{"h": "RaoulGMI", "tier": 1, "b": "macro", "t": "2026-07-13 17:34", "x_zh": "加密货币并非为我们所来自的时代而发明。当中本聪推出比特币时，我们以为是在构建对冲银行的工具。数字黄金，为无法接触银行的人类提供的无需许可的货币。这些都没错。但人类发现它很难。密钥、托管、用户体验……这些都不简单。", "x_en": "Crypto wasn’t invented for the age we came from.\n\nWhen Satoshi launched Bitcoin, we thought we were building a hedge against banks. Digital gold, permissionless money for humans who couldn't access banks.\n\nAll true. But the humans found it hard. Keys, custody, UX... none of it", "u": "https://x.com/RaoulGMI/status/2076721878345920824", "lk": 1653, "rt": 197, "rp": 158, "eng": 2008, "lang": "en", "tags": ["macro", "crypto", "long_cycle"]}, {"h": "PeterLBrandt", "tier": 1, "b": "macro", "t": "2026-07-13 20:25", "x_zh": "这可以被视为一个倒头肩底形态。收盘跌破周一低点将否定$CL_F。", "x_en": "This could be considered an inverted H&S bottom. A close below Monday's low would negate $CL_F", "u": "https://x.com/PeterLBrandt/status/2076764928254554530", "lk": 242, "rt": 15, "rp": 63, "eng": 320, "lang": "en", "tags": ["commodities", "technical", "trader"]}, {"h": "WarrenPies", "tier": 1, "b": "macro", "t": "2026-07-14 00:31", "x_zh": "6月CPI正变得关键（沃勒讲话）。以下是明天早上需要关注的几点：1）机票和住宿会发生什么？这些最近是核心CPI的主要贡献因素。2）关注核心CPI指数相对于共识（336.93）落在何处。", "x_en": "June CPI is shaping up to be pivotal (Waller speech).\n\nHere are a couple things to watch tomorrow morning:\n\n1) What happens w/ Airfare + Logging? These have been two big contributors to core cpi recently.\n2) Watch where the Core CPI Index lands relative to consensus (336.93).", "u": "https://x.com/WarrenPies/status/2076826904670220767", "lk": 226, "rt": 20, "rp": 57, "eng": 303, "lang": "en", "tags": ["macro", "oil_energy", "cycle"]}, {"h": "elerianm", "tier": 1, "b": "macro", "t": "2026-07-13 17:45", "x_zh": "这份来自美联储网站的名单应该让人毫不怀疑，其新任主席凯文·沃什对改革、转型和增强这个世界上最强大的央行是认真的。这不仅仅关乎卓越的专业知识、经验和声誉。", "x_en": "This list, from the Federal Reserve’s website, should leave no doubt that its new Chair, Kevin Warsh, is serious about reforming, transforming, and enhancing the world’s most powerful central bank.\nIt’s not just about the exceptional expertise, experience, and reputation of the", "u": "https://x.com/elerianm/status/2076724588478673246", "lk": 210, "rt": 38, "rp": 47, "eng": 295, "lang": "en", "tags": ["macro", "central_banks", "teacher_required"]}, {"h": "biancoresearch", "tier": 1, "b": "macro", "t": "2026-07-14 02:03", "x_zh": "联邦基金期货显示月底（7月29日）加息概率为45%！（55%不加息）。明天早上的CPI报告和沃什的证词将决定这一点。——“当美联储开始恐慌时，我可以停止恐慌。”加息会阻止收益率上升；支持它。", "x_en": "1/5\n\nThe fed funds futures have a  HIKE at the end of the month (July 29) at 45%! (55% no move)\n\nTomorrow morning's CPI report and Warsh's testimony will decide it.\n--\n \"When the Fed starts panicking, I can stop panicking.\"\n\nA hike stops rising yields; root for it.", "u": "https://x.com/biancoresearch/status/2076850117060034650", "lk": 162, "rt": 23, "rp": 47, "eng": 232, "lang": "en", "tags": ["macro", "rates_fx", "bonds"]}, {"h": "RaoulGMI", "tier": 1, "b": "macro", "t": "2026-07-13 16:27", "x_zh": "太棒了……有《死亡幻觉》的感觉。“死亡还不够”我认为是今年关键的艺术系列之一。", "x_en": "So so good... giving Donny Darko vibes. \"Dying is not enough\" I think is one of the key art series this year", "u": "https://x.com/RaoulGMI/status/2076705174702198882", "lk": 114, "rt": 13, "rp": 11, "eng": 138, "lang": "en", "tags": ["macro", "crypto", "long_cycle"]}, {"h": "unusual_whales", "tier": 2, "b": "macro", "t": "2026-07-14 03:58", "x_zh": "好市多故意支付远高于零售平均水平的时薪给小时工，将年离职率降至约7%到8%，而行业平均水平接近60%。了解更多：", "x_en": "Costco deliberately pays hourly workers well above the retail average, driving turnover down to roughly 7 to 8 percent a year versus an industry average near 60 percent.\n\nRead more:", "u": "https://x.com/unusual_whales/status/2076878854799675593", "lk": 109, "rt": 9, "rp": 8, "eng": 126, "lang": "en", "tags": ["macro", "options_flow", "trader"]}, {"h": "AndreasSteno", "tier": 1, "b": "macro", "t": "2026-07-13 20:36", "x_zh": "看看这能持续多久会很有趣。尽管绕过了旧数学，但在10月/11月左右——中期选举时机——情况会变得糟糕。", "x_en": "Will be interesting to see how long this ca last. Despite bypassing the old math gets ugly in October / November ish - midterms timing", "u": "https://x.com/AndreasSteno/status/2076767711233749352", "lk": 84, "rt": 5, "rp": 25, "eng": 114, "lang": "en", "tags": ["macro", "rates_fx", "cross_asset"]}, {"h": "biancoresearch", "tier": 1, "b": "macro", "t": "2026-07-14 02:03", "x_zh": "美联储应该加息吗？\n\n我认为描述当前时期的短语就在这张图的顶部\n\n“当美联储开始恐慌时，我可以停止恐慌”\n\n顶部面板是10年期通胀盈亏平衡率，底部面板是10年期收益率\n\n红色区域", "x_en": "5/5\n\nShould the Fed raise rates?\n\nI think the phrase that describes this period is at the top of this chart\n\n\"When the Fed starts panicking, I can stop panicking\"\n\nThe top panel is the 10-year inflation break-even rate, and the bottom panel is the 10-year yield\n\nThe red area", "u": "https://x.com/biancoresearch/status/2076850128913101019", "lk": 49, "rt": 6, "rp": 13, "eng": 68, "lang": "en", "tags": ["macro", "rates_fx", "bonds"]}, {"h": "SantiagoAuFund", "tier": 1, "b": "macro", "t": "2026-07-14 03:43", "x_zh": "我绝对能做到…", "x_en": "I could definitely do it…", "u": "https://x.com/SantiagoAuFund/status/2076875183130914971", "lk": 21, "rt": 1, "rp": 5, "eng": 27, "lang": "en", "tags": ["macro", "rates_fx", "dollar"]}, {"h": "SamRo", "tier": 2, "b": "macro", "t": "2026-07-13 23:28", "x_zh": "“相对较低的死亡风险”对我来说意味着我永生概率相对较高", "x_en": "“lower relative risk of dying” to me means my odds of living forever is relatively high", "u": "https://x.com/SamRo/status/2076810938900971587", "lk": 11, "rt": 0, "rp": 0, "eng": 11, "lang": "en", "tags": ["macro", "equities", "data"]}, {"h": "tparsi", "tier": 2, "b": "geopolitics", "t": "2026-07-13 14:50", "x_zh": "特朗普似乎刚刚为伊朗的收费系统做了宣传。:)\n\n因为伊朗人原本要对每艘船收取100万美元，这相当于油轮货物价值的1-2%。\n\n但特朗普要收取20%！:)", "x_en": "Seems like Trump just made a pitch for the Iranian toll system. :)\n\nBecause the Iranians were going to charge $1mn per ship, which would amount to 1-2% of the value of the cargo of an oil tanker. \n\nBut Trump is going to charge 20%! :)", "u": "https://x.com/tparsi/status/2076680654218018946", "lk": 5400, "rt": 1400, "rp": 481, "eng": 7281, "lang": "en", "tags": ["geopolitics", "middle_east", "diplomacy"]}, {"h": "Ole_S_Hansen", "tier": 1, "b": "geopolitics", "t": "2026-07-14 06:26", "x_zh": "有趣的是，随着#布伦特原油最新一波上涨逼近85美元，#黄金停止了下跌。相反，金条找到了新的买盘兴趣，重新攀升至4000美元上方。虽然石油和黄金之间传统的负相关关系似乎正在减弱，但现在下结论还为时过早", "x_en": "Interestingly, as #Brent made its latest push towards USD 85, #gold stopped falling. Instead, bullion found renewed buying interest, climbing back above USD 4,000. While the traditionally inverse relationship between oil and gold appears to be softening, it is still too early to", "u": "https://x.com/Ole_S_Hansen/status/2076916341924098222", "lk": 70, "rt": 14, "rp": 3, "eng": 87, "lang": "en", "tags": ["commodities", "cross_commodity", "sellside"]}, {"h": "shashj", "tier": 1, "b": "geopolitics", "t": "2026-07-13 14:19", "x_zh": "“内政大臣沙巴纳·马哈茂德宣布，伊朗伊斯兰革命卫队（IRGC）将被认定为国家安全威胁。马哈茂德将利用新的政府权力禁止对该组织的支持”", "x_en": "“Home Secretary Shabana Mahmood has announced Iran's Islamic Revolutionary Guard Corps (IRGC) will be designated a threat to national security. Mahmood will use new government powers to ban support for the group”", "u": "https://x.com/shashj/status/2076672913567105092", "lk": 55, "rt": 16, "rp": 1, "eng": 72, "lang": "en", "tags": ["geopolitics", "defense", "europe"]}, {"h": "SangerNYT", "tier": 2, "b": "geopolitics", "t": "2026-07-13 17:30", "x_zh": "一个非凡且不太可能的故事，由@MarkMazzettiNYT @farnazfassihi @ronenbergman @julianbarnes精彩讲述", "x_en": "A remarkable, unlikely tale, told wonderfully by \n@MarkMazzettiNYT\n \n@farnazfassihi\n \n@ronenbergman\n \n@julianbarnes", "u": "https://x.com/SangerNYT/status/2076721037287604415", "lk": 13, "rt": 6, "rp": 0, "eng": 19, "lang": "en", "tags": ["geopolitics", "national_security", "technology"]}, {"h": "james_acton32", "tier": 2, "b": "geopolitics", "t": "2026-07-13 19:02", "x_zh": "我认为，对美伊谅解备忘录的批评相当站得住脚。我的关注点是备忘录对核计划的处理，而非霍尔木兹海峡，但我的观点——模糊性的问题——解释了备忘录为何因海峡控制权而崩溃", "x_en": "This critique of the U.S.-Iran MOU held up pretty well, I think. My focus was on the MOU's handling of the nuclear program, not the Strait of Hormuz, but my point--the problem of vagueness--explains why the MOU collapsed over control of the Strait.", "u": "https://x.com/james_acton32/status/2076743967039713297", "lk": 4, "rt": 1, "rp": 0, "eng": 5, "lang": "en", "tags": ["geopolitics", "nuclear", "arms_control"]}, {"h": "DerekJGrossman", "tier": 1, "b": "geopolitics", "t": "2026-07-14 05:12", "x_zh": "被赶下台的孟加拉国前总理谢赫·哈西娜若从印度的自我流放中返回，将面临监禁，一名高级官员周一表示。此前数日，哈西娜告诉路透社她计划12月回国并向法院自首。", "x_en": "\"Ousted Bangladeshi Prime Minister Sheikh Hasina will be jailed if she returns from self-imposed exile in India, a senior official said on Monday, ​days after Hasina told Reuters she planned to go back in December ‌and surrender to a court.\"\n\nhttps://\nreuters.com/world/asia-pac\nific/ousted-pm-hasina-faces-prison-return-bangladesh-minister-says-2026-07-13/\n…", "u": "https://x.com/DerekJGrossman/status/2076897604093591835", "lk": 4, "rt": 0, "rp": 0, "eng": 4, "lang": "en", "tags": ["geopolitics", "indo_pacific", "security"]}, {"h": "joshua_landis", "tier": 2, "b": "geopolitics", "t": "2026-07-13 18:16", "x_zh": "她曾为自由和平等而战。@Loubnamrie 像许多叙利亚人一样，感谢沙拉推翻阿萨德政权。她也持批评态度，因为她担心沙拉会转而压迫叙利亚人，未能建立反腐保障措施，并紧握权力不放。", "x_en": "She was fighting for freedom and equality. \n@Loubnamrie\n, like many Syrians is grateful to Sharaa for bringing down the Assad regime. She is also critical because she fears that Sharaa will oppress Syrians in his turn, fail to set up safeguards against corruption, and hang onto \nhttps://\nx.com/farhorizon11/s\n/farhorizon11/status/2076699015438037397\n…", "u": "https://x.com/joshua_landis/status/2076732615864803556", "lk": 2, "rt": 0, "rp": 1, "eng": 3, "lang": "en", "tags": ["geopolitics", "middle_east", "syria"]}, {"h": "chigrl", "tier": 1, "b": "commodities", "t": "2026-07-13 21:57", "x_zh": "显然我们要对这种情况采取焦土政策……应该没问题。", "x_en": "Apparently we are going scorched Earth on this situation ...it should be fine", "u": "https://x.com/chigrl/status/2076788094905229353", "lk": 138, "rt": 5, "rp": 4, "eng": 147, "lang": "en", "tags": ["commodities", "oil_energy", "metals"]}, {"h": "danielnewmanUV", "tier": 2, "b": "ai_semis", "t": "2026-07-13 21:17", "x_zh": "好吧，如果 $IREN 周五前跌破35，这将是我最大的AI GPU REIT持仓，我有点希望它发生。", "x_en": "Well, if \n$IREN\n falls below 35 by Friday it will be my biggest AI GPU REIT position and I’m kind of hoping it happens.", "u": "https://x.com/danielnewmanUV/status/2076778064965476624", "lk": 157, "rt": 0, "rp": 40, "eng": 197, "lang": "en", "tags": ["ai_semis", "enterprise_tech", "semiconductors"]}, {"h": "bgurley", "tier": 2, "b": "ai_semis", "t": "2026-07-14 06:39", "x_zh": "对于政策，人们往往认为“行动”的想法很重要。但政策选择常常失败，甚至产生与担忧相反的结果。在没有高成功把握的情况下“行动”只是狂躁的折腾（和花钱），而且很可能让事情变得更糟。", "x_en": "With policy people tend to think of the “idea” of action as important. But often the policy choice fails or even creates the opposite outcome of the concern. “Acting” without high confidence of success is just manic thrashing (& spending). And will likely make things worse.", "u": "https://x.com/bgurley/status/2076919571165147567", "lk": 34, "rt": 4, "rp": 2, "eng": 40, "lang": "en", "tags"   function renderReport(){
    var r=report(),m=cur().meta;
    $("#win").textContent=uiLang==="en"?m.window_en:m.window_zh; $("#sub").textContent=uiLang==="en"?m.subtitle_en:m.subtitle_zh;
    var ih=$("#insights");ih.innerHTML=""; r.insights.forEach(function(it,i){var c=document.createElement("div");c.className="icard";c.innerHTML='<h3><span class="inum">'+(i+1)+'</span><span>'+it.title+'</span></h3><ul>'+it.points.map(function(p){return "<li>"+p+"</li>"}).join("")+'</ul>';ih.appendChild(c)});
    var sh=$("#sections");sh.innerHTML="";
    r.sections.forEach(function(pair){
      var name=pair[0],subs=pair[1],col=REPC[name]||"#5b8def",nvp=subs.reduce(function(a,s){return a+s[1].length},0);
      var inner=subs.map(function(sd){return '<div class="subg"><div class="subh" style="--sc:'+col+';color:'+col+'">'+sd[0]+'</div>'+sd[1].map(function(row){return '<div class="vp"><span class="vh" data-h="'+esc(row[0].replace("@",""))+'">'+row[0]+'</span>'+(row[1]?'<span class="vr">'+row[1]+'</span>':'')+row[2]+'</div>'}).join("")+'</div>'}).join("");
      var box=document.createElement("div");box.className="bsec";box.innerHTML='<div class="bhead" style="background:'+col+'">'+name+' <span style="font-weight:500;opacity:.75;font-size:12px">'+subs.length+' '+tx("domains")+' · '+nvp+' '+tx("items")+'</span><span class="arrow">▾</span></div><div class="bbody">'+inner+'</div>';
      var bd=box.querySelector(".bbody"),hd=box.querySelector(".bhead"); hd.onclick=function(){bd.style.display=bd.style.display==="none"?"":"none";box.querySelector(".arrow").textContent=bd.style.display==="none"?"▸":"▾"}; sh.appendChild(box);
    });
    sh.querySelectorAll(".vh").forEach(function(v){v.onclick=function(){jumpHandle(v.dataset.h)}});
    var uh=$("#unique");uh.innerHTML=""; r.unique.forEach(function(u){var c=document.createElement("div");c.className="ucard";c.innerHTML='<div class="uh" data-h="'+esc(u[0].replace("@",""))+'">'+u[0]+'</div><div class="uv">'+u[1]+'</div><div class="ui">'+tx("meaning")+u[2]+'</div>';c.querySelector(".uh").onclick=function(){jumpHandle(u[0].replace("@",""))};uh.appendChild(c)});
  }
  function buildPills(){
    var tw=cur().tweets,wrap=$("#boardPills");wrap.innerHTML=""; var counts={all:tw.length};Object.keys(BOARDS).forEach(function(k){counts[k]=0}); tw.forEach(function(t){counts[t.b]=(counts[t.b]||0)+1});
    function mk(key,label,color){var p=document.createElement("button");p.className="pill";p.innerHTML=label+' <span class="cnt">'+(counts[key]||0)+'</span>';if(st.board===key){p.setAttribute("data-on","1");p.style.background=color;p.style.borderColor=color} p.onclick=function(){st.board=key;buildPills();render()};return p}
    wrap.appendChild(mk("all",tx("all"),"#e7b24d")); Object.keys(BOARDS).forEach(function(k){wrap.appendChild(mk(k,boardLabel(k),BOARDS[k].color))});
  }
  function pass(t){
    if(st.board!=="all"&&t.b!==st.board)return false;
    if(st.tier!=="all"&&(""+t.tier)!==st.tier)return false;
    if(st.lang!=="all"&&t.lang!==st.lang)return false;
    if(st.q){var q=st.q.toLowerCase(); var hay=(bodyOf(t)+" "+(t.x_zh||"")+" "+(t.x_en||"")+" @"+t.h+" "+(t.tags||[]).join(" ")).toLowerCase(); if(hay.indexOf(q)<0)return false}
    return true
  }
  function render(){
    var m=cur().meta,tw=cur().tweets.filter(pass); tw.sort(function(a,b){return st.sort==="hot"?b.eng-a.eng:(a.t<b.t?1:-1)});
    var kol=new Set(tw.map(function(t){return t.h})).size; $("#tstat").innerHTML=tx("show")+' <b>'+tw.length+'</b> / '+m.n_tweets+' · <b>'+kol+'</b> '+tx("kols")+' · '+tx("monitor")+' '+m.n_accounts+' '+tx("accounts");
    var s=$("#stream"); if(!tw.length){s.innerHTML='<div class="empty">'+tx("empty")+'</div>';return} s.innerHTML="";
    tw.forEach(function(t){
      var B=BOARDS[t.b]||{color:"#5b8def"}, body=bodyOf(t), tags=(t.tags||[]).map(function(x){return '<span class="tag" data-tag="'+esc(x)+'">'+esc(x)+'</span>'}).join("");
      var c=document.createElement("div"); c.className="card"; c.tabIndex=0; c.style.setProperty("--bc",B.color);
      c.innerHTML='<div class="chead"><span class="hand" data-h="'+esc(t.h)+'">@'+esc(t.h)+'</span><span class="bchip" style="background:'+B.color+'">'+boardShort(t.b)+'</span>'+(t.tier===1?'<span class="t1">'+tx("tier1")+'</span>':'')+'<span class="lang">'+(t.lang==="zh"?tx("langZh"):tx("langEn"))+'</span><span class="time mono">'+esc(t.t)+'</span></div><div class="cbody">'+hl(body,st.q)+'</div><div class="cfoot"><span class="eng mono"><span>♥ '+fmt(t.lk)+'</span><span>⟲ '+fmt(t.rt)+'</span><span>💬 '+fmt(t.rp)+'</span></span><span class="tags">'+tags+'</span><span class="open">'+tx("open")+'</span></div>';
      var bodyEl=c.querySelector(".cbody"); requestAnimationFrame(function(){if(bodyEl.scrollHeight>bodyEl.clientHeight+4){bodyEl.classList.add("clamp"); var mm=document.createElement("span"); mm.className="more"; mm.textContent=tx("more"); bodyEl.after(mm); mm.onclick=function(e){e.stopPropagation();bodyEl.classList.toggle("open");bodyEl.classList.toggle("clamp");mm.textContent=bodyEl.classList.contains("open")?tx("less"):tx("more")}}});
      c.onclick=function(){window.open(t.u,"_blank","noopener")}; c.onkeydown=function(e){if(e.key==="Enter")window.open(t.u,"_blank","noopener")};
      c.querySelector(".hand").onclick=function(e){e.stopPropagation();jumpHandle(t.h)}; c.querySelectorAll(".tag").forEach(function(tg){tg.onclick=function(e){e.stopPropagation();$("#q").value=tg.dataset.tag;st.q=tg.dataset.tag;$("#clr").style.display="block";render()}});
      s.appendChild(c);
    })
  }
  function renderAll(){syncUi();renderReport();buildPills();render()}
  var qi=$("#q"),clr=$("#clr"); qi.oninput=function(){st.q=qi.value.trim();clr.style.display=qi.value?"block":"none";render()}; clr.onclick=function(){qi.value="";st.q="";clr.style.display="none";qi.focus();render()};
  document.addEventListener("keydown",function(e){if(e.key==="/"&&document.activeElement!==qi){e.preventDefault();qi.focus()} if(e.key==="Escape"&&document.activeElement===qi){qi.value="";st.q="";clr.style.display="none";render()}});
  function seg(id,key){var el=$(id);el.querySelectorAll("button").forEach(function(b){b.onclick=function(){el.querySelectorAll("button").forEach(function(x){x.removeAttribute("data-on")});b.setAttribute("data-on","1");st[key]=b.dataset.v;render()}})}
  seg("#sortSeg","sort"); seg("#tierSeg","tier"); seg("#langSeg","lang");
  $("#reset").onclick=function(){st.board="all";st.tier="all";st.lang="all";st.sort="hot";st.q="";qi.value="";clr.style.display="none";[["#sortSeg","hot"],["#tierSeg","all"],["#langSeg","all"]].forEach(function(p){var el=$(p[0]);el.querySelectorAll("button").forEach(function(x){x.setAttribute("data-on",x.dataset.v===p[1]?"1":"")})});buildPills();render()};
  app.querySelectorAll(".langsw button").forEach(function(b){b.onclick=function(){uiLang=b.dataset.lang;renderAll()}});
  renderAll();
})();
</script>
</div>
