SpaceX表示其未来市场90%以上是AI，而非太空。\n@DMaguireARK\n，ACA解读了这意味着什么：轨道数据中心、潜在28.5万亿美元的总可寻址市场（TAM），以及为什么星舰是唯一能实现这一目标的运载工具。", "u": "https://x.com/ARKInvest/status/2074594301493874896", "lk": 1350, "rt": 240, "rp": 146, "eng": 1736, "lang": "en", "tags": ["macro", "equities", "innovation"]}, {"h": "WarrenPies", "tier": 1, "b": "macro", "t": "2026-07-07 19:44", "x": "石油\n\n管理基金空头头寸>40%（15年来第三高读数）+创纪录的裂解价差=坚实底部的配方。\n\n问题是反弹幅度会有多大？", "u": "https://x.com/WarrenPies/status/2074580307378835588", "lk": 358, "rt": 65, "rp": 30, "eng": 453, "lang": "en", "tags": ["macro", "oil_energy", "cycle"]}, {"h": "MichaelAArouet", "tier": 2, "b": "macro", "t": "2026-07-07 11:05", "x": "以英国为例。2025年因百万富翁和亿万富翁移民而损失的所得税约为60亿英镑。平均每个纳税人缴纳了8270英镑。\n\n仅在2025年，英国就损失了相当于72.5万人的税收，这些人现在需要承担这笔账单。\n\n明白了吗？", "u": "https://x.com/MichaelAArouet/status/2074449732819165254", "lk": 223, "rt": 70, "rp": 23, "eng": 316, "lang": "en", "tags": ["macro", "economics", "data"]}, {"h": "MichaelAArouet", "tier": 2, "b": "macro", "t": "2026-07-07 14:19", "x": "性别薪酬差距是众多左翼叙事之一，仔细审视后，这些叙事完全是天方夜谭。\n\n为什么左翼不断提出这种可笑的说法？如果公司可以合法地支付女性低于男性的工资，它们就会只雇佣女性以提高利润。", "u": "https://x.com/MichaelAArouet/status/2074498556195459548", "lk": 230, "rt": 44, "rp": 30, "eng": 304, "lang": "en", "tags": ["macro", "economics", "data"]}, {"h": "M_McDonough", "tier": 2, "b": "macro", "t": "2026-07-07 12:31", "x": "霍尔木兹海峡交通正在恢复，但反弹势头正在减弱。\n\n最新24小时商业通行量：总计16艘——4艘东向西/12艘西向东。这低于昨天的25艘，远低于6月24日反弹高点时的57艘，且仅为1-2月运行率的约14%。\n\n布伦特原油报72.58美元，表明石油", "u": "https://x.com/M_McDonough/status/2074471351541211601", "lk": 207, "rt": 72, "rp": 6, "eng": 285, "lang": "en", "tags": ["macro", "economics", "data"]}, {"h": "PeterLBrandt", "tier": 1, "b": "macro", "t": "2026-07-08 00:09", "x": "好吧，那这样\n我往账户里存入2000美元\n你用你的系统交易\n利润分你一半\n你没有任何风险\n这叫“要么拿出行动，要么闭嘴”帖", "u": "https://x.com/PeterLBrandt/status/2074647139079323998", "lk": 160, "rt": 6, "rp": 34, "eng": 200, "lang": "en", "tags": ["commodities", "technical", "trader"]}, {"h": "elerianm", "tier": 1, "b": "macro", "t": "2026-07-08 05:52", "x": "布伦特原油目前交易在70多美元中段，WTI在70美元以上。（彭博数据如下）。\n此时亚洲交易员正在对美国和伊朗之间最新一轮交火做出反应。\n市场的主流观点是，这次最新升级将保持可控。虽然", "u": "https://x.com/elerianm/status/2074733347536765321", "lk": 67, "rt": 17, "rp": 16, "eng": 100, "lang": "en", "tags": ["macro", "central_banks", "teacher_required"]}, {"h": "M_McDonough", "tier": 2, "b": "macro", "t": "2026-07-07 19:06", "x": "通过ALTD<GO>在@TheTerminal上的酷炫新功能，显示每日应用下载量。你可以看到世界杯对@Kalshi的显著影响，同时轻松追踪其他预测市场和体育应用的相对趋势。这当然也适用于任何其他公司。", "u": "https://x.com/M_McDonough/status/2074570804055150951", "lk": 57, "rt": 6, "rp": 8, "eng": 71, "lang": "en", "tags": ["macro", "economics", "data"]}, {"h": "BobEUnlimited", "tier": 1, "b": "macro", "t": "2026-07-07 17:13", "x": "家庭能够在今年上半年减少储蓄的一个主要原因是异常大的退税支票。如果没有它，他们能在2026年下半年保持同样的名义支出吗？感谢@thedailyshot", "u": "https://x.com/BobEUnlimited/status/2074542213791387861", "lk": 47, "rt": 4, "rp": 8, "eng": 59, "lang": "en", "tags": ["macro", "rates_fx", "cycle"]}, {"h": "Mayhem4Markets", "tier": 2, "b": "macro", "t": "2026-07-08 02:59", "x": "三星的芯片部门在2026年将实现比其在半导体行业整个40年历史中累计运营利润更多的运营利润。\n\n需要明确这意味着什么：1985年至2025年的累计运营利润，被一个日历年度超越。\n\nDS部门", "u": "https://x.com/Mayhem4Markets/status/2074689752301781263", "lk": 38, "rt": 9, "rp": 3, "eng": 50, "lang": "en", "tags": ["macro", "rates_fx", "market_narrative"]}, {"h": "ARKInvest", "tier": 1, "b": "macro", "t": "2026-07-07 18:33", "x": "苹果正在将其产品线价格平均提高20%。罪魁祸首？AI需求。\n@GrousARK在“头脑风暴”中解释说，AI使用导致内存成本飙升，超出苹果愿意吸收的程度。", "u": "https://x.com/ARKInvest/status/2074562357771039104", "lk": 36, "rt": 3, "rp": 5, "eng": 44, "lang": "en", "tags": ["macro", "equities", "innovation"]}, {"h": "mark_dow", "tier": 2, "b": "macro", "t": "2026-07-07 17:06", "x": "在政策利率为零、前瞻指引一望无际、以及美联储资产负债表大幅扩张之后。\n\n本应让很多人重新思考他们关于货币政策与通胀关系的先验观点。", "u": "https://x.com/mark_dow/status/2074540523793355090", "lk": 19, "rt": 3, "rp": 3, "eng": 25, "lang": "en", "tags": ["macro", "rates_fx", "trader"]}, {"h": "AndreasSteno", "tier": 1, "b": "macro", "t": "2026-07-08 07:58", "x": "为什么？\n\n就伊朗战争而言，如果不预期未来一段时间会出现挫折，那就太天真了。伊朗已经打出了它的牌，而霍尔木兹海峡在未来2-3年内将或多或少变得多余。他们必须最大化利用他们仅剩的一点筹码，这", "u": "https://x.com/AndreasSteno/status/2074764938887741861", "lk": 3, "rt": 0, "rp": 1, "eng": 4, "lang": "en", "tags": ["macro", "rates_fx", "cross_asset"]}, {"h": "Charles_Lister", "tier": 2, "b": "geopolitics", "t": "2026-07-08 02:07", "x": "明天美国东部时间上午8:30，特朗普总统将在土耳其的北约峰会期间与叙利亚总统沙拉会面。\n\n虽然一些注意力将集中在黎巴嫩问题上，但我会关注叙利亚SST认定的消息。\n\n我听到了一些积极的消息，但让我们拭目以待。", "u": "https://x.com/Charles_Lister/status/2074676604425339231", "lk": 253, "rt": 37, "rp": 4, "eng": 294, "lang": "en", "tags": ["geopolitics", "middle_east", "syria"]}, {"h": "JavierBlas", "tier": 1, "b": "geopolitics", "t": "2026-07-08 05:55", "x": "提醒一下美国撤销对伊朗石油销售豁免意味着什么——以及不意味着什么：\n\n伊朗仍然可以出售其石油，只要找到愿意购买的买家（中国过去一直如此，将来也会再次这样做）。是的，伊朗需要打折出售石油，但这在很大程度上会被抵消。", "u": "https://x.com/JavierBlas/status/2074734014271779038", "lk": 197, "rt": 53, "rp": 16, "eng": 266, "lang": "en", "tags": ["commodities", "oil_energy", "supply_demand"]}, {"h": "CollinSLKoh", "tier": 2, "b": "geopolitics", "t": "2026-07-08 03:47", "x": "如果你在2013年参加了仲裁庭，以推翻马尼拉那些“历史上和法律上毫无根据”的主张，你本可以赢，不是吗？但事实是你坚决拒绝，这只能说明你自知自己的反驳论点漏洞百出。", "u": "https://x.com/CollinSLKoh/status/2074701765900173590", "lk": 49, "rt": 15, "rp": 8, "eng": 72, "lang": "en", "tags": ["geopolitics", "maritime", "indo_pacific"]}, {"h": "ryanl_hass", "tier": 1, "b": "geopolitics", "t": "2026-07-07 11:53", "x": "另外三个与中国相关的角度：\n1）习近平很少乘坐直升机；\n2）我怀疑白宫在其前草坪上加了一块水泥板作为直升机停机坪会让习近平印象深刻；\n3）国事访问的抵达仪式传统上在南草坪举行。", "u": "https://x.com/ryanl_hass/status/2074461879921967578", "lk": 40, "rt": 12, "rp": 4, "eng": 56, "lang": "en", "tags": ["geopolitics", "china", "taiwan"]}, {"h": "DerekJGrossman", "tier": 1, "b": "geopolitics", "t": "2026-07-07 21:30", "x": "“澳大利亚和所罗门群岛周二承诺深化双边关系，并批评中国在太平洋测试从核动力潜艇发射的弹道导弹，专家称此举可能加剧该地区的战略竞争。”", "u": "https://x.com/DerekJGrossman/status/2074606987346854370", "lk": 11, "rt": 0, "rp": 1, "eng": 12, "lang": "en", "tags": ["geopolitics", "indo_pacific", "security"]}, {"h": "tanvi_madan", "tier": 2, "b": "geopolitics", "t": "2026-07-07 14:20", "x": "又一个例子说明“志同道合者”也需要加强战略沟通。\n\n如果其他任何人——尤其是美国——做了类似的事情，中国会在每个平台上声称这破坏了地区稳定并忽视了地区敏感性。", "u": "https://x.com/tanvi_madan/status/2074498732268142924", "lk": 8, "rt": 0, "rp": 2, "eng": 10, "lang": "en", "tags": ["geopolitics", "india", "china"]}]}}, "boards": {"macro": {"label": "宏观经济", "color": "#5b8def", "short": "宏观"}, "geopolitics": {"label": "地缘政治", "color": "#ec6f57", "short": "地缘"}, "commodities": {"label": "大宗商品", "color": "#e0952f", "short": "大宗"}, "weather": {"label": "天气气候", "color": "#33bfad", "short": "天气"}, "ai_semis": {"label": "AI半导体", "color": "#b18ef0", "short": "AI"}}, "repColors": {"宏观经济": "#5b8def", "地缘政治": "#ec6f57", "大宗商品": "#e0952f", "股票": "#3fb36a", "AI半导体": "#b18ef0", "AI半导体科技": "#b18ef0", "AI / 半导体": "#b18ef0", "天气气候": "#33bfad"}, "dates": ["2026-07-08"]}</script>

  var $=function(s){return app.querySelector(s)};
  function esc(s){return (s||"").replace(/[&<>]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;"}[c]})}
  function hl(s,q){s=esc(s);if(!q)return s;try{var re=new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");return s.replace(re,"<mark>$1</mark>")}catch(e){return s}}
  function fmt(n){return n>=1000?(n/1000).toFixed(n>=10000?0:1)+"k":""+n}
  function cur(){return DATA[st.date]}
  function jumpHandle(h){$("#q").value="@"+h;st.q="@"+h;$("#clr").style.display="block";st.board="all";buildPills();render();
    $("#stream").scrollIntoView({behavior:"smooth",block:"start"})}

  var dsel=$("#dateSel");
  DATES.forEach(function(d){var o=document.createElement("option");o.value=d;o.textContent=d;dsel.appendChild(o)});
  dsel.value=st.date;
  dsel.onchange=function(){st.date=dsel.value;st.board="all";renderAll()};

  function renderReport(){
    var r=cur().report,m=cur().meta;
    $("#win").textContent=m.window;
    $("#sub").textContent=m.subtitle;
    // insights
    var ih=$("#insights");ih.innerHTML="";
    r.insights.forEach(function(it,i){
      var c=document.createElement("div");c.className="icard";
      c.innerHTML='<h3><span class="inum">'+(i+1)+'</span><span>'+esc(it.title)+'</span></h3>'+
        '<ul>'+it.points.map(function(p){return "<li>"+p+"</li>"}).join("")+'</ul>';
      ih.appendChild(c);
    });
    // sections (board -> subdomain -> viewpoints)
    var sh=$("#sections");sh.innerHTML="";
    r.sections.forEach(function(pair){
      var name=pair[0],subs=pair[1],col=REPC[name]||"#5b8def";
      var box=document.createElement("div");box.className="bsec";
      var nvp=subs.reduce(function(a,s){return a+s[1].length},0);
      var inner=subs.map(function(sd){
        var subn=sd[0],rows=sd[1];
        return '<div class="sub"><div class="subh" style="--sc:'+col+';color:'+col+'">'+esc(subn)+'</div>'+
          rows.map(function(row){
            return '<div class="vp"><span class="vh" data-h="'+esc(row[0].replace("@",""))+'">'+esc(row[0])+'</span>'+
              '<span class="vr">'+esc(row[1])+'</span>'+row[2]+'</div>';
          }).join("")+'</div>';
      }).join("");
      box.innerHTML='<div class="bhead" style="background:'+col+'">'+esc(name)+
        ' <span style="font-weight:500;opacity:.75;font-size:12px">'+subs.length+' 领域 · '+nvp+' 条</span>'+
        '<span class="arrow">▾</span></div><div class="bbody">'+inner+'</div>';
      var bd=box.querySelector(".bbody"),hd=box.querySelector(".bhead");
      hd.onclick=function(){bd.style.display=bd.style.display==="none"?"":"none";
        box.querySelector(".arrow").textContent=bd.style.display==="none"?"▸":"▾"};
      sh.appendChild(box);
    });
    // wire viewpoint handles
    sh.querySelectorAll(".vh").forEach(function(v){v.onclick=function(){jumpHandle(v.dataset.h)}});
    // unique
    var uh=$("#unique");uh.innerHTML="";
    r.unique.forEach(function(u){
      var c=document.createElement("div");c.className="ucard";
      c.innerHTML='<div class="uh" data-h="'+esc(u[0].replace("@",""))+'">'+esc(u[0])+'</div>'+
        '<div class="uv">'+esc(u[1])+'</div><div class="ui">交易含义：'+esc(u[2])+'</div>';
      c.querySelector(".uh").onclick=function(){jumpHandle(u[0].replace("@",""))};
      uh.appendChild(c);
    });
  }

  function buildPills(){
    var tw=cur().tweets,wrap=$("#boardPills");wrap.innerHTML="";
    var counts={all:tw.length};Object.keys(BOARDS).forEach(function(k){counts[k]=0});
    tw.forEach(function(t){counts[t.b]=(counts[t.b]||0)+1});
    function mk(key,label,color){var p=document.createElement("button");p.className="pill";
      p.innerHTML=label+' <span class="cnt">'+(counts[key]||0)+'</span>';
      if(st.board===key){p.setAttribute("data-on","1");p.style.background=color;p.style.borderColor=color}
      p.onclick=function(){st.board=key;buildPills();render()};return p}
    wrap.appendChild(mk("all","全部","#e7b24d"));
    Object.keys(BOARDS).forEach(function(k){wrap.appendChild(mk(k,BOARDS[k].label,BOARDS[k].color))});
  }
  function pass(t){
    if(st.board!=="all"&&t.b!==st.board)return false;
    if(st.tier!=="all"&&(""+t.tier)!==st.tier)return false;
    if(st.lang!=="all"&&t.lang!==st.lang)return false;
    if(st.q){var q=st.q.toLowerCase();if((t.x+" @"+t.h).toLowerCase().indexOf(q)<0)return false}
    return true}
  function render(){
    var m=cur().meta,tw=cur().tweets.filter(pass);
    tw.sort(function(a,b){return st.sort==="hot"?b.eng-a.eng:(a.t<b.t?1:-1)});
    var kol=new Set(tw.map(function(t){return t.h})).size;
    $("#tstat").innerHTML='当前显示 <b>'+tw.length+'</b> / '+m.n_tweets+' 条 · <b>'+kol+'</b> 位 KOL · 监测 '+m.n_accounts+' 账号';
    var s=$("#stream");
    if(!tw.length){s.innerHTML='<div class="empty">没有匹配的推文 —— 换个词或点「重置」。</div>';return}
    s.innerHTML="";
    tw.forEach(function(t){
      var B=BOARDS[t.b]||{short:"其他",color:"#5b8def"};
      var c=document.createElement("div");c.className="card";c.tabIndex=0;c.style.setProperty("--bc",B.color);
      var tags=(t.tags||[]).map(function(x){return '<span class="tag" data-tag="'+esc(x)+'">'+esc(x)+'</span>'}).join("");
      c.innerHTML='<div class="chead"><span class="hand" data-h="'+esc(t.h)+'">@'+esc(t.h)+'</span>'+
        '<span class="bchip" style="background:'+B.color+'">'+B.short+'</span>'+
        (t.tier===1?'<span class="t1">一线</span>':'')+'<span class="lang">'+(t.lang==="zh"?"中":"EN")+'</span>'+
        '<span class="time mono">'+esc(t.t)+'</span></div>'+
        '<div class="cbody">'+hl(t.x,st.q)+'</div>'+
        '<div class="cfoot"><span class="eng mono"><span>♥ '+fmt(t.lk)+'</span><span>⟲ '+fmt(t.rt)+'</span><span>💬 '+fmt(t.rp)+'</span></span>'+
        '<span class="tags">'+tags+'</span><span class="open">打开 ↗</span></div>';
      var body=c.querySelector(".cbody");
      requestAnimationFrame(function(){if(body.scrollHeight>body.clientHeight+4){body.classList.add("clamp");
        var mm=document.createElement("span");mm.className="more";mm.textContent="展开全文 ▾";body.after(mm);
        mm.onclick=function(e){e.stopPropagation();body.classList.toggle("open");body.classList.toggle("clamp");
          mm.textContent=body.classList.contains("open")?"收起 ▴":"展开全文 ▾"}}});
      c.onclick=function(){window.open(t.u,"_blank","noopener")};
      c.onkeydown=function(e){if(e.key==="Enter")window.open(t.u,"_blank","noopener")};
      c.querySelector(".hand").onclick=function(e){e.stopPropagation();jumpHandle(t.h)};
      c.querySelectorAll(".tag").forEach(function(tg){tg.onclick=function(e){e.stopPropagation();
        $("#q").value=tg.dataset.tag;st.q=tg.dataset.tag;$("#clr").style.display="block";render()}});
      s.appendChild(c);
    });
  }
  function renderAll(){renderReport();buildPills();render()}

  var qi=$("#q"),clr=$("#clr");
  qi.oninput=function(){st.q=qi.value.trim();clr.style.display=qi.value?"block":"none";render()};
  clr.onclick=function(){qi.value="";st.q="";clr.style.display="none";qi.focus();render()};
  document.addEventListener("keydown",function(e){
    if(e.key==="/"&&document.activeElement!==qi){e.preventDefault();qi.focus()}
    if(e.key==="Escape"&&document.activeElement===qi){qi.value="";st.q="";clr.style.display="none";render()}});
  function seg(id,key){var el=$(id);el.querySelectorAll("button").forEach(function(b){b.onclick=function(){
    el.querySelectorAll("button").forEach(function(x){x.removeAttribute("data-on")});b.setAttribute("data-on","1");st[key]=b.dataset.v;render()}})}
  seg("#sortSeg","sort");seg("#tierSeg","tier");seg("#langSeg","lang");
  $("#reset").onclick=function(){st.board="all";st.tier="all";st.lang="all";st.sort="hot";st.q="";qi.value="";clr.style.display="none";
    [["#sortSeg","hot"],["#tierSeg","all"],["#langSeg","all"]].forEach(function(p){var el=$(p[0]);
      el.querySelectorAll("button").forEach(function(x){x.setAttribute("data-on",x.dataset.v===p[1]?"1":"")})});
    buildPills();render()};
  renderAll();
})();
</script>
</div>
</body>
</html>
