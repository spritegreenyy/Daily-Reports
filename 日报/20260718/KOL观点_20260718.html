 events. <span style=\"color:#8fa0b3\">Trading implication: Tech decoupling shifts from hardware to data sovereignty, increasing risk premiums for Chinese tech stocks and cross-border data flow-related assets.</span>"], ["@RushDoshi", "", "For Chinese battery technology, full technology transfer, use of US suppliers and software should be required, not just final assembly; otherwise, the deal is unfavorable for the US. <span style=\"color:#8fa0b3\">Trading implication: US tech controls on China shift from restriction to requiring technology回流, accelerating battery supply chain localization.</span>"]]]]], ["Commodities", [["Crude Oil", [["@PeterZeihan", "", "Russia's Black Sea shipping capability continues to deteriorate; if the trend persists, its oil exports could be cut off. <span style=\"color:#8fa0b3\">Trading implication: Supply disruption risk provides a floor for oil prices, but actual disruption volume needs monitoring.</span>"], ["@TimmerFidelity", "", "Oil prices have already priced in Middle East peace; if expectations are disappointed, there is upside risk for oil prices. <span style=\"color:#8fa0b3\">Trading implication: If Middle East peace pricing is excessive, oil prices may face a correction.</span>"]]]]], ["Weather / Climate", []], ["AI / Semiconductors", [["Other AI / Semiconductors", [["@jimcramer", "", "Deep Seek-style alternatives will keep emerging, but the deep-seated distrust between China and the US is the norm. Whether using CrowdStrike or Palo Alto, letting China access any data is foolish; security isolation is the only option. <span style=\"color:#8fa0b3\">Trading implication: Demand for security hardware will be independent of the AI computing cycle, creating structural incremental growth.</span>"]]]]]]}, "tweets": [{"h": "jimcramer", "tier": 1, "b": "macro", "t": "2026-07-17 14:28", "x_zh": "总会有另一个Deep Seek。但有一件事已经变得确定：两国之间根深蒂固的信任缺失。我不在乎你雇谁——CrowdStrike、Palo Alto，如果你让中国得到你的任何数据，哪怕只是你的名字，你绝对是个头号傻瓜。", "x_en": "There will always be another Deep Seek. But the one thing that has become consistent is the ingrained lack of trust between the two countries. I don't care who you hire--CrowdStrike, Palo Alto, you have to be a first class idiot to let China have any of your data, even your name.", "u": "https://x.com/jimcramer/status/2078124720956797048", "lk": 1071, "rt": 80, "rp": 180, "eng": 1331, "lang": "en", "tags": ["macro", "equities", "teacher_required"]}, {"h": "LukeGromen", "tier": 1, "b": "macro", "t": "2026-07-17 16:11", "x_zh": "入场点很重要……而今天，沃伦·巴菲特指标（美国股市总市值/美国GDP），无论是单独计算还是调整美国联邦债务后（因为最终必须货币化），都远高于2000年1月3日的起始水平。来源：@FGMR", "x_en": "Entry points matter...\n\n...and today, the Warren Buffett Metric (Total US equity market cap/US GDP), both standalone and adjusted for US Federal debt (b/c it will eventually have to be monetized) are MUCH higher than they were on January 3, 2000 start date below:\n\nVia \n@FGMR", "u": "https://x.com/LukeGromen/status/2078150680901038287", "lk": 347, "rt": 43, "rp": 30, "eng": 420, "lang": "en", "tags": ["macro", "sovereign_debt", "commodities"]}, {"h": "jimcramer", "tier": 1, "b": "macro", "t": "2026-07-17 18:42", "x_zh": "希捷的反弹令人印象深刻，尽管我认为如果你手头现金不多，这可能是一个绝佳的减仓机会。", "x_en": "Comeback in Seagate is impressive, even as i think it might be an excellent opportunity to trim if you don't have much cash on hand", "u": "https://x.com/jimcramer/status/2078188731610120578", "lk": 250, "rt": 16, "rp": 62, "eng": 328, "lang": "en", "tags": ["macro", "equities", "teacher_required"]}, {"h": "Stephanie_Link", "tier": 2, "b": "macro", "t": "2026-07-17 20:02", "x_zh": "有趣的一周：经济数据改善，强劲的盈利（不仅限于银行），以及科技股轮动中价值股跑赢成长股。尚不确定——整体盈利将非常出色。寻找机会。刚发现一个很酷的乐队——Tame Impala - Let it Happen", "x_en": "An interesting week with better economic data, strong earnings (not just banks) and the tech rotation with value>growth.  Jury out - earnings will be great across the board.  Look for opps.\n\nJust found this cool band - \nTame Impala - Let it Happen", "u": "https://x.com/Stephanie_Link/status/2078208837337653746", "lk": 193, "rt": 8, "rp": 2, "eng": 203, "lang": "en", "tags": ["macro", "equities", "fund_manager"]}, {"h": "TimmerFidelity", "tier": 1, "b": "macro", "t": "2026-07-17 19:14", "x_zh": "尽管这个选择看似直接，但我们面对的是TIPS，它们可以像实物资产或债券一样表现，或两者兼具。下面我们看到，在当前实际收益率（2.3%）和名义收益率（4.56%）水平下，TIPS相对于长期国债的远期相对回报是", "x_en": "As straightforward as that choice might seem, we are dealing with TIPS here, which can behave like real assets or bonds, or both. Below we see that at the current level of real yields (2.3% and nominal yields (4.56%), the forward relative return of TIPS vs LT Treasuries is", "u": "https://x.com/TimmerFidelity/status/2078196537868591158", "lk": 122, "rt": 16, "rp": 9, "eng": 147, "lang": "en", "tags": ["macro", "equities", "cycle"]}, {"h": "TimmerFidelity", "tier": 1, "b": "macro", "t": "2026-07-17 20:39", "x_zh": "也许大宗商品仍是这里首选的实物资产，因为油价现在已为中东局势的顺利发展定价，且BCOM现货指数与标普500指数和彭博长期国债指数完全无关。另一方面，TIPS是", "x_en": "Perhaps commodities remain the real asset of choice here, given that oil prices are now priced for success in the Middle East and given that the BCOM Spot index remains totally uncorrelated to both the S&P 500 index and the BBG LT Treasury index. TIPS on the other hand are", "u": "https://x.com/TimmerFidelity/status/2078217928789352544", "lk": 90, "rt": 15, "rp": 5, "eng": 110, "lang": "en", "tags": ["macro", "equities", "cycle"]}, {"h": "michaelkantro", "tier": 2, "b": "macro", "t": "2026-07-17 11:52", "x_zh": "运输股（我们最青睐的ISM敏感板块）继续受益于周期性背景改善。尽管迄今为止的改善主要体现在价格上，但需求可能在H2改善，为基本面创造强劲的顺风。", "x_en": "Transportation stocks (our favorite ISM-sensitive group) continue to benefit from an improving cyclical backdrop. While most of the improvement to date has been price, demand is likely to improve in H2 creating a powerful tailwind to fundamentals.", "u": "https://x.com/MichaelKantro/status/2078085511688716362", "lk": 64, "rt": 14, "rp": 0, "eng": 78, "lang": "en", "tags": ["macro", "cycle", "sellside"]}, {"h": "michaelkantro", "tier": 2, "b": "macro", "t": "2026-07-17 11:49", "x_zh": "尽管等权重标普500指数处于历史高位，但许多科技股已从近期高点大幅下跌50%、40%、30%。集中度是双向风险！分析师的目标价目前仍保持坚挺。", "x_en": "While the equal weighted S&P 500 sits at an all-time high, many Tech stocks are sharply of their recent highs by 50,40,30 percent. Concentration is a two-way risk street! Analysts price targets remain sticky thus far.", "u": "https://x.com/MichaelKantro/status/2078084673993875709", "lk": 50, "rt": 9, "rp": 6, "eng": 65, "lang": "en", "tags": ["macro", "cycle", "sellside"]}, {"h": "PeterZeihan", "tier": 1, "b": "geopolitics", "t": "2026-07-17 20:00", "x_zh": "由于缺乏有效反制手段，俄罗斯在黑海保护航运的能力正在持续削弱。若当前趋势延续，俄罗斯各类出口——包括石油、谷物、化肥、木材等——可能全部中断。#乌克兰战争 #无人机战 #地缘政治", "x_en": "With few effective counters, Russia's ability to protect shipping in the Black Sea is steadily eroding. If this current trend continues, Russian exports of all kinds, including oil, grain, fertilizer, timber, and more, could be lost.  \n\n#ukrainewar #dronewarfare #geopolitics", "u": "https://x.com/PeterZeihan/status/2078208115586302220", "lk": 136, "rt": 14, "rp": 9, "eng": 159, "lang": "en", "tags": ["geopolitics", "demographics", "supply_chain"]}, {"h": "RushDoshi", "tier": 1, "b": "geopolitics", "t": "2026-07-17 16:37", "x_zh": "对中国来此制造电池或授权技术持开放态度，条件是：1）完全使用美国供应商和软件——我们有一些优秀企业可借此订单扩大规模；2）技术完全转让。试问，如果我们降低门槛，如何确保达成这一结果？", "x_en": "Open to having China make batteries here or license the tech with: \n\n1) full use of US suppliers and software, and we have some good companies that could scale up with that offtake\n2) full transfer of technology \n\nAsk yourself how we will achieve that outcome if we make it easier", "u": "https://x.com/RushDoshi/status/2078157194856435961", "lk": 47, "rt": 10, "rp": 11, "eng": 68, "lang": "en", "tags": ["geopolitics", "china", "strategy"]}, {"h": "RushDoshi", "tier": 1, "b": "geopolitics", "t": "2026-07-17 17:03", "x_zh": "米奇，我认同“猫头鹰”取向。但真正的“猫头鹰”视角并非无限期豁免，因为那会使你支持的技术授权、投资或转让协议比最终组装协议更不可能达成——而后者对我们不利。顺便说一句，大量汽车", "x_en": "Mitch, I identify with the “owl” orientation.\n\nBut the real “owl” perspective is not an indefinite carveout because that makes the licensing or investment or tech transfer deals you’d support less likely than final assembly deals which are bad for us.\n\nBtw, plenty of auto", "u": "https://x.com/RushDoshi/status/2078163742500483380", "lk": 15, "rt": 3, "rp": 4, "eng": 22, "lang": "en", "tags": ["geopolitics", "china", "strategy"]}]}}, "boards": {"macro": {"label_zh": "宏观经济", "label_en": "Macro", "color": "#5b8def", "short_zh": "宏观", "short_en": "Macro"}, "geopolitics": {"label_zh": "地缘政治", "label_en": "Geopolitics", "color": "#ec6f57", "short_zh": "地缘", "short_en": "Geo"}, "commodities": {"label_zh": "大宗商品", "label_en": "Commodities", "color": "#e0952f", "short_zh": "大宗", "short_en": "Cmdty"}, "weather": {"label_zh": "天气气候", "label_en": "Weather", "color": "#33bfad", "short_zh": "天气", "short_en": "Weather"}, "ai_semis": {"label_zh": "AI半导体", "label_en": "AI & Semis", "color": "#b18ef0", "short_zh": "AI", "short_en": "AI"}}, "repColors": {"宏观经济": "#5b8def", "地缘政治": "#ec6f57", "大宗商品": "#e0952f", "股票": "#3fb36a", "AI半导体": "#b18ef0", "AI半导体科技": "#b18ef0", "AI / 半导体": "#b18ef0", "天气气候": "#33bfad"}, "dates": ["2026-07-18"]}</script>
<script>

  var $=function(s){return app.querySelector(s)};

  function tx(k){return UI[uiLang][k]||UI.zh[k]||k}

  function cur(){return DATA[st.date]}

    document.title=(uiLang==="en"?"KOL Trading Themes · Visual Terminal":"KOL 交易主线 · 可视化终端")+" · 2026-07-18";

      var btns=$(pair[0]).querySelectorAll("button"); pair[1].forEach(function(k,i){btns[i].textContent=tx(k)})});
    app.querySelectorAll(".langsw button").forEach(function(b){b.setAttribute("data-on",b.dataset.lang===uiLang?"1":"")});
  }
  var dsel=$("#dateSel"); DATES.forEach(function(d){var o=document.createElement("option");o.value=d;o.textContent=d;dsel.appendChild(o)}); dsel.value=st.date;
  dsel.onchange=function(){st.date=dsel.value;st.board="all";renderAll()};

  function renderReport(){
    var r=report(),m=cur().meta;
    $("#win").textContent=uiLang==="en"?m.window_en:m.window_zh; $("#sub").textContent=uiLang==="en"?m.subtitle_en:m.subtitle_zh;
    var ih=$("#insights");ih.innerHTML=""; r.insights.forEach(function(it,i){var c=document.createElement("div");c.className="icard";c.innerHTML='<h3><span class="inum">'+(i+1)+'</span><span>'+it.title+'</span></h3><ul>'+it.points.map(function(p){return "<li>"+p+"</li>"}).join("")+'</ul>';ih.appendChild(c)});
    var sh=$("#sections");sh.innerHTML="";

      var name=pair[0],subs=pair[1],col=REPC[name]||"#5b8def",nvp=subs.reduce(function(a,s){return a+s[1].length},0);

      var box=document.createElement("div");box.className="bsec";box.innerHTML='<div class="bhead" style="background:'+col+'">'+name+' <span style="font-weight:500;opacity:.75;font-size:12px">'+subs.length+' '+tx("domains")+' · '+nvp+' '+tx("items")+'</span><span class="arrow">▾</span></div><div class="bbody">'+inner+'</div>';

  }
  function buildPills(){

    return true
  }
  function render(){

      var bodyEl=c.querySelector(".cbody"); requestAnimationFrame(function(){if(bodyEl.scrollHeight>bodyEl.clientHeight+4){bodyEl.classList.add("clamp"); var mm=document.createElement("span"); mm.className="more"; mm.textContent=tx("more"); bodyEl.after(mm); mm.onclick=function(e){e.stopPropagation();bodyEl.classList.toggle("open");bodyEl.classList.toggle("clamp");mm.textContent=bodyEl.classList.contains("open")?tx("less"):tx("more")}}});
