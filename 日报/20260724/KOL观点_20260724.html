 in the Middle East</b></span>"]]], ["Russia-Ukraine", [["@chigrl", "", "Russia is considering extending its diesel export ban for another month, as Ukraine continues to strike its oil facilities, <b class=\"em\">adding extra pressure to an already tight fuel market.</b> <span style=\"color:#8fa0b3\">Trading Implication: <b class=\"em\">An extended diesel ban will support global diesel crack spreads,</b> but monitor the recovery progress of Russian refineries</span>"], ["@KofmanMichael", "", "New Russian commander Drapaty faces a legacy of 2.5 years of absurd force generation and management: brigade-level units bloated, subordinate units layered, and forces scattered across multiple fronts. <span style=\"color:#8fa0b3\">Trading Implication: <b class=\"em\">Chaos in the Russian command chain will weaken the efficiency of its summer offensive,</b> potentially opening a window for Ukrainian counterattacks</span>"]]], ["China-US", [["@CollinSLKoh", "", "China embedded a Xinhua reporter on a CCG vessel at Scarborough Shoal on July 22, creating 'counter-transparency,' but refrained from inviting international mainstream media to avoid manipulated footage. <span style=\"color:#8fa0b3\">Trading Implication: The information war in the South China Sea escalates, <b class=\"em\">potentially heightening confrontation risks with the Philippines and the US</b></span>"]]]]], ["Commodities", [["Crude Oil", [["@chigrl", "", "Russia is considering extending its diesel export ban for another month; Ukraine continues to strike Russian oil facilities, <b class=\"em\">intensifying supply pressure on the fuel market.</b> <span style=\"color:#8fa0b3\">Trading Implication: <b class=\"em\">An extended ban will directly tighten diesel supply,</b> supporting crack spreads</span>"], ["@ChrisWeston_PS", "", "Brent breaks $100, Trump's threatening rhetoric catalyzes a strong rally in the energy sector, <b class=\"em\">putting pressure on risk-long positions.</b> <span style=\"color:#8fa0b3\">Trading Implication: After the $100 threshold break, <b class=\"em\">focus on subsequent policy moves and demand-side reactions</b></span>"]]]]], ["Weather & Climate", []], ["AI & Semiconductors", [["NVIDIA", [["@RaoulGMI", "Global Macro", "AI won't replace jobs but will create an infrastructure-driven economy: agents execute tasks, generate value, and settle transactions; the future economy relies not on wages but on computing infrastructure. <span style=\"color:#8fa0b3\">Trading Implication: If reasoning demand explodes, <b class=\"em\">GPU and AI chip demand will far exceed the training phase,</b> benefiting NVIDIA and AMD</span>"]]]]]]}, "tweets": [{"h": "RaoulGMI", "tier": 1, "b": "macro", "t": "2026-07-23 17:52", "x_zh": "人们如此担心AI会取代他们的工作，以至于看不到眼前巨大的机会。即将到来的经济将不再依赖工资运转，而是依赖基础设施。智能体将完成工作、创造价值并结算交易，而所有这一切", "x_en": "People are so concerned about AI taking their job that they can’t see the massive opportunity right in front of them.\n\nThe economy that's coming won't run on wages. It'll run on infrastructure. Agents will do the work, generate value, and settle the transactions, and all of that", "u": "https://x.com/RaoulGMI/status/2080350417473372252", "lk": 658, "rt": 68, "rp": 73, "eng": 799, "lang": "en", "tags": ["macro", "crypto", "long_cycle"]}, {"h": "charliebilello", "tier": 2, "b": "macro", "t": "2026-07-23 16:45", "x_zh": "“在我的任期内，我们将在12个月内，最多18个月内，将能源和电力价格削减一半。”“我们将降低你们的能源价格。我们将把你们的能源价格降低50%。”“从第一天开始，我们将终结通胀，并让", "x_en": "“Under my administration, we will be slashing energy and electricity prices by half within 12 months, at a maximum 18 months.\"\n\n“We’re going to get your energy prices down. We’re going to get your energy prices down by 50%.”\n\n“Starting on day one, we will end inflation and make", "u": "https://x.com/charliebilello/status/2080333391409320043", "lk": 380, "rt": 88, "rp": 37, "eng": 505, "lang": "en", "tags": ["macro", "data", "markets"]}, {"h": "TaviCosta", "tier": 1, "b": "macro", "t": "2026-07-24 04:30", "x_zh": "尽管收益率飙升，美元却无法上涨，这告诉你 ia is considering extending a diesel-export ban for another month as Ukraine steps up attacks on the country’s oil industry, Interfax reported.\n\nThe move could add extra pressure on fuel markets that are already", "u": "https://x.com/chigrl/status/2080344273203904982", "lk": 98, "rt": 16, "rp": 0, "eng": 114, "lang": "en", "tags": ["commodities", "oil_energy", "metals"]}, {"h": "shashj", "tier": 1, "b": "geopolitics", "t": "2026-07-23 15:33", "x_zh": "'如果CPAC英国是你对英国政治的入门介绍，你会以为基尔·斯塔默爵士是共产主义者，国家由乔治·索罗斯资助的圣战分子和“同性恋列宁主义者”邪恶联盟统治。'", "x_en": "'If CPAC GB was your introduction to British politics, you would come away thinking that Sir Keir Starmer was a communist and that the country is ruled by a sinister coalition of jihadis and “homo-Leninists” funded by George Soros'", "u": "https://x.com/shashj/status/2080315315204886970", "lk": 39, "rt": 4, "rp": 4, "eng": 47, "lang": "en", "tags": ["geopolitics", "defense", "europe"]}, {"h": "CollinSLKoh", "tier": 2, "b": "geopolitics", "t": "2026-07-24 02:31", "x_zh": "根据迄今东盟政策精英的言论，今年内颁布《南海行为准则》似乎已确认。11月该准则将采取何种形式值得关注。", "x_en": "Based on what's being said amongst ASEAN policy elites so far, the promulgation of COC within this year appears to be confirmed. It'll be interesting to see what form this Code would take in November.", "u": "https://x.com/CollinSLKoh/status/2080481043296186829", "lk": 28, "rt": 11, "rp": 5, "eng": 44, "lang": "en", "tags": ["geopolitics", "maritime", "indo_pacific"]}, {"h": "CollinSLKoh", "tier": 2, "b": "geopolitics", "t": "2026-07-24 01:20", "x_zh": "这会是部署到西太平洋战区的美国海岸警卫队远征巡逻中队首个重大行动吗？", "x_en": "Could this be the first major act of the USCG Expeditionary Cutter Squadron deployed to the Western Pacific theater?", "u": "https://x.com/CollinSLKoh/status/2080462979930472706", "lk": 16, "rt": 4, "rp": 4, "eng": 24, "lang": "en", "tags": ["geopolitics", "maritime", "indo_pacific"]}, {"h": "KofmanMichael", "tier": 1, "b": "geopolitics", "t": "2026-07-24 07:58", "x_zh": "我不羡慕德拉帕蒂，考虑到他要在2.5年荒谬的兵力生成和管理实践后收拾烂摊   var app=document.getElementById("kolapp"),P=JSON.parse(document.getElementById("payload").textContent),DATA=P.data,BOARDS=P.boards,REPC=P.repColors,DATES=P.dates;

  var st={date:DATES[0],board:"all",tier:"all",lang:"all",sort:"hot",q:""};
  var UI={zh:{title:'KOL 交易主线<span class="g"> · </span>可视化终端',s1:'一 · 本日核心交易启示',sidx:'二 · 可回测 KOL 方向指数',s2:'三 · 主题板块 · 逐条观点',s3:'四 · 独到 / 有启发性的观点',s4:'五 · 全部推文 · 可检索（点击跳转原推）',search:'搜索关键词 / @账号（按 / 聚焦，Esc 清空）',hot:'热度',latest:'最新',all:'全部',tier1:'一线',tier2:'二线',zhOnly:'中文',enOnly:'EN',bi:'中英',reset:'重置',open:'打开 ↗',more:'展开全文 ▾',less:'收起 ▴',empty:'没有匹配的推文 —— 换个词或点「重置」。',show:'当前显示',kols:'位 KOL',monitor:'监测',accounts:'账号',domains:'领域',items:'条',meaning:'交易含义：',langZh:'中',langEn:'EN',bull:'偏多',bear:'偏空',balanced:'方向均衡',noSignal:'今日无方向',noData:'今日未捕捉到相关观点',lowConf:'低置信',midConf:'中置信',highConf:'高置信',views:'相关观点',signals:'方向样本',activeDays:'30日有效天数',history30:'近30日',waiting:'等待更多样本后形成指数',indexFormula:'I = 100 × Σ(wᵢ·dᵢ) / (n+2)',indexNote:'dᵢ 为观点方向（偏多 +1、偏空 -1）；wᵢ 为按 KOL 层级和互动度计算后、再归一化至均值为 1 的权重；n 为当日方向样本数。分母中的 +2 来自 Beta(1,1) 均匀先验，等价于预置一条偏多和一条偏空观点，并非任意调参。无样本保持为空，仅用于价格回测。'},en:{title:'KOL Trading Themes<span class="g"> · </span>Visual Terminal',s1:'I · Core Trading Takeaways',sidx:'II · Backtest-Ready KOL Direction Indices',s2:'III · Thematic Sectors · View by View',s3:'IV · Distinctive / Insightful Views',s4:'V · All Tweets · Searchable (click to open source)',search:'Search keyword / @handle (press / to focus, Esc to clear)',hot:'Hot',latest:'Latest',all:'All',tier1:'Tier 1',tier2:'Tier 2',zhOnly:'Chinese',enOnly:'English',bi:'Both',reset:'Reset',open:'Open ↗',more:'Expand ▾',less:'Collapse ▴',empty:'No matching tweets. Try another keyword or reset.',show:'Showing',kols:'KOLs',monitor:'monitoring',accounts:'accounts',domains:'domains',items:'items',meaning:'Trading implication: ',langZh:'ZH',langEn:'EN',bull:'Bullish',bear:'Bearish',balanced:'Balanced',noSignal:'No direction today',noData:'No relevant view captured today',lowConf:'Low confidence',midConf:'Medium confidence',highConf:'High confidence',views:'Relevant views',signals:'Directional samples',activeDays:'Active days / 30D',history30:'Last 30D',waiting:'Index will appear after more samples arrive',indexFormula:'I = 100 × Σ(wᵢ·dᵢ) / (n+2)',indexNote:'dᵢ is view direction (+1 bullish, -1 bearish); wᵢ is the KOL-tier and engagement weight normalized to a daily mean of 1; n is the directional sample count. The +2 denominator comes from a Beta(1,1) uniform prior, equivalent to one bullish and one bearish pseudo-view rather than an arbitrary tuning constant. Missing data stays blank. For price backtests only.'}};
  var $=function(s){return app.querySelector(s)};
  function esc(s){return (s||"").replace(/[&<>]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;"}[c]})}
  function tx(k){return UI[uiLang][k]||UI.zh[k]||k}

  function bodyOf(t){return uiLang==="en"?(t.x_en||t.x_zh||""):(t.x_zh||t.x_en||"")}
  function fmt(n){return n>=1000?(n/1000).toFixed(n>=10000?0:1)+"k":""+n}
  function hl(s,q){s=s||"";if(!q)return s;try{var re=new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");return s.replace(re,"<mark>$1</mark>")}catch(e){return s}}
  function cur(){return DATA[st.date]}
  function jumpHandle(h){$("#q").value="@"+h;st.q="@"+h;$("#clr").style.display="block";st.board="all";buildPills();render();$("#stream").scrollIntoView({behavior:"smooth",block:"start"})}
  function syncUi(){
    localStorage.setItem("windrise_lang",uiLang); document.documentElement.lang=uiLang==="en"?"en":"zh-CN";
    document.title=(uiLang==="en"?"KOL Trading Themes · Visual Terminal":"KOL 交易主线 · 可视化终端")+" · 2026-07-24";
    $("#title").innerHTML=tx("title"); $("#st1").textContent=tx("s1"); $("#stidx").textContent=tx("sidx"); $("#st2").textContent=tx("s2"); $("#st3").textContent=tx("s3"); $("#st4").textContent=tx("s4");
    $("#idxformula").textContent=tx("indexFormula");
    $("#q").placeholder=tx("search"); $("#reset").textContent=tx("reset");
    [["#sortSeg",["hot","latest"]],["#tierSeg",["all","tier1","tier2"]],["#langSeg",["bi","zhOnly","enOnly"]]].forEach(function(pair){
      var btns=$(pair[0]).querySelectorAll("button"); pair[1].forEach(function(k,i){btns[i].textContent=tx(k)})});
    app.querySelectorAll(".langsw button").forEach(function(b){b.setAttribute("data-on",b.dataset.lang===uiLang?"1":"")});
  }
  var dsel=$("#dateSel"); DATES.forEach(function(d){var o=document.createElement("option");o.value=d;o.textContent=d;dsel.appendChild(o)}); dsel.value=st.date;
  dsel.onchange=function(){st.date=dsel.value;st.board="all";renderAll()};

  var IDXUNDER={zh:{energy:'原油 · 成品油 · 天然气 · LNG',metals:'黄金 · 白银 · 铜 · 铝 · 锌 · 镍 · 锂',grains:'玉米 · 小麦 · 大豆 · 豆粕 · 豆油',softs:'白糖 · 咖啡 · 可可 · 棉花 · 橙汁 · 天然橡胶'},en:{energy:'Crude · Products · Natural Gas · LNG',metals:'Gold · Silver · Copper · Aluminum · Zinc · Nickel · Lithium',grains:'Corn · Wheat · Soybeans · Meal · Soy Oil',softs:'Sugar · Coffee · Cocoa · Cotton · Orange Juice · Natural Rubber'}};
  function idxSpark(rows,color){var vals=(rows||[]).filter(function(r){return r.score!==null&&r.score!==undefined});if(vals.length<2)return '';var w=240,h=30,pts=vals.map(function(r,i){var x=i/(vals.length-1)*w,y=(1-(r.score+100)/200)*h;return x.toFixed(1)+','+y.toFixed(1)}).join(' ');return '<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" aria-hidden="true"><line x1="0" y1="15" x2="240" y2="15" stroke="#394a5e" stroke-width="1"/><polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2.2"/></svg>'}
  function renderIndices(){var c=cur(),wrap=$("#indices"),keys=['energy','metals','grains','softs'];wrap.innerHTML='';keys.forEach(function(key){var x=(c.indices||{})[key]||{},score=x.score,col=x.color||'#8fa0b3',has=score!==null&&score!==undefined,noData=x.status==='no_data'||!(x.mentions||0),state=noData?tx('noData'):(!has?tx('noSignal'):(score>8?tx('bull'):(score<-8?tx('bear'):tx('balanced')))),left=has&&score<0?50-Math.abs(score)/2:50,width=has?Math.abs(score)/2:0,label=uiLang==='en'?(x.label_en||key):(x.label_zh||key),sig=x.signal_tweets||0,confClass=sig>=6?'high':(sig>=3?'mid':'low'),confText=sig>=6?tx('highConf'):(sig>=3?tx('midConf'):tx('lowConf')),hist=(c.index_history||{})[key]||[],active=hist.filter(function(r){return r.score!==null&&r.score!==undefined}).length,spark=idxSpark(hist,col),card=document.createElement('div');card.className='idxcard'+(!has?' nodata':'');card.style.setProperty('--ic',col);card.innerHTML='<div class="idxhead"><b>'+esc(label)+'</b>'+(has?'<span class="idxconf '+confClass+'">'+confText+' · '+Math.round((x.confidence||0)*100)+'%</span>':'')+'</div><div class="idxhero"><span class="idxscore '+(!has?'none':score>=0?'pos':'neg')+'">'+(has?(score>0?'+':'')+Math.round(score):'—')+'</span><span class="idxstate">'+state+'</span></div><div class="idxunder">'+IDXUNDER[uiLang][key]+'</div>'+(has?'<div class="idxaxis"><i class="idxfill" style="left:'+left+'%;width:'+width+'%;background:'+col+'"></i></div>':'<div class="idxempty">'+tx('waiting')+'</div>')+'<div class="idxmeta"><div class="idxstat"><strong>'+(x.mentions||0)+'</strong><span>'+tx('views')+'</span></div><div class="idxstat"><strong>'+sig+' <small>↑'+(x.bullish||0)+' ↓'+(x.bearish||0)+'</small></strong><span>'+tx('signals')+'</span></div><div class="idxstat"><strong>'+active+'</strong><span>'+tx('activeDays')+'</span></div></div>'+(has&&spark?'<div class="idxtrend"><span class="idxtrendlabel">'+tx('history30')+'</span><div class="idxspark">'+spark+'</div></div>':'');wrap.appendChild(card)});$("#idxnote").textContent=tx('indexNote')}

  function renderReport(){
    var r=report(),m=cur().meta;
    $("#win").textContent=uiLang==="en"?m.window_en:m.window_zh; $("#sub").textContent=uiLang==="en"?m.subtitle_en:m.subtitle_zh;
    var ih=$("#insights");ih.innerHTML=""; r.insights.forEach(function(it,i){var c=document.createElement("div");c.className="icard";c.innerHTML='<h3><span class="inum">'+(i+1)+'</span><span>'+it.title+'</span></h3><ul>'+it.points.map(function(p){return "<li>"+p+"</li>"}).join("")+'</ul>';ih.appendChild(c)});
    var sh=$("#sections");sh.innerHTML="";
    r.sections.forEach(function(pair){
      var name=pair[0],subs=pair[1],col=REPC[name]||"#5b8def",nvp=subs.reduce(function(a,s){return a+s[1].length},0);
      var inner=subs.map(function(sd){return '<div class="subg"><div class="subh" style="--sc:'+col+';color:'+col+'">'+sd[0]+'</div>'+sd[1].map(function(row){return '<div class="vp"><span class="vh" data-h="'+esc(row[0].replace("@",""))+'">'+row[0]+'</span>'+(row[1]?'<span class="vr">'+row[1]+'</span>':'')+row[2]+'</div>'}).join("")+'</div>'}).join("");
      var box=document.createElement("div");box.className="bsec";box.innerHTML='<div class="bhead" style="background:'+col+'">'+name+' <span style="font-weight:500;opacity:.75;font-size:12px">'+subs.length+' '+tx("domains")+' · '+nvp+' '+tx("items")+'</span><span class="arrow">▾</span></div><div class="bbody">'+inner+'</div>';
      var bd=box.querySelector(".bbody"),hd=box.querySelector(".bhead"); hd.onclick=function(){bd.style.display=bd.style.display==="none"?"":"none";box.querySelector(".arrow").textContent=bd.style.display==="none"?"▸":"▾"}; sh.appendChild(box);
    });
    sh.querySelectorAll(".vh").forEach(function(v){v.onclick=function(){jumpHandle(v.dataset.h)}});
    var uh=$("#unique");uh.innerHTML=""; r.unique.forEach(function(u){var c=document.createElement("div");c.className="ucard";c.innerHTML='<div class="uh" data-h="'+esc(u[0].replace("@",""))+'">'+u[0]+'</div><div class="uv">'+u[1]+'</div><div class="ui">'+tx("meaning")+u[2]+'</div>';c.querySelector(".uh").onclick=function(){jumpHandle(u[0].replace("@",""))};uh.appendChild(c)});
  }
  function buildPills(){
    var tw=cur().tweets,wrap=$("#boardPills");wrap.innerHTML=""; var counts={all:tw.length};Object.keys(BOARDS).forEach(function(k){counts[k]=0}); tw.forEach(function(t){counts[t.b]=(counts[t.b]||0)+1});
    function mk(key,label,color){var p=document.createElement("button");p.className="pill";p.innerHTML=label+' <span class="cnt">'+(counts[key]||0)+'</span>';if(st.board===key){p.setAttribute("data-on","1");p.style.background=color;p.style.borderColor=color} p.onclick=function(){st.board=key;buildPills();render()};return p}
    wrap.appendChild(mk("all",tx("all"),"#e7b24d")); Object.keys(BOARDS).forEach(function(k){wrap.appendChild(mk(k,boardLabel(k),BOARDS[k].color))});
  }
  function pass(t){
    if(st.board!=="all"&&t.b!==st.board)return false;
    if(st.tier!=="all"&&(""+t.tier)!==st.tier)return false;
    if(st.lang!=="all"&&t.lang!==st.lang)return false;
    if(st.q){var q=st.q.toLowerCase(); var hay=(bodyOf(t)+" "+(t.x_zh||"")+" "+(t.x_en||"")+" @"+t.h+" "+(t.tags||[]).join(" ")).toLowerCase(); if(hay.indexOf(q)<0)return false}
    return true
  }
  function render(){
    var m=cur().meta,tw=cur().tweets.filter(pass); tw.sort(function(a,b){return st.sort==="hot"?b.eng-a.eng:(a.t<b.t?1:-1)});
    var kol=new Set(tw.map(function(t){return t.h})).size; $("#tstat").innerHTML=tx("show")+' <b>'+tw.length+'</b> / '+m.n_tweets+' · <b>'+kol+'</b> '+tx("kols")+' · '+tx("monitor")+' '+m.n_accounts+' '+tx("accounts");
    var s=$("#stream"); if(!tw.length){s.innerHTML='<div class="empty">'+tx("empty")+'</div>';return} s.innerHTML="";
    tw.forEach(function(t){
      var B=BOARDS[t.b]||{color:"#5b8def"}, body=bodyOf(t), tags=(t.tags||[]).map(function(x){return '<span class="tag" data-tag="'+esc(x)+'">'+esc(x)+'</span>'}).join("");
      var c=document.createElement("div"); c.className="card"; c.tabIndex=0; c.style.setProperty("--bc",B.color);
      c.innerHTML='<div class="chead"><span class="hand" data-h="'+esc(t.h)+'">@'+esc(t.h)+'</span><span class="bchip" style="background:'+B.color+'">'+boardShort(t.b)+'</span>'+(t.tier===1?'<span class="t1">'+tx("tier1")+'</span>':'')+'<span class="lang">'+(t.lang==="zh"?tx("langZh"):tx("langEn"))+'</span><span class="time mono">'+esc(t.t)+'</span></div><div class="cbody">'+hl(body,st.q)+'</div><div class="cfoot"><span class="eng mono"><span>♥ '+fmt(t.lk)+'</span><span>⟲ '+fmt(t.rt)+'</span><span>💬 '+fmt(t.rp)+'</span></span><span class="tags">'+tags+'</span><span class="open">'+tx("open")+'</span></div>';
      var bodyEl=c.querySelector(".cbody"); requestAnimationFrame(function(){if(bodyEl.scrollHeight>bodyEl.clientHeight+4){bodyEl.classList.add("clamp"); var mm=document.createElement("span"); mm.className="more"; mm.textContent=tx("more"); bodyEl.after(mm); mm.onclick=function(e){e.stopPropagation();bodyEl.classList.toggle("open");bodyEl.classList.toggle("clamp");mm.textContent=bodyEl.classList.contains("open")?tx("less"):tx("more")}}});
      c.onclick=function(){window.open(t.u,"_blank","noopener")}; c.onkeydown=function(e){if(e.key==="Enter")window.open(t.u,"_blank","noopener")};
      c.querySelector(".hand").onclick=function(e){e.stopPropagation();jumpHandle(t.h)}; c.querySelectorAll(".tag").forEach(function(tg){tg.onclick=function(e){e.stopPropagation();$("#q").value=tg.dataset.tag;st.q=tg.dataset.tag;$("#clr").style.display="block";render()}});
      s.appendChild(c);
    })
  }
  function renderAll(){syncUi();renderReport();renderIndices();buildPills();render()}
  var qi=$("#q"),clr=$("#clr"); qi.oninput=function(){st.q=qi.value.trim();clr.style.display=qi.value?"block":"none";render()}; clr.onclick=function(){qi.value="";st.q="";clr.style.display="none";qi.focus();render()};
  document.addEventListener("keydown",function(e){if(e.key==="/"&&document.activeElement!==qi){e.preventDefault();qi.focus()} if(e.key==="Escape"&&document.activeElement===qi){qi.value="";st.q="";clr.style.display="none";render()}});
  function seg(id,key){var el=$(id);el.querySelectorAll("button").forEach(function(b){b.onclick=function(){el.querySelectorAll("button").forEach(function(x){x.removeAttribute("data-on")});b.setAttribute("data-on","1");st[key]=b.dataset.v;render()}})}
  seg("#sortSeg","sort"); seg("#tierSeg","tier"); seg("#langSeg","lang");
  $("#reset").onclick=function(){st.board="all";st.tier="all";st.lang="all";st.sort="hot";st.q="";qi.value="";clr.style.display="none";[["#sortSeg","hot"],["#tierSeg","all"],["#langSeg","all"]].forEach(function(p){var el=$(p[0]);el.querySelectorAll("button").forEach(function(x){x.setAttribute("data-on",x.dataset.v===p[1]?"1":"")})});buildPills();render()};
  app.querySelectorAll(".langsw button").forEach(function(b){b.onclick=function(){uiLang=b.dataset.lang;renderAll()}});
  renderAll();
})();
</script>
