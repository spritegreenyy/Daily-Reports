xpectations, the 10-year Treasury yield dropped sharply, but the market reaction between the two data points is intriguing; SpaceX has fallen below its $135 IPO price.", "The bond market has priced in a recession, but SpaceX's break below IPO shows deteriorating primary market risk appetite; the divergence warrants caution."], ["@chigrl", "WTI $55 is far below the breakeven point for drilling in major US basins (Permian $67, other regions $62-$70); at this price, it won't increase production but will accelerate capacity exit, forming a cost support logic.", "If oil stays below breakeven, US output decline will gradually tighten supply, but OPEC+ production increase hedging risk needs attention."]], "sections": [["Macro Economy", [["Bitcoin / Crypto", [["@PeterLBrandt", "", "Strongly advises Gen Z to give up active trading and DCA <b class=\"em\">80%</b> into SPY, <b class=\"em\">10%</b> into PSLV, <b class=\"em\">10%</b> into SGOL monthly; can retire by <b class=\"em\">40</b>s; inverse head-and-shoulders pattern not yet confirmed on BTC. <span style=\"color:#8fa0b3\">Trading implication: If retail continues to exit, market volatility may decline, but the precious metals allocation suggests distrust in the fiat system.</span>"]]], ["Macro Economy", [["@jimcramer", "", "The current market has no room for an Anthropic IPO; suggests delaying until autumn; needs a lot of stock to be absorbed first. <span style=\"color:#8fa0b3\">Trading implication: Suggests insufficient market liquidity; the IPO window may close, putting pressure on tech stock supply.</span>"], ["@TimmerFidelity", "", "The semiconductor ETF's trajectory closely mirrors the dot-com bubble period, but current strong earnings support valuations; although the <b class=\"em\">5</b>-year CAPE is high, forward PE is suppressed by high-yield credit spreads, so the bubble thesis is not yet valid. <span style=\"color:#8fa0b3\">Trading implication: If earnings growth slows, the valuation-bubble analogy will quickly revert, and the tech bull case faces a test.</span>"]]], ["Crude Oil / Distillates", [["@chigrl", "", "WTI at <b class=\"em\">$55</b> won't spur US production increases; instead, it will eliminate capacity; Dallas Fed survey shows average breakeven for new wells at <b class=\"em\">$66</b>, Permian at <b class=\"em\">$67</b>. <span style=\"color:#8fa0b3\">Trading implication: If oil stays below breakeven, US output will decline, OPEC+ pricing power strengthens, and the oil price floor rises.</span>"]]], ["Fed / Rates", [["@elerianm", "Macro economist", "After CPI and PPI both missed expectations, the <b class=\"em\">10</b>-year Treasury yield dropped sharply, but the market reaction between the two data points is intriguing; SpaceX has fallen below its <b class=\"em\">$135</b> IPO price. <span style=\"color:#8fa0b3\">Trading implication: The bond market has priced in a recession, but SpaceX's break below IPO shows deteriorating primary market risk appetite; the divergence warrants caution.</span>"], ["@McClellanOsc", "Technical analysis", "The Phillips curve has failed; actual data shows inflation changes lag unemployment by <b class=\"em\">2</b> years, so to achieve maximum employment, one only needs to tolerate inflation first. <span style=\"color:#8fa0b3\">Trading implication: If this framework holds, the Fed may maintain accommodation for a long time, structurally bullish for rate-sensitive assets.</span>"], ["@michaelkantro", "Macro strategy (Piper Sandler)", "This is a stock-picker's market; three major themes (AI, energy, rate sensitivity) drive declining correlations, with at least one theme performing each day. <span style=\"color:#8fa0b3\">Trading implication: Low correlation environment favors hedge fund alpha strategies, but index investors may underperform.</span>"]]], ["Russia-Ukraine", [["@Mayhem4Markets", "", "The fantasy of Russia quickly taking Ukraine has been shattered; actual progress is far below expectations; without owning your own computing power, your data will be controlled by others. <span style=\"color:#8fa0b3\">Trading implication: Geopolitical stalemate will continue to support energy and defense sectors, while computing power autonomy becomes a new national security issue.</span>"]]]]], ["Geopolitics", [["Russia-Ukraine", [["@Mayhem4Markets", "", "Early expectations of a quick Russian victory in Ukraine have been disproven; current battlefield progress is completely different from the initial fantasy. <span style=\"color:#8fa0b3\">Trading implication: The expectation of a prolonged Russia-Ukraine conflict is being revised; energy and defense trade logic needs adjustment.</span>"]]], ["Other Geopolitics", [["@ianbremmer", "Geopolitics (Eurasia Group)", "There is no unified middle-power bloc strategy; countries are only diversifying their hedging against the US on trade and security, worried about its predictability and reliability. <span style=\"color:#8fa0b3\">Trading implication: Fragmentation of global trade and security alliances intensifies, increasing regional risk premiums.</span>"], ["@samagreene", "", "The US wants allies to be autonomous, but only if allies don't make actual decisions and their interests are perfectly aligned with the US; it's control, not delegation. <span style=\"color:#8fa0b3\">Trading implication: Ally autonomy is nominal; internal NATO decision-making disagreements may be underestimated.</span>"]]]]], ["Commodities", [["Crude Oil", [["@chigrl", "", "WTI <b class=\"em\">$55</b> is far below the breakeven point for drilling in major US basins (Permian <b class=\"em\">$67</b>, other regions <b class=\"em\">$62</b><b class=\"em\">-$70</b>); at this price, it won't increase production but will accelerate capacity exit, forming a cost support logic. <span style=\"color:#8fa0b3\">Trading implication: If oil stays below breakeven, US output decline will gradually tighten supply, but OPEC+ production increase hedging risk needs attention.</span>"]]], ["Metals", [["@PeterLBrandt", "", "Strongly advises young traders to give up active trading and DCA <b class=\"em\">80%</b> SPY + <b class=\"em\">10%</b> PSLV + <b class=\"em\">10%</b> SGOL monthly; can retire by <b class=\"em\">40</b>s. <span style=\"color:#8fa0b3\">Trading implication: Implies a long-term bullish view on precious metals, but this strategy suits long-term investors, not short-term traders.</span>"]]]]], ["Weather / Climate", [["El Niño Status", [["@elerianm", "Macro economist", "El Niño Costero off Peru is rapidly strengthening; Niño <b class=\"em\">1</b><b class=\"em\">+2</b> is approaching <b class=\"em\">+3°C</b>, similar to the same period in <b class=\"em\">1997</b>; expected to expand to Ecuador within two weeks. <span style=\"color:#8fa0b3\">Trading implication: El Niño intensity exceeding expectations may worsen South American drought and Southeast Asian flooding, pushing up agricultural prices.</span>"]]], ["Weather / Climate", [["@elerianm", "Macro economist", "El Niño Costero off Peru is rapidly strengthening; Niño <b class=\"em\">1</b><b class=\"em\">+2</b> is approaching <b class=\"em\">+3°C</b>, similar to the same period in <b class=\"em\">1997</b>; expected to expand to Ecuador within two weeks, potentially triggering extreme weather in South America. <span style=\"color:#8fa0b3\">Trading implication: If El Niño continues to strengthen, risks to South American agricultural and energy supplies rise; long opportunities in related futures need attention.</span>"]]]]], ["AI / Semiconductors", [["Other AI / Semiconductors", [["@TimmerFidelity", "", "The semiconductor ETF's trajectory closely mirrors the <b class=\"em\">5</b>-year CAPE analogy of the tech bubble; although earnings support valuations, forward PE and high-yield credit spreads have already issued warnings. <span style=\"color:#8fa0b3\">Trading implication: If earnings growth slows, valuation correction risk will rise sharply; the sector may replay the <b class=\"em\">2000</b> pattern.</span>"], ["@jimcramer", "", "The current market cannot accommodate an Anthropic IPO; should be delayed until autumn; needs ample liquidity to absorb existing stocks. <span style=\"color:#8fa0b3\">Trading implication: The AI primary market financing window is narrowing, which may transmit to secondary market semiconductor demand expectations.</span>"]]]]]]}, "tweets": [{"h": "PeterLBrandt", "tier": 1, "b": "macro", "t": "2026-07-15 22:37", "x_zh": "非常非常不寻常，但这个图表可能正在形成一个倒头肩底形态。我们尚不确定。$BTCUSD", "x_en": "VERY VERY UNCONVENTIONAL, but this chart could have the makings of an inverted H&S bottom. We do NOT know yet. $BTCUSD", "u": "https://x.com/PeterLBrandt/status/2077522918360433129", "lk": 1000, "rt": 81, "rp": 76, "eng": 1157, "lang": "en", "tags": ["commodities", "technical", "trader"]}, {"h": "PeterLBrandt", "tier": 1, "b": "macro", "t": "2026-07-15 22:43", "x_zh": "我最强烈的建议：给那些认为自己作为活跃交易者能大赚一笔的Z世代：别试了。每月末把尽可能多的钱投入一份真正的工作（80%买入SPY，10%买入PSLV，10%买入SGOL），到40多岁退休时身价数百万。希望价格能上涨。", "x_en": "My STRONGEST RECOMMENDATION\nTo Z gens who think they will score big as active traders\nis\nDon't even try\nInvest as much as you can at the end of each month in a real job (80% into SPY, 10% into PSLV and 10% into SGOL) and retire worth millions in your late 40s\nHope for a price", "u": "https://x.com/PeterLBrandt/status/2077524588804866545", "lk": 771, "rt": 51, "rp": 62, "eng": 884, "lang": "en", "tags": ["commodities", "technical", "trader"]}, {"h": "jimcramer", "tier": 1, "b": "macro", "t": "2026-07-15 20:40", "x_zh": "这个市场目前没有空间容纳Anthropic。他们应该等到秋天。我们需要把大量这种波动的股票消化掉。", "x_en": "This market does not have room at this moment for Anthropic. They should wait until the fall. We need to have a lot of this sloshing stock put away", "u": "https://x.com/jimcramer/status/2077493481665171555", "lk": 487, "rt": 27, "rp": 103, "eng": 617, "lang": "en", "tags": ["macro", "equities", "teacher_required"]}, {"h": "chigrl", "tier": 1, "b": "macro", "t": "2026-07-15 20:31", "x_zh": "55美元不会增加美国原油产量。它反而会让产量减少。达拉斯联储询问生产商需要什么WTI价格才能钻探新井。根据最近的达拉斯联储调查（6月）：答案：平均66美元，二叠纪盆地67美元，各区域62至70美元，55美元低于所有这些价格。", "x_en": "$55 does not produce more US barrels. It retires them.\n\nThe Dallas Fed asks producers what WTI price they need to drill a new well. As of the recent Dallas Fed Survey (June): \n\nAnswers: $66 on average, $67 in the Permian, $62 to $70 across regions, $55 is below all of it.\n\nThe", "u": "https://x.com/chigrl/status/2077491309024051433", "lk": 403, "rt": 56, "rp": 10, "eng": 469, "lang": "en", "tags": ["commodities", "oil_energy", "metals"]}, {"h": "TimmerFidelity", "tier": 1, "b": "macro", "t": "2026-07-15 18:13", "x_zh": "随着半导体ETF吸引快钱的讨论不断，我忍不住关注互联网泡沫的类比。我确信这个类比最终会失效（所有类比都会），但到目前为止，它在价格和5年CAPE比率方面都一直非常准确。", "x_en": "With all the talk of semiconductor ETFs captivating the fast money, I can’t help but keep an eye on the dot com analog. I’m sure this analog will break down at some point (as all analogs do), but so far it has continued to be spot on, both in terms of price and the 5-year CAPE", "u": "https://x.com/TimmerFidelity/status/2077456410871238787", "lk": 317, "rt": 51, "rp": 17, "eng": 385, "lang": "en", "tags": ["macro", "equities", "cycle"]}, {"h": "elerianm", "tier": 1, "b": "macro", "t": "2026-07-15 16:15", "x_zh": "今日市场显著变动之一：SpaceX目前交易价格低于其IPO价格135美元（CNBC图表）。#经济 #市场 #SpaceX #投资者 #投资", "x_en": "One of the notable moves in markets today:\nSpaceX is now trading below its IPO price of $135 (CNBC chart).\n#economy #markets #spaceX #investors #investing", "u": "https://x.com/elerianm/status/2077426964852359377", "lk": 249, "rt": 35, "rp": 38, "eng": 322, "lang": "en", "tags": ["macro", "central_banks", "teacher_required"]}, {"h": "elerianm", "tier": 1, "b": "macro", "t": "2026-07-15 21:15", "x_zh": "这张两天期彭博图表清晰显示了美国10年期国债收益率的下跌，继昨日CPI和今日PPI报告均显著低于共识预期之后。有趣的是这两个数据点之间发生了什么，以及是否...", "x_en": "This two-day Bloomberg chart clearly illustrates the drop in US 10-year Treasury yields following yesterday’s CPI and today’s PPI reports, both of which came in notably softer than consensus forecasts.\nWhat's interesting is what happened between these two data points and whether", "u": "https://x.com/elerianm/status/2077502402354200689", "lk": 212, "rt": 37, "rp": 60, "eng": 309, "lang": "en", "tags": ["macro", "central_banks", "teacher_required"]}, {"h": "TimmerFidelity", "tier": 1, "b": "macro", "t": "2026-07-15 19:00", "x_zh": "现在和当时的一个重大区别是，如今的基本面支撑着估值。虽然上述5年CAPE比率令人担忧，但蓬勃的盈利迄今使估值保持合理。事实上，下图显示远期市盈率与高收益债券的对比...", "x_en": "One big difference between now and then is that today’s fundamentals are backing up the valuations. While the 5-year CAPE ratio above raises eyebrows, booming earnings are so far keeping valuations in check. In fact, the chart below showing the forward P/E against high yield", "u": "https://x.com/TimmerFidelity/status/2077468242700796376", "lk": 134, "rt": 18, "rp": 10, "eng": 162, "lang": "en", "tags": ["macro", "equities", "cycle"]}, {"h": "PeterLBrandt", "tier": 1, "b": "macro", "t": "2026-07-15 22:41", "x_zh": "各位，小心下面的帖子。持有交易资本存活四到五年是一回事，而把好钱扔进坏钱（这大概描述了80%持续给爆仓账户注资的人）则是另一回事。我个人认为人们应该", "x_en": "People, be careful with the post below. \nSurviving four to five years while holding onto trading capital is one thing\nThrowing good money after bad (which describes probably 80% of those who keep funding rekt accounts) is a different matter.\nPersonally, I think people should be", "u": "https://x.com/PeterLBrandt/status/2077523963669082341", "lk": 126, "rt": 5, "rp": 13, "eng": 144, "lang": "en", "tags": ["commodities", "technical", "trader"]}, {"h": "McClellanOsc", "tier": 2, "b": "macro", "t": "2026-07-15 21:06", "x_zh": "仍在教授菲利普斯曲线的教授们一定是从不看实际数据的人。如果看了，就会发现通胀的变动会在两年后反映在失业率上。所以，要实现‘最大就业’，只需", "x_en": "Professors who are still teaching the Phillips Curve must be people who never look at actual data. If one did that, one could see that the movements of inflation get echoed 2 years later in the unemployment rate. \n\nSo to achieve \"maximum employment\", all that has to happen is to", "u": "https://x.com/McClellanOsc/status/2077499978629648531", "lk": 74, "rt": 16, "rp": 10, "eng": 100, "lang": "en", "tags": ["macro", "technical", "cycle"]}, {"h": "michaelkantro", "tier": 2, "b": "macro", "t": "2026-07-15 20:03", "x_zh": "你要求一个选股者的市场。我看到三个主要主题正在压低相关性：1）人工智能；2）能源；3）利率敏感型。总体而言，这些主题中每天似乎有一个在起作用。将于美东时间下午4:05左右加入@CNBC讨论宏观和市场。", "x_en": "You asked for a stock picker's market. I see three major themes that are driving down correlations: 1) AI; 2) Energy; and 3) rate-sensitives. On balance, one of these themes appears to be working every day. Joining \n@CNBC\n to talk macro and markets around 4:05pm ET.", "u": "https://x.com/MichaelKantro/status/2077484285443846636", "lk": 43, "rt": 4, "rp": 7, "eng": 54, "lang": "en", "tags": ["macro", "cycle", "sellside"]}, {"h": "Mayhem4Markets", "tier": 2, "b": "macro", "t": "2026-07-16 05:13", "x_zh": "还记得人们说俄罗斯能果断拿下乌克兰吗？那是个可爱的幻想。现在怎么样了？", "x_en": "Remember when people said that Russia would be able to decisively take over Ukraine?\n\nThat was a cute fantasy. \n\nHow's it going now?", "u": "https://x.com/Mayhem4Markets/status/2077622662671528260", "lk": 24, "rt": 1, "rp": 9, "eng": 34, "lang": "en", "tags": ["macro", "rates_fx", "market_narrative"]}, {"h": "Mayhem4Markets", "tier": 2, "b": "macro", "t": "2026-07-16 04:07", "x_zh": "如果你不拥有自己的计算能力，那么很可能别人最终会拥有你的数据。明白这一点。", "x_en": "if you don't own your compute then it's quite likely someone else will end up owning your data.\n\nknow this.", "u": "https://x.com/Mayhem4Markets/status/2077605985871438178", "lk": 27, "rt": 3, "rp": 4, "eng": 34, "lang": "en", "tags": ["macro", "rates_fx", "market_narrative"]}, {"h": "ianbremmer", "tier": 1, "b": "geopolitics", "t": "2026-07-15 11:37", "x_zh": "不存在‘中等强国’战略，即一个能协调政策的连贯地缘政治集团。在担心美国可预测性和可靠性的国家中，贸易和安全关系上存在大量远离美国的对冲行为。", "x_en": "there is no “middle power” strategy in the sense of a coherent geopolitical grouping that could coordinate policy.\n\nthere’s a great deal of hedging away from the united states in trade and security ties among countries that worry about the predictability and dependability of the", "u": "https://x.com/ianbremmer/status/2077356999843491915", "lk": 609, "rt": 108, "rp": 43, "eng": 760, "lang": "en", "tags": ["geopolitics", "political_risk", "global_macro"]}, {"h": "samagreene", "tier": 1, "b": "geopolitics", "t": "2026-07-15 12:08", "x_zh": "翻译：我们希望盟友自主，只要他们不真正做任何决定，且他们的利益与我们的无法区分。", "x_en": "Translation: We would like our allies to be autonomous, so long as they don't actually make any decisions and their interests remain indistinguishable from ours.", "u": "https://x.com/samagreene/status/2077364653999472738", "lk": 357, "rt": 55, "rp": 1, "eng": 413, "lang": "en", "tags": ["geopolitics", "russia", "political_risk"]}, {"h": "shashj", "tier": 1, "b": "geopolitics", "t": "2026-07-15 19:26", "x_zh": "我认为西蒙尼把这和周末的橄榄球搞混了。", "x_en": "I think Simeone has this confused with the rugby on the weekend.", "u": "https://x.com/shashj/status/2077474866916208940", "lk": 70, "rt": 1, "rp": 3, "eng": 74, "lang": "en", "tags": ["geopolitics", "defense", "europe"]}, {"h": "natolambert", "tier": 2, "b": "weather", "t": "2026-07-15 18:27", "x_zh": "让我们估算一下Inkling最终RL训练的规模？\n初步猜测\n约1K GB300\n~1周\n~500万美元？\n这对后训练实验室来说会是一个有趣的面试题。很高兴看到这类信息被公开分享。", "x_en": "Let's estimate the scale of the inkling final RL run?\nAn initial guess\nO(1K GB300s)\n~1 week\n~$5M?\n\nWould be a fun interview question for a post-training lab. Glad to see some info like this shared publicly.", "u": "https://x.com/natolambert/status/2077460068518576458", "lk": 350, "rt": 24, "rp": 11, "eng": 385, "lang": "en", "tags": ["ai_semis", "ai_research", "models"]}, {"h": "natolambert", "tier": 2, "b": "weather", "t": "2026-07-15 18:28", "x_zh": "（这是基于Claude的猜测，希望能看到更严谨的数学计算，我认为Claude对代理场景中的推理成本感知不佳）", "x_en": "(this is a claude-informed guess, would like to see much more principled math on it, I think claude has a bad intuition of inference costs in agentic settings)", "u": "https://x.com/natolambert/status/2077460385549230202", "lk": 15, "rt": 0, "rp": 1,   function fmt(n){return n>=1000?(n/1000).toFixed(n>=10000?0:1)+"k":""+n}
  function hl(s,q){s=s||"";if(!q)return s;try{var re=new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");return s.replace(re,"<mark>$1</mark>")}catch(e){return s}}
  function cur(){return DATA[st.date]}
  function jumpHandle(h){$("#q").value="@"+h;st.q="@"+h;$("#clr").style.display="block";st.board="all";buildPills();render();$("#stream").scrollIntoView({behavior:"smooth",block:"start"})}
  function syncUi(){
    localStorage.setItem("windrise_lang",uiLang); document.documentElement.lang=uiLang==="en"?"en":"zh-CN";
    document.title=(uiLang==="en"?"KOL Trading Themes · Visual Terminal":"KOL 交易主线 · 可视化终端")+" · 2026-07-16";
    $("#title").innerHTML=tx("title"); $("#st1").textContent=tx("s1"); $("#st2").textContent=tx("s2"); $("#st3").textContent=tx("s3"); $("#st4").textContent=tx("s4");
    $("#q").placeholder=tx("search"); $("#reset").textContent=tx("reset");
    [["#sortSeg",["hot","latest"]],["#tierSeg",["all","tier1","tier2"]],["#langSeg",["bi","zhOnly","enOnly"]]].forEach(function(pair){
      var btns=$(pair[0]).querySelectorAll("button"); pair[1].forEach(function(k,i){btns[i].textContent=tx(k)})});
    app.querySelectorAll(".langsw button").forEach(function(b){b.setAttribute("data-on",b.dataset.lang===uiLang?"1":"")});
  }
  var dsel=$("#dateSel"); DATES.forEach(function(d){var o=document.createElement("option");o.value=d;o.textContent=d;dsel.appendChild(o)}); dsel.value=st.date;
  dsel.onchange=function(){st.date=dsel.value;st.board="all";renderAll()};

  function renderReport(){
    var r=report(),m=cur().meta;
    $("#win").textContent=uiLang==="en"?m.window_en:m.window_zh; $("#sub").textContent=uiLang==="en"?m.subtitle_en:m.subtitle_zh;
    var ih=$("#insights");ih.innerHTML=""; r.insights.forEach(function(it,i){var c=document.createElement("div");c.className="icard";c.innerHTML='<h3><span class="inum">'+(i+1)+'</span><span>'+it.title+'</span></h3><ul>'+it.points.map(function(p){return "<li>"+p+"</li>"}).join("")+'</ul>';ih.appendChild(c)});
    var sh=$("#sections");sh.innerHTML="";
    r.sections.forEach(function(pair){
      var name=pair[0],subs=pair[1],col=REPC[name]||"#5b8def",nvp=subs.reduce(function(a,s){return a+s[1].length},0);
      var inner=subs.map(function(sd){return '<div class="subg"><div class="subh" style="--sc:'+col+';color:'+col+'">'+sd[0]+'</div>'+sd[1].map(function(row){return '<div class="vp"><span class="vh" data-h="'+esc(row[0].replace("@",""))+'">'+row[0]+'</span>'+(row[1]?'<span class="vr">'+row[1]+'</span>':'')+row[2]+'</div>'}).join("")+'</div>'}).join("");
      var box=document.createElement("div");box.className="bsec";box.innerHTML='<div class="bhead" style="background:'+col+'">'+name+' <span style="font-weight:500;opacity:.75;font-size:12px">'+subs.length+' '+tx("domains")+' · '+nvp+' '+tx("items")+'</span><span class="arrow">▾</span></div><div class="bbody">'+inner+'</div>';
      var bd=box.querySelector(".bbody"),hd=box.querySelector(".bhead"); hd.onclick=function(){bd.style.display=bd.style.display==="none"?"":"none";box.querySelector(".arrow").textContent=bd.style.display==="none"?"▸":"▾"}; sh.appendChild(box);
    });
    sh.querySelectorAll(".vh").forEach(function(v){v.onclick=function(){jumpHandle(v.dataset.h)}});
    var uh=$("#unique");uh.innerHTML=""; r.unique.forEach(function(u){var c=document.createElement("div");c.className="ucard";c.innerHTML='<div class="uh" data-h="'+esc(u[0].replace("@",""))+'">'+u[0]+'</div><div class="uv">'+u[1]+'</div><div class="ui">'+tx("meaning")+u[2]+'</div>';c.querySelector(".uh").onclick=function(){jumpHandle(u[0].replace("@",""))};uh.appendChild(c)});
  }
  function buildPills(){
    var tw=cur().tweets,wrap=$("#boardPills");wrap.innerHTML=""; var counts={all:tw.length};Object.keys(BOARDS).forEach(function(k){counts[k]=0}); tw.forEach(function(t){counts[t.b]=(counts[t.b]||0)+1});
    function mk(key,label,color){var p=document.createElement("button");p.className="pill";p.innerHTML=label+' <span class="cnt">'+(counts[key]||0)+'</span>';if(st.board===key){p.setAttribute("data-on","1");p.style.background=color;p.style.borderColor=color} p.onclick=function(){st.board=key;buildPills();render()};return p}
    wrap.appendChild(mk("all",tx("all"),"#e7b24d")); Object.keys(BOARDS).forEach(function(k){wrap.appendChild(mk(k,boardLabel(k),BOARDS[k].color))});
  }
  function pass(t){
    if(st.board!=="all"&&t.b!==st.board)return false;
    if(st.tier!=="all"&&(""+t.tier)!==st.tier)return false;
    if(st.lang!=="all"&&t.lang!==st.lang)return false;
    if(st.q){var q=st.q.toLowerCase(); var hay=(bodyOf(t)+" "+(t.x_zh||"")+" "+(t.x_en||"")+" @"+t.h+" "+(t.tags||[]).join(" ")).toLowerCase(); if(hay.indexOf(q)<0)return false}
    return true
  }
  function render(){
    var m=cur().meta,tw=cur().tweets.filter(pass); tw.sort(function(a,b){return st.sort==="hot"?b.eng-a.eng:(a.t<b.t?1:-1)});
    var kol=new Set(tw.map(function(t){return t.h})).size; $("#tstat").innerHTML=tx("show")+' <b>'+tw.length+'</b> / '+m.n_tweets+' · <b>'+kol+'</b> '+tx("kols")+' · '+tx("monitor")+' '+m.n_accounts+' '+tx("accounts");
    var s=$("#stream"); if(!tw.length){s.innerHTML='<div class="empty">'+tx("empty")+'</div>';return} s.innerHTML="";
    tw.forEach(function(t){
      var B=BOARDS[t.b]||{color:"#5b8def"}, body=bodyOf(t), tags=(t.tags||[]).map(function(x){return '<span class="tag" data-tag="'+esc(x)+'">'+esc(x)+'</span>'}).join("");
      var c=document.createElement("div"); c.className="card"; c.tabIndex=0; c.style.setProperty("--bc",B.color);
      c.innerHTML='<div class="chead"><span class="hand" data-h="'+esc(t.h)+'">@'+esc(t.h)+'</span><span class="bchip" style="background:'+B.color+'">'+boardShort(t.b)+'</span>'+(t.tier===1?'<span class="t1">'+tx("tier1")+'</span>':'')+'<span class="lang">'+(t.lang==="zh"?tx("langZh"):tx("langEn"))+'</span><span class="time mono">'+esc(t.t)+'</span></div><div class="cbody">'+hl(body,st.q)+'</div><div class="cfoot"><span class="eng mono"><span>♥ '+fmt(t.lk)+'</span><span>⟲ '+fmt(t.rt)+'</span><span>💬 '+fmt(t.rp)+'</span></span><span class="tags">'+tags+'</span><span class="open">'+tx("open")+'</span></div>';
      var bodyEl=c.querySelector(".cbody"); requestAnimationFrame(function(){if(bodyEl.scrollHeight>bodyEl.clientHeight+4){bodyEl.classList.add("clamp"); var mm=document.createElement("span"); mm.className="more"; mm.textContent=tx("more"); bodyEl.after(mm); mm.onclick=function(e){e.stopPropagation();bodyEl.classList.toggle("open");bodyEl.classList.toggle("clamp");mm.textContent=bodyEl.classList.contains("open")?tx("less"):tx("more")}}});
      c.onclick=function(){window.open(t.u,"_blank","noopener")}; c.onkeydown=function(e){if(e.key==="Enter")window.open(t.u,"_blank","noopener")};
      c.querySelector(".hand").onclick=function(e){e.stopPropagation();jumpHandle(t.h)}; c.querySelectorAll(".tag").forEach(function(tg){tg.onclick=function(e){e.stopPropagation();$("#q").value=tg.dataset.tag;st.q=tg.dataset.tag;$("#clr").style.display="block";render()}});
      s.appendChild(c);
    })
  }
  function renderAll(){syncUi();renderReport();buildPills();render()}
  var qi=$("#q"),clr=$("#clr"); qi.oninput=function(){st.q=qi.value.trim();clr.style.display=qi.value?"block":"none";render()}; clr.onclick=function(){qi.value="";st.q="";clr.style.display="none";qi.focus();render()};
  document.addEventListener("keydown",function(e){if(e.key==="/"&&document.activeElement!==qi){e.preventDefault();qi.focus()} if(e.key==="Escape"&&document.activeElement===qi){qi.value="";st.q="";clr.style.display="none";render()}});
  function seg(id,key){var el=$(id);el.querySelectorAll("button").forEach(function(b){b.onclick=function(){el.querySelectorAll("button").forEach(function(x){x.removeAttribute("data-on")});b.setAttribute("data-on","1");st[key]=b.dataset.v;render()}})}
  seg("#sortSeg","sort"); seg("#tierSeg","tier"); seg("#langSeg","lang");
  $("#reset").onclick=function(){st.board="all";st.tier="all";st.lang="all";st.sort="hot";st.q="";qi.value="";clr.style.display="none";[["#sortSeg","hot"],["#tierSeg","all"],["#langSeg","all"]].forEach(function(p){var el=$(p[0]);el.querySelectorAll("button").forEach(function(x){x.setAttribute("data-on",x.dataset.v===p[1]?"1":"")})});buildPills();render()};
  app.querySelectorAll(".langsw button").forEach(function(b){b.onclick=function(){uiLang=b.dataset.lang;renderAll()}});
  renderAll();
})();
</script>
</div>
