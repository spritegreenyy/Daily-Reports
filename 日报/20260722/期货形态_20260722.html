$('#morphSectors').innerHTML=(D.morphology_sectors||[]).map(s=>{const v=s.breadth||0,w=Math.abs(v)*50;return '<div class="morph-sector"><strong><span>'+term(s.sector)+'</span><span class="score '+(v>0?'pos':v<0?'neg':'')+'">'+(v>0?'+':'')+Math.round(v*100)+'</span></strong><div class="vote-track"><i class="'+(v>=0?'up':'down')+'" style="width:'+w+'%"></i></div><small>'+t('positive')+' '+s.positive+' · '+t('negative')+' '+s.negative+' · '+t('noVote')+' '+s.neutral+'</small></div>'}).join('');
const morphLabel=x=>x==='偏多共振'?t('bullRes'):x==='偏空共振'?t('bearRes'):x==='弱偏多'?t('weakBull'):x==='弱偏空'?t('weakBear'):x==='多空分歧'?t('diverge'):t('noValid');$('#morphHead').innerHTML='<tr>'+t('morphHeaders').map(h=>'<th>'+h+'</th>').join('')+'</tr>';$('#morphBody').innerHTML=[...universe].sort((a,b)=>Math.abs((b.morphology||{}).breadth||0)-Math.abs((a.morphology||{}).breadth||0)).map(r=>{const m=r.morphology||{},v=m.breadth||0,dots=(m.votes||[]).map(x=>'<i class="'+(x.vote==='bullish'?'up':x.vote==='bearish'?'down':'')+'" title="'+x.window+'h">'+(x.vote==='bullish'?'+':x.vote==='bearish'?'−':'0')+'</i>').join('');return '<tr><td><span class="contract">'+term(r.name)+'</span></td><td><span class="score-pill '+(v>0?'up':v<0?'down':'')+'">'+(v>0?'+':'')+Math.round(v*100)+'</span></td><td>'+morphLabel(m.label)+'</td><td>'+[m.positive||0,m.negative||0,m.neutral||0].join(' / ')+'</td><td><div class="vote-dots">'+dots+'</div></td><td>'+(m.dominant_pattern?(lang==='en'?(PAT[m.dominant_pattern]||m.dominant_pattern):(PATZH[m.dominant_pattern]||m.dominant_pattern)):'—')+'</td></tr>'}).join('');
$('#decisions').innerHTML=qualified.length?qualified.map(r=>{const up=r.bias==='bullish',active=r.trade_state==='active',instruction=active?(up?t('activeUp'):t('activeDown')):(up?t('waitUp'):t('waitDown'))+' '+fmt(r.trigger);const checks=[[r.trend_aligned,r.trend_aligned?t('trendOk'):t('trendNo')],[r.volume_confirmed,r.volume_confirmed?t('volumeOk'):t('volumeNo')],[r.oi_confirmed,r.oi_confirmed?t('oiOk'):t('oiNo')]];return '<article class="decision '+(up?'':'short')+'"><div class="decision-top"><h3>'+term(r.name)+' · '+(lang==='en'?(PAT[r.pattern]||r.pattern):r.pattern_cn)+'</h3><span class="badge">'+state(r.trade_state)+'</span></div><div class="instruction">'+instruction+'</div><div class="levels">'+[[t('trigger'),r.trigger],[t('target'),r.target],[t('stop'),r.stop]].map(x=>'<div class="level"><small>'+x[0]+'</small><b>'+fmt(x[1])+'</b></div>').join('')+'</div><div class="evidence">'+checks.map(x=>'<span class="ev '+(x[0]?'yes':'no')+'">'+x[1]+'</span>').join('')+'<span class="ev">'+t('rr')+' '+fmt(r.reward_risk,2)+'</span><span class="ev">'+bt(r)+'</span></div></article>'}).join(''):'<div class="empty">'+t('none')+'</div>';
$('#sectors').innerHTML=(D.sectors||[]).map(s=>{const total=s.contracts||1,b=s.bullish_trends||0,be=s.bearish_trends||0,n=s.neutral_trends||0;return '<div class="sector"><div class="sector-top"><span>'+term(s.sector)+'</span><span class="'+(s.bias==='bullish'?'pos':s.bias==='bearish'?'neg':'')+'">'+bias(s.bias)+'</span></div><div class="breadth"><i class="bull" style="width:'+(b/total*100)+'%"></i><i class="bear" style="width:'+(be/total*100)+'%"></i><i class="neutral" style="width:'+(n/total*100)+'%"></i></div><small>'+t('sectorMeta').replace('{b}',b).replace('{s}',be).replace('{n}',n)+'</small></div>'}).join('');
$('#scanHead').innerHTML='<tr>'+t('headers').map(h=>'<th>'+h+'</th>').join('')+'</tr>';$('#scanBody').innerHTML=universe.map(r=>{const c=r.context||{},has=r.pattern,pattern=has?(lang==='en'?(PAT[r.pattern]||r.pattern):r.pattern_cn):t('noPattern'),dist=r.distance_atr==null?'—':fmt(r.distance_atr,1)+' ATR';return '<tr><td><span class="contract">'+term(r.name)+'</span><br><span class="mini">'+(r.code||'')+'</span></td><td>'+pattern+'<br><span class="state '+(r.trade_state||'none')+'">'+state(r.trade_state)+'</span></td><td class="'+(c.trend==='bullish'?'pos':c.trend==='bearish'?'neg':'')+'">'+bias(c.trend)+'<br><span class="mini">'+t(c.volatility||'normal')+'</span></td><td>'+pct(c.momentum20)+'</td><td>'+fmt(c.volume_ratio,2)+'×</td><td>'+pct(c.oi_change)+'</td><td>'+dist+'</td><td>'+bt(r)+'</td></tr>'}).join('');
const charts=(D.results||[]).filter(r=>['active','setup','monitor'].includes(r.trade_state));$('#chartSection').style.display=charts.length?'block':'none';$('#charts').innerHTML=charts.map(r=>'<article class="chart-card"><div class="chart-meta"><h3>'+term(r.name)+' · '+(lang==='en'?(PAT[r.pattern]||r.pattern):r.pattern_cn)+'</h3><span>'+state(r.trade_state)+' · '+t('rr')+' '+fmt(r.reward_risk,2)+'</span></div><img src="data:image/png;base64,'+r.img+'" alt="'+term(r.name)+'"></article>').join('');
$('#methods').innerHTML=[['morphMethod','morphDesc'],['trendMethod','trendDesc'],['volumeMethod','volumeDesc'],['oiMethod','oiDesc'],['backtestMethod','backtestDesc'],['qualityMethod','qualityDesc']].map(x=>'<div class="method"><b>'+t(x[0])+'</b><span>'+t(x[1])+'</span></div>').join('');$('#foot').textContent=t('source')+': Sina Finance / akshare hourly main-continuous bars · '+D.asof+' · Descriptive research only, not investment advice · WINDRISE';}
document.querySelectorAll('.langsw button').forEach(b=>b.onclick=()=>{lang=b.dataset.lang;render()});$('#lightbox').onclick=()=>$('#lightbox').style.display='none';document.addEventListener('click',e=>{if(e.target.matches('.chart-card img')){$('#lightbox img').src=e.target.src;$('#lightbox').style.display='flex'}});render();
</script></body></html>
