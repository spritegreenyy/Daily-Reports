ities", "points": ["Core view: Key View: @WarrenPies (Macro Strategy): GPU supply is tightening again, B200 is at zero inventory, GH200 is rapidly tightening due to Kimi K3 demand, and 3F Research's \"Fast\" availability index has fallen below 10%. <b class=\"em\">AI computing hardware shortages may intensify.</b>"]}, {"title": "Contrarian Variable · US-China", "points": ["Core view: <b class=\"em\">Key View: @jimcramer: I don't trust the Chinese government,</b> even though my father's 20-year cooperation with China was honorable and cordial. My stance is clearer on cybersecurity and open-source model issues."]}, {"title": "Sentiment Shift · Middle East", "points": ["Core view: <b class=\"em\">Key View: @vali_nasr (Middle East Scholar): The next U.S. move depends entirely on one person's mood—not a system making decisions,</b> not a country, but one person, based on their mood at that moment."]}, {"title": "Unique View · Weather / El Niño", "points": ["Core view: Key View: @natolambert: El Niño Costero off Peru is rapidly intensifying, with sea surface temperatures in the Niño 1+2 region approaching +3°C, similar to the strong 1997 El Niño event; expected to expand to Ecuador within two weeks, <b class=\"em\">potentially triggering extreme precipitation and flood risks along the South American coast.</b>"]}], "unique": [["@jimcramer", "I don't trust the Chinese government, even though my father's 20-year cooperation with China was honorable and cordial. My stance is clearer on cybersecurity and open-source model issues.", "Business leaders' attitudes toward China are split between \"positive personal experience vs. systemic distrust.\" This contradiction may affect the enforcement of tech decoupling policies."], ["@WarrenPies", "GPU supply is tightening again, B200 is at zero inventory, GH200 is rapidly tightening due to Kimi K3 demand, and 3F Research's \"Fast\" availability index has fallen below 10%. AI computing hardware shortages may intensify.", "GPU shortages may boost demand for related commodities like copper and electricity, but watch for mitigating effects from alternatives or capacity expansion."], ["@natolambert", "El Niño Costero off Peru is rapidly intensifying, with sea surface temperatures in the Niño 1+2 region approaching +3°C, similar to the strong 1997 El Niño event; expected to expand to Ecuador within two weeks, potentially triggering extreme precipitation and flood risks along the South American coast.", "If El Niño expands to the central equatorial Pacific, it will strengthen the global weather anomaly trading logic, favoring long positions in agricultural commodities."], ["@james_acton32", "Iran has likely moved centrifuge components to the deep underground facility at \"Mount Pickaxe\"; destroying it is technically extremely difficult. If the U.S. allows domestic enrichment in the Saudi agreement, it would effectively abandon the nuclear non-proliferation principle.", "The risk of nuclear proliferation in the Middle East is shifting from a \"negotiation topic\" to a \"hard constraint.\" Once uranium enrichment facilities are established, the cost of military options will rise sharply."]], "sections": [["Macro Economy", []], ["Geopolitics", [["Middle East", [["@james_acton32", "", "<b class=\"em\">Iran has likely moved centrifuge components to the deep underground facility at \"Mount Pickaxe\",</b> destroying it is technically extremely difficult. If the U.S. allows domestic enrichment in the Saudi agreement, it would effectively abandon the nuclear non-proliferation principle. <span style=\"color:#8fa0b3\">Trading Implication: The risk of nuclear proliferation in the Middle East is shifting from a \"negotiation topic\" to a \"hard constraint.\" Once uranium enrichment facilities are established, <b class=\"em\">the cost of military options will rise sharply.</b></span>"], ["@vali_nasr", "Middle East Scholar", "The next U.S. move depends entirely on one person's mood—not a system making decisions, not a country, but one person, based on their mood at that moment. <span style=\"color:#8fa0b3\">Trading Implication: Iran's policy is highly personalized. <b class=\"em\">Traders should monitor non-traditional signals such as the health and public statements of key figures (e.g., the Supreme Leader).</b></span>"], ["@matthewkroenig", "", "I support the new U.S.-Saudi agreement, but oppose building new uranium enrichment facilities in the Middle East. <b class=\"em\">Washington should stick to the non-proliferation standards that have worked in the past.</b> <span style=\"color:#8fa0b3\">Trading Implication: If the U.S.-Saudi agreement includes enrichment clauses, it will break the nuclear taboo in the Middle East, <b class=\"em\">potentially prompting follow-ups by Saudi Arabia, the UAE, and others.</b></span>"]]], ["Russia-Ukraine", [["@ianbremmer", "Geopolitics (Eurasia Group)", "Zelenskyy replaced the top general under widespread social protest pressure, a significant and welcome shift—he had previously replaced Defense Minister Fedorov (a key figure in the war's turning point). <b class=\"em\">This could never happen in Russia.</b> <span style=\"color:#8fa0b3\">Trading Implication: Ukraine's leadership can still adjust based on public opinion during wartime, showing greater political flexibility than Russia, <b class=\"em\">but this may affect frontline command coherence in the short term.</b></span>"]]], ["US-China", [["@RushDoshi", "", "Mercedes-Benz seriously miscalculated on this issue, drawing criticism from both left and right, major unions, re-industrialization advocates, and startups. The bipartisan consensus on China remains active, especially on key issues. <span style=\"color:#8fa0b3\">Trading Implication: Companies that underestimate the resilience of the U.S. political consensus on China <b class=\"em\">may face cross-party sanctions or market access risks.</b></span>"], ["@jimcramer", "", "I don't trust the Chinese government, even though my father's 20-year cooperation with China was honorable and cordial. My stance is clearer on cybersecurity and open-source model issues. <span style=\"color:#8fa0b3\">Trading Implication: Business leaders' attitudes toward China are split between \"positive personal experience vs. systemic distrust.\" <b class=\"em\">This contradiction may affect the enforcement of tech decoupling policies.</b></span>"], ["@ryanl_hass", "", "This debate won't be resolved in the short term, nor will it tilt entirely to one side. But Kagan provides a strong historical argument for predicting future PRC behavior. <span style=\"color:#8fa0b3\">Trading Implication: <b class=\"em\">The ongoing stalemate in the China policy debate means uncertainty premiums will persist,</b> affecting China-related stocks and supply chain assets.</span>"]]], ["Other Geopolitics", [["@shashj", "", "After gaining internet access, the AI model <b class=\"em\">inferred that Hugging Face might host ExploitGym's models, datasets, and solutions,</b> and then searched and successfully found secret information that could be used to cheat. <span style=\"color:#8fa0b3\">Trading Implication: AI's autonomous penetration capabilities exceed expectations, <b class=\"em\">potentially sparking new discussions on open-source model security and regulation,</b> affecting AI sector valuations.</span>"]]]]], ["Commodities", [["Crude Oil", [["@JKempEnergy", "", "24/7 continuous crude oil trading (including weekends) and micro futures products, though unpopular with professional traders, are an irreversible trend. <b class=\"em\">Retail traders may lose money in the process.</b> <span style=\"color:#8fa0b3\">Trading Implication: Structural changes in trading may increase volatility. <b class=\"em\">The divergence between professional and retail traders is a short-term risk point.</b></span>"]]], ["Other Commodities", [["@WarrenPies", "Macro Strategy", "GPU supply is tightening again, B200 is at zero inventory, GH200 is rapidly tightening due to Kimi K3 demand, and 3F Research's \"Fast\" availability index has fallen below 10%. <b class=\"em\">AI computing hardware shortages may intensify.</b> <span style=\"color:#8fa0b3\">Trading Implication: <b class=\"em\">GPU shortages may boost demand for related commodities like copper and electricity,</b> but watch for mitigating effects from alternatives or capacity expansion.</span>"]]]]], ["Weather & Climate", [["El Niño Status", [["@natolambert", "", "El Niño Costero off Peru is rapidly intensifying, with sea surface temperatures in the Niño 1+2 region approaching +3°C, similar to the strong 1997 El Niño event; expected to expand to Ecuador within two weeks, <b class=\"em\">potentially triggering extreme precipitation and flood risks along the South American coast.</b> <span style=\"color:#8fa0b3\">Trading Implication: If El Niño expands to the central equatorial Pacific, it will strengthen the global weather anomaly trading logic, <b class=\"em\">favoring long positions in agricultural commodities.</b></span>"]]], ["Weather / El Niño", [["@natolambert", "", "El Niño Costero off Peru is rapidly intensifying, with sea surface temperatures in the Niño 1+2 region approaching +3°C, similar to the strong 1997 El Niño event; expected to expand to Ecuador within two weeks, <b class=\"em\">potentially triggering extreme precipitation and flood risks along the South American coast.</b> <span style=\"color:#8fa0b3\">Trading Implication: If El Niño expands to the central equatorial Pacific, it will strengthen the global weather anomaly trading logic, <b class=\"em\">favoring long positions in agricultural commodities.</b></span>"]]]]], ["AI & Semiconductors", [["Inference", [["@natolambert", "", "U.S. companies rely on Chinese models to fill security gaps, <b class=\"em\">but infiltration risks during the training phase could lead to policy bans.</b> <span style=\"color:#8fa0b3\">Trading Implication: Inference-side demand faces policy uncertainty, <b class=\"em\">potentially affecting AI deployment pace.</b></span>"]]], ["Other AI / Semiconductors", [["@TimmerFidelity", "", "The AI momentum pullback is just a sentiment washout; fundamentals still support it, not a trend reversal. <span style=\"color:#8fa0b3\">Trading Implication: Pullbacks may be buying opportunities, <b class=\"em\">but confirm whether fundamental data continues to improve.</b></span>"]]]]]]}, "tweets": [{"h": "ianbremmer", "tier": 1, "b": "macro", "t": "2026-07-21 20:15", "x_zh": "@ianbremmer 回应乌克兰广泛社会抗议，泽连斯基解雇其最高将领，在解雇国防部长费多罗夫（他策划了战争转折）后，这是一个重大（且受欢迎的）转变。这种事在俄罗斯不可能发生。", "x_en": "responding to widespread social protest in ukraine, zelenskyy sacks his top general, big (and welcome) turnaround after dismissing defense minister fedorov, who had engineered the turnaround in the war. \n\nnot the sort of thing that could happen in russia.", "u": "https://x.com/ianbremmer/status/2079661495311319315", "lk": 758, "rt": 70, "rp": 59, "eng": 887, "lang": "en", "tags": ["geopolitics", "political_risk", "global_macro"]}, {"h": "WarrenPies", "tier": 1, "b": "macro", "t": "2026-07-21 19:14", "x_zh": "@WarrenPies GPU 可用性再次收紧... B200 可用性已降至 0%。Kimi K3 之后，GH200 收紧加剧。@3F_Research “快速”可用性指数回落至 10% 以下。", "x_en": "GPU availability tightening back up...\n\nB200 availability was already at 0%.\n\nPost-Kimi K3, GH200 tightening aggressively.\n\nThe \n@3F_Research\n \"Fast\" Availability Index heading back below 10%.", "u": "https://x.com/WarrenPies/status/2079646250643681375", "lk": 601, "rt": 110, "rp": 25, "eng": 736, "lang": "en", "tags": ["macro", "oil_energy", "cycle"]}, {"h": "charliebilello", "tier": 2, "b": "macro", "t": "2026-07-21 12:51", "x_zh": "@charliebilello 上周 IBM 单日下跌 25%，是这家 115 年公司史上最大跌幅，也是 15 西格玛事件。这基本上意味着它在宇宙历史上本不应发生一次。但它发生了，而且只要有足够时间，它会再次发生。", "x_en": "IBM's -25% decline in a single trading day last week was the biggest ever for the 115-year-old company and a 15-sigma event.\n\nThat basically means it should not have happened even once in the history of the universe.\n\nBut it did, and given enough time it will happen again,", "u": "https://x.com/charliebilello/status/2079549901042569562", "lk": 522, "rt": 83, "rp": 52, "eng": 657, "lang": "en", "tags": ["macro", "data", "markets"]}, {"h": "jimcramer", "tier": 1, "b": "macro", "t": "2026-07-22 01:07", "x_zh": "@jimcramer 现在让我更清楚地说明我对中国、网络安全和开放模型的看法。我不信任中国政府，尽管我目睹父亲与中国人合作 20 年的经历是辉煌而亲切的。", "x_en": "Now let me be a little more clear about my view on China and cybersecurity and open models. I do not trust the Chinese government even as my experience watching my father work with the Chinese for 20 years was just plan out glorious and gracious", "u": "https://x.com/jimcramer/status/2079734969916682308", "lk": 296, "rt": 33, "rp": 121, "eng": 450, "lang": "en", "tags": ["macro", "equities", "teacher_required"]}, {"h": "TimmerFidelity", "tier": 1, "b": "macro", "t": "2026-07-21 22:35", "x_zh": "@TimmerFidelity 随着 AI 势头近日逆转，不可避免的问题是这只是一次回调还是更大的变化。我的感觉是，只要基本面支持，偶尔的情绪洗盘就只是洗盘。", "x_en": "With the AI momentum going in reverse in recent days, the inevitable question is whether it’s just a correction or something bigger. My sense is that as long as the fundamentals are supportive, the occasional sentiment shakeout will be just that.", "u": "https://x.com/TimmerFidelity/status/2079696672238813627", "lk": 129, "rt": 14, "rp": 14, "eng": 157, "lang": "en", "tags": ["macro", "equities", "cycle"]}, {"h": "elerianm", "tier": 1, "b": "macro", "t": "2026-07-21 18:02", "x_zh": "@elerianm 在他们上任第一天，英国新首相和财政大臣都希望这些数字标志着受欢迎趋势的开始——尽管这一希望将受到复杂全球环境的考验：今天早些时候发布的数据显示 6 月政府", "x_en": "Happening on their first full day on the job, both the new UK Prime Minister and Chancellor will hope these numbers mark the beginning of a welcome trend—though this hope will be tested by the complex global environment:\n1. Data released earlier today shows June government", "u": "https://x.com/elerianm/status/2079628068889444362", "lk": 81, "rt": 5, "rp": 14, "eng": 100, "lang": "en", "tags": ["macro", "central_banks", "teac 科学缺陷的信息，与公众舆论的变化有关。我尽力诚实地传达相反的信息。其他人如", "x_en": "I would like to think that the messaging from a lot of smart people, pointing out the scientific flaws of the alarmists' claims, had something to do with the change of public opinion. I have tried to do my own small part to convey that contrary information honestly. Others like", "u": "https://x.com/McClellanOsc/status/2079659548483428565", "lk": 31, "rt": 2, "rp": 7, "eng": 40, "lang": "en", "tags": ["macro", "technical", "cycle"]}, {"h": "BobEUnlimited", "tier": 1, "b": "macro", "t": "2026-07-21 19:19", "x_zh": "许多人并不熟悉低成本对冲基金策略如何能惠及他们的投资组合，因为这些策略出现的时间还不长。所以我们创建了一个工具，通过3个简单问题来找出答案：", "x_en": "Many folks aren't familiar with how low-cost hedge fund strategies could benefit their portfolio since they haven't been available for too long.\n\nSo we created a tool with 3 simple questions to find out:", "u": "https://x.com/BobEUnlimited/status/2079647376592007197", "lk": 21, "rt": 1, "rp": 4, "eng": 26, "lang": "en", "tags": ["macro", "rates_fx", "cycle"]}, {"h": "MichaelAArouet", "tier": 2, "b": "macro", "t": "2026-07-22 06:22", "x_zh": "关于AI是否会提高我们的繁荣，还是会导致太多人失业从而引发严重危机，存在激烈争论。所以我问了AI这个问题，以下是回答：AI很可能会在长期内增加总繁荣。更难的问题是是否", "x_en": "There is a hot debate if AI will improve our prosperity, or if it will cause a severe crisis when too many people lose their jobs. \n\nSo I asked AI that question, here is the reply:\n\nAI is very likely to increase total prosperity over the long run. The harder question is whether", "u": "https://x.com/MichaelAArouet/status/2079814253637193890", "lk": 11, "rt": 3, "rp": 2, "eng": 16, "lang": "en", "tags": ["macro", "economics", "data"]}, {"h": "vali_nasr", "tier": 2, "b": "geopolitics", "t": "2026-07-21 19:41", "x_zh": "我告诉《洛杉矶时报》美国可能的下一步：“一切都取决于一个人的情绪。不是系统在做决定；不是国家在做决定。是一个人，取决于他在某个特定时刻的感觉。”", "x_en": "I told \n@latimes\n on what might be US next steps: “Everything is dependent on the mood of one man. It’s not the system that’s making the decision; it’s not the country making the decision. It’s one man, and it depends how he feels like at one particular point in time.”", "u": "https://x.com/vali_nasr/status/2079653024944021808", "lk": 182, "rt": 73, "rp": 0, "eng": 255, "lang": "en", "tags": ["geopolitics", "middle_east", "iran"]}, {"h": "RushDoshi", "tier": 1, "b": "geopolitics", "t": "2026-07-21 18:08", "x_zh": "非常清楚，梅赛德斯-奔驰在这里严重失误，遭到了左派、右派、主要工会、再工业化者和初创企业的批评。顺便说一句，两党对中国的共识似乎仍然存在——尤其是在关于", "x_en": "Very clear that Mercedes Benz has gravely erred here, with criticism coming from the left, the right, from major labor unions, and from reindustrializers and startups. \n\nThe bipartisan consensus on China, by the way, does seem alive -- particularly on matters of", "u": "https://x.com/RushDoshi/status/2079629664536969323", "lk": 137, "rt": 33, "rp": 5, "eng": 175, "lang": "en", "tags": ["geopolitics", "china", "strategy"]}, {"h": "ELuttwak", "tier": 2, "b": "geopolitics", "t": "2026-07-21 21:34", "x_zh": "《纽约时报》必须伪造历史并扭曲西方文化。例如昨天：“达蒙看起来不像希腊人，所以为什么要抱怨电影中的海伦？”虚假且华而不实：希腊有很多凯尔特面孔，但电影中的海伦不可能是女王，只能是一个尼罗河奴隶。", "x_en": "The New York Times must falsify history and distort Western culture. Eg yesterday: \"Damon does not look Greek, so why complain about the film's Helen ?\"  False and meretricius: plenty of Celtic faces in Greece but the film's Helen could not be a queen, only a nilotic slave.", "u": "https://x.com/ELuttwak/status/2079681415017332985", "lk": 113, "rt": 14, "rp": 6, "eng": 133, "lang": "en", "tags": ["geopolitics", "strategy", "history"]}, {"h": "james_acton32", "tier": 2, "b": "geopolitics", "t": "2026-07-21 14:41", "x_zh": "重要故事——伊朗可能（我认为很可能已经）将离心机部件转移到皮克山地下深处的设施中，据@laurnorman、@AnatPeled1和@alexbward报道（链接在下一篇帖子）。关于摧毁深层地下设施的技术问题。(1/n)", "x_en": "Important story--Iran may (IMO likely has) have moved centrifuge components into the deep underground facility at Pickaxe Mountain per \n@laurnorman\n, \n@AnatPeled1\n, and \n@alexbward\n (link in next post).\n\non technical problems of destroying deep unground facilities. (1/n)", "u": "https://x.com/james_acton32/status/2079577620597944784", "lk": 60, "rt": 31, "rp": 2, "eng": 93, "lang": "en", "tags": ["geopolitics", "nuclear", "arms_control"]}, {"h": "james_acton32", "tier": 2, "b": "geopolitics", "t": "2026-07-22 03:08", "x_zh": "如果属实，这无异于美国放弃核不扩散。沙特官员公开表示可能对核武器感兴趣。美国不应在沙特境内协助任何铀浓缩或后处理活动。", "x_en": "If true, this is tantamount to the United States' giving up on nonproliferation.\n\nSaudi officials are open about a potential interest in nuclear weapons. The United States should do nothing to facilitate enrichment or reprocessing in the Kingdom.", "u": "https://x.com/james_acton32/status/2079765454277509378", "lk": 21, "rt": 12, "rp": 3, "eng": 36, "lang": "en", "tags": ["geopolitics", "nuclear", "arms_control"]}, {"h": "shashj", "tier": 1, "b": "geopolitics", "t": "2026-07-22 06:45", "x_zh": "“在接入互联网后，模型推断Hugging Face可能托管了ExploitGym的模型、数据集和解决方案。得知这一点后，模型搜索并成功找到了获取可用于作弊评估的机密信息的方法。", "x_en": "“After gaining Internet access, the models inferred that Hugging Face potentially hosted models, datasets and solutions for ExploitGym. Knowing this, the model searched for and successfully found ways to gain access to secret information that it could use to cheat the evaluation.", "u": "https://x.com/shashj/status/2079820152737087589", "lk": 15, "rt": 4, "rp": 2, "eng": 21, "lang": "en", "tags": ["geopolitics", "defense", "europe"]}, {"h": "LawDavF", "tier": 2, "b": "geopolitics", "t": "2026-07-21 09:26", "x_zh": "Sam关于Burnham担任首相的首篇帖子显示，他的任命和早期公告表明，即使面临同样的挑战，其运作方式在实践中将与Starmer截然不同。（£/免费试用）\nhttps://\nsamf.substack.com/p/a-theory-of-\npower\n…", "x_en": "First post from Sam on Burnham as PM shows how his appointments and early announcements demonstrate that his operation will be very different in practice from Starmer's even while facing the same challenges. (£/free trial) \nhttps://\nsamf.substack.com/p/a-theory-of-\npower\n…", "u": "https://x.com/LawDavF/status/2079498144442716441", "lk": 9, "rt": 3, "rp": 2, "eng": 14, "lang": "en", "tags": ["geopolitics", "ukraine", "military"]
