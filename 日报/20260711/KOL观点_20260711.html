lication: Microsoft收购expectations是AIsector情绪催化剂, 失败则削弱产业链合作逻辑</span>"], ["@TimmerFidelity", "", "投机资金从比特币到黄金再到半导体, 推动费城半导体指数远超流动性支撑; 若跌破<b class=\"em\">4000</b>点, 黄金may被低估. <span style=\"color:#8fa0b3\">Trading implication: 半导体sector已脱离基本面, 流动性收紧或资金轮出will引发剧烈pullback</span>"]]]]]]}, "tweets": [{"h": "unusual_whales", "tier": 2, "b": "macro", "t": "2026-07-11 05:41", "x_zh": "特朗普表示，如果他遇刺，伊朗将被“彻底摧毁”。", "x_en": "Trump says if he is assassinated, Iran will be \"completely decimated\"", "u": "https://x.com/unusual_whales/status/2075817649343512596", "lk": 511, "rt": 69, "rp": 127, "eng": 707, "lang": "en", "tags": ["macro", "options_flow", "trader"]}, {"h": "jimcramer", "tier": 1, "b": "macro", "t": "2026-07-10 14:42", "x_zh": "微软与OpenAI的关系如此紧张，真是遗憾。微软让股价上涨超过200点的方式是通过大规模股权和债务交易与OpenAI合并。如果OpenAI无法达成交易，其真实价格将开始下跌。", "x_en": "It is such a shame that Microsoft's relationship with OpenAI is so strained. The way that MSFT gets its stock up more than 200 points is to merge with them paid for by a giant equity and debt deal. The real price of OpenAI will start to go down if they don't get a deal done.", "u": "https://x.com/jimcramer/status/2075591550424256536", "lk": 427, "rt": 20, "rp": 99, "eng": 546, "lang": "en", "tags": ["macro", "equities", "teacher_required"]}, {"h": "TaviCosta", "tier": 1, "b": "macro", "t": "2026-07-10 20:08", "x_zh": "投资者最大的错误之一是假设过去十年的赢家将引领下一个十年。市场并非如此运作。资本流动具有周期性，领导地位轮换，估值差距最终会收窄。拉丁美洲可能是最具吸引力的地区之一。", "x_en": "One of investors' biggest mistakes is assuming the winners of the last decade will lead the next one.\n\nMarkets don't work that way.\n\nCapital flows are cyclical, leadership rotates, and valuation gaps eventually close. \n\nLatin America may be one of the most compelling", "u": "https://x.com/TaviCosta/status/2075673557737033860", "lk": 382, "rt": 47, "rp": 16, "eng": 445, "lang": "en", "tags": ["macro", "commodities", "cycle"]}, {"h": "jimcramer", "tier": 1, "b": "macro", "t": "2026-07-10 11:15", "x_zh": "SK海力士的分析师应在周一公布上调后的数据，以保持局势紧张。我仍然不喜欢承销团经理如此细致入微。但其中也有一些不错的纯多头基金。", "x_en": "The SK Hynix analysts should come out Monday with raised numbers to keep this thing tight.. I still don't like how the syndicate managers are so granular. But there are some good long only's in the mix.", "u": "https://x.com/jimcramer/status/2075539302134538746", "lk": 300, "rt": 19, "rp": 68, "eng": 387, "lang": "en", "tags": ["macro", "equities", "teacher_required"]}, {"h": "TimmerFidelity", "tier": 1, "b": "macro", "t": "2026-07-10 21:30", "x_zh": "至于比特币，它也可能处于积累区域（在我看来）。在6万美元时，它越来越接近其幂律支撑线。", "x_en": "As for Bitcoin, it too may be in an accumulation zone (in my view). At $60k it’s getting ever closer to its power law support line.", "u": "https://x.com/TimmerFidelity/status/2075694050074915222", "lk": 323, "rt": 38, "rp": 17, "eng": 378, "lang": "en", "tags": ["macro", "equities", "cycle"]}, {"h": "TimmerFidelity", "tier": 1, "b": "macro", "t": "2026-07-10 20:20", "x_zh": "很明显，曾经在比特币中的快钱转向了黄金，将金价推高至远超全球流动性合理水平。现在这些投机者进入了半导体领域。无论我们是守住4000美元还是进一步下跌，在我看来，这表明黄金可能值得关注。", "x_en": "It’s clear that the fast money that used to be in Bitcoin then went to gold, pushing the gold price far higher than global liquidity would justify. Now those speculators are in semiconductors. Whether we hold $4k or decline further, which, in my view, indicates gold may be worth", "u": "https://x.com/TimmerFidelity/status/2075676432672452626", "lk": 253, "rt": 26, "rp": 17, "eng": 296, "lang": "en", "tags": ["macro", "equities", "cycle"]}, {"h": "BobEUnlimited", "tier": 1, "b": "macro", "t": "2026-07-10 10:15", "x_zh": "做多日元？！？这可不是共识……日元空头头寸目前拥挤，而经济状况、政策努力和资产市场正开始转向有利于日本。这种动态为反转创造了条件。https://bobeunlimited.substack.com/p/long-jpy-now-thats-nonconsensus", "x_en": "Long JPY?!?! Now That’s Nonconsensus…\n\nJPY shorts are crowded right at a time when economic conditions, policy efforts, and asset markets are starting to shift in favor of Japan. The sort of dynamics that create the set up for a reversal. \n\n\nhttps://\nbobeunlimited.substack.com/p/long-jpy-now\n-thats-nonconsensus\n…", "u": "https://x.com/BobEUnlimited/status/2075524351827272058", "lk": 185, "rt": 32, "rp": 19, "eng": 236, "lang": "en", "tags": ["macro", "rates_fx", "cycle"]}, {"h": "TimmerFidelity", "tier": 1, "b": "macro", "t": "2026-07-10 19:13", "x_zh": "转向黄金以及它为何没有达到预期表现，我重新审视了上周的图表，显示黄金相对于全球货币供应量是“便宜”的。随着全球M2增速从12%放缓至6%（并持续下降），黄金的催化剂是", "x_en": "Moving to gold and why it hasn’t done what it’s supposed to do, I revisit below my charts from last week which shows that gold is “cheap” relative to the global money supply. With global M2 decelerating from a growth rate of 12% to 6% (and declining), the catalyst for gold is", "u": "https://x.com/TimmerFidelity/status/2075659570756919441", "lk": 168, "rt": 21, "rp": 12, "eng": 201, "lang": "en", "tags": ["macro", "equities", "cycle"]}, {"h": "donnelly_brent", "tier": 1, "b": "macro", "t": "2026-07-10 21:11", "x_zh": "*美国官员称预计伊朗将宣布霍尔木兹海峡免费通行\n笑话自己就写好了", "x_en": "*US OFFICIALS SAY EXPECT IRAN TO SAY HORMUZ WILL BE TOLL-FREE\n\nthe jokes write themselves", "u": "https://x.com/donnelly_brent/status/2075689502194950269", "lk": 89, "rt": 5, "rp": 6, "eng": 100, "lang": "en", "tags": ["macro", "rates_fx", "trader"]}, {"h": "M_McDonough", "tier": 2, "b": "macro", "t": "2026-07-10 14:31", "x_zh": "滞胀悄然进入2026年彭博共识：自对伊朗打击以来，经济学家下调了美国GDP预测并上调了CPI——目前增长预期为2.1%，通胀率为3.4%", "x_en": "Stagflation Creeps Into the 2026 Bloomberg Consensus: Economists have cut US GDP forecasts and raised CPI since the strike on Iran — growth now seen at 2.1%, inflation at 3.4%", "u": "https://x.com/M_McDonough/status/2075588663224713712", "lk": 58, "rt": 18, "rp": 5, "eng": 81, "lang": "en", "tags": ["macro", "economics", "data"]}, {"h": "unusual_whales", "tier": 2, "b": "macro", "t": "2026-07-11 04:59", "x_zh": "格里芬指出，他历史上曾支持鲁比奥，在鲁比奥2016年总统竞选失败期间向他捐款，并且会倾向于再次支持他。\n\n阅读更多：", "x_en": "Griffin noted that he'd historically backed Rubio, donated to him during his unsuccessful 2016 presidential run, and would be predisposed to backing him again  "rt": 306, "rp": 52, "eng": 1358, "lang": "en", "tags": ["geopolitics", "middle_east", "diplomacy"]}, {"h": "ianbremmer", "tier": 1, "b": "geopolitics", "t": "2026-07-10 18:54", "x_zh": "驼鹿认为可能还有额外的小零食（但运气不好，并没有）", "x_en": "moose thinking an extra treat might be in order (it is not, as luck would have it)", "u": "https://x.com/ianbremmer/status/2075654975703630327", "lk": 154, "rt": 3, "rp": 8, "eng": 165, "lang": "en", "tags": ["geopolitics", "political_risk", "global_macro"]}, {"h": "MassDara", "tier": 1, "b": "geopolitics", "t": "2026-07-10 17:24", "x_zh": "我之前没有评论卢宁的视频，因为我认为这是克里姆林宫定期使用的可控‘压力释放’。他的指控是准确的。现在他被释放了，我确信一些‘流氓’指挥官将被逮捕。这场戏结束了，普遍存在的指挥犯罪仍在继续。", "x_en": "I didn’t comment on the Lunin video bc I thought it was a controlled ‘pressure release’ that the Kremlin uses periodically. His allegations are accurate. Now he’s released & I’m sure a few “hooligan” commanders will be arrested. The skit concludes, endemic command crimes persist.", "u": "https://x.com/MassDara/status/2075632189295706455", "lk": 57, "rt": 5, "rp": 1, "eng": 63, "lang": "en", "tags": ["geopolitics", "defense", "military"]}, {"h": "samagreene", "tier": 1, "b": "geopolitics", "t": "2026-07-10 11:04", "x_zh": "标题应该这样写：“那个阻止俄罗斯不得不改变的人”。梅利尼琴科不冒任何风险，也不公开发声。他提议维持现状——当然，不包括乌克兰的打击——而不是改革。", "x_en": "The headline should read: \"The Man Who Would Prevent Russia from Having to Change\".\n\nMelnichenko is taking zero risks, not speaking out. He is proposing the status quo -- minus Ukrainian strikes, of course -- not reform.", "u": "https://x.com/samagreene/status/2075536757404188726", "lk": 45, "rt": 9, "rp": 1, "eng": 55, "lang": "en", "tags": ["geopolitics", "russia", "political_risk"]}, {"h": "ianbremmer", "tier": 1, "b": "geopolitics", "t": "2026-07-10 18:46", "x_zh": "早期完全非科学的非民调显示，宾法斯很可能在关键补选中以微弱优势险胜法拉奇。", "x_en": "early utterly unscientific non-polling shows count binface likely to just squeak through over farage in critical by-election.", "u": "https://x.com/ianbremmer/status/2075652817553961434", "lk": 41, "rt": 6, "rp": 6, "eng": 53, "lang": "en", "tags": ["geopolitics", "political_risk", "global_macro"]}, {"h": "joshua_landis", "tier": 2, "b": "geopolitics", "t": "2026-07-10 17:48", "x_zh": "叙利亚议会尚未开会，因为关于谁应领导议会的争议已经开始，@heidipett 表示。为什么没有总理，为什么总理不对议会负责？从未有过没有领导人的议会——这是愚蠢的做法。", "x_en": "Syria's Parliament hasn't meet because disputes have already begun over who should lead it, \n@heidipett\n suggests.\n\nWhy isn't there a Prime Minister and why isn't he/she responsible to the Parliament? \n\nNever has there been a parliament with no leader - a recipe for silliness.", "u": "https://x.com/joshua_landis/status/2075638211922022685", "lk": 23, "rt": 4, "rp": 3, "eng": 30, "lang": "en", "tags": ["geopolitics", "middle_east", "syria"]}, {"h": "joshua_landis", "tier": 2, "b": "geopolitics", "t": "2026-07-10 17:50", "x_zh": "叙利亚的新议员们将没有资金雇佣员工或在大马士革租用办公室，@HaidHaid22 写道。", "x_en": "Syria's New Parliamentarians will get no money to hire staff or rent offices, from which to work in Damasucs, \n@HaidHaid22\n writes.", "u": "https://x.com/joshua_landis/status/2075638837259190644", "lk": 16, "rt": 3, "rp": 3, "eng": 22, "lang": "en", "tags": ["geopolitics", "middle_east", "syria"]}, {"h": "samagreene", "tier": 1, "b": "geopolitics", "t": "2026-07-10 11:04", "x_zh": "梅利尼琴科和其他前寡头担心——而且是对的——持续的战争会巩固他们被削弱的地位，或彻底消灭他们。但由于他们认为自己在俄罗斯缺乏影响力，他们正致力于让欧洲为普京停止战争提供便利。", "x_en": "Melnichenko and other erstwhile oligarchs worry -- rightly -- that continued war will cement their diminished positions, or eliminate them altogether. But because they believe they lack agency in Russia, they're on a mission to get Europe to make it easy for Putin to stop.", "u": "https://x.com/samagreene/status/2075536759459344606", "lk": 16, "rt": 5, "rp": 0, "eng": 21, "lang": "en", "tags": ["geopolitics", "russia", "political_risk"]}, {"h": "DerekJGrossman", "tier": 1, "b": "geopolitics", "t": "2026-07-11 03:15", "x_zh": "菲律宾长期以来寻求南海行为准则，旨在避免这些水域的冲突。但随着与中国紧张局势升级，这似乎不太可能成功。马尼拉正转向其他手段来捍卫其海洋利益。我的最新分析。", "x_en"   function report(){var c=DATA[st.date];return uiLang==="en"?c.report_en:c.report_zh}
  function bodyOf(t){return uiLang==="en"?(t.x_en||t.x_zh||""):(t.x_zh||t.x_en||"")}
  function fmt(n){return n>=1000?(n/1000).toFixed(n>=10000?0:1)+"k":""+n}
  function hl(s,q){s=s||"";if(!q)return s;try{var re=new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");return s.replace(re,"<mark>$1</mark>")}catch(e){return s}}
  function cur(){return DATA[st.date]}
  function jumpHandle(h){$("#q").value="@"+h;st.q="@"+h;$("#clr").style.display="block";st.board="all";buildPills();render();$("#stream").scrollIntoView({behavior:"smooth",block:"start"})}
  function syncUi(){
    localStorage.setItem("windrise_lang",uiLang); document.documentElement.lang=uiLang==="en"?"en":"zh-CN";
    document.title=(uiLang==="en"?"KOL Trading Themes · Visual Terminal":"KOL 交易主线 · 可视化终端")+" · 2026-07-11";
    $("#title").innerHTML=tx("title"); $("#st1").textContent=tx("s1"); $("#st2").textContent=tx("s2"); $("#st3").textContent=tx("s3"); $("#st4").textContent=tx("s4");
    $("#q").placeholder=tx("search"); $("#reset").textContent=tx("reset");
    [["#sortSeg",["hot","latest"]],["#tierSeg",["all","tier1","tier2"]],["#langSeg",["bi","zhOnly","enOnly"]]].forEach(function(pair){
      var btns=$(pair[0]).querySelectorAll("button"); pair[1].forEach(function(k,i){btns[i].textContent=tx(k)})});
    app.querySelectorAll(".langsw button").forEach(function(b){b.setAttribute("data-on",b.dataset.lang===uiLang?"1":"")});
  }
  var dsel=$("#dateSel"); DATES.forEach(function(d){var o=document.createElement("option");o.value=d;o.textContent=d;dsel.appendChild(o)}); dsel.value=st.date;
  dsel.onchange=function(){st.date=dsel.value;st.board="all";renderAll()};

  function renderReport(){
    var r=report(),m=cur().meta;
    $("#win").textContent=uiLang==="en"?m.window_en:m.window_zh; $("#sub").textContent=uiLang==="en"?m.subtitle_en:m.subtitle_zh;
    var ih=$("#insights");ih.innerHTML=""; r.insights.forEach(function(it,i){var c=document.createElement("div");c.className="icard";c.innerHTML='<h3><span class="inum">'+(i+1)+'</span><span>'+it.title+'</span></h3><ul>'+it.points.map(function(p){return "<li>"+p+"</li>"}).join("")+'</ul>';ih.appendChild(c)});
    var sh=$("#sections");sh.innerHTML="";
    r.sections.forEach(function(pair){
      var name=pair[0],subs=pair[1],col=REPC[name]||"#5b8def",nvp=subs.reduce(function(a,s){return a+s[1].length},0);
      var inner=subs.map(function(sd){return '<div class="subg"><div class="subh" style="--sc:'+col+';color:'+col+'">'+sd[0]+'</div>'+sd[1].map(function(row){return '<div class="vp"><span class="vh" data-h="'+esc(row[0].replace("@",""))+'">'+row[0]+'</span>'+(row[1]?'<span class="vr">'+row[1]+'</span>':'')+row[2]+'</div>'}).join("")+'</div>'}).join("");
      var box=document.createElement("div");box.className="bsec";box.innerHTML='<div class="bhead" style="background:'+col+'">'+name+' <span style="font-weight:500;opacity:.75;font-size:12px">'+subs.length+' '+tx("domains")+' · '+nvp+' '+tx("items")+'</span><span class="arrow">▾</span></div><div class="bbody">'+inner+'</div>';
      var bd=box.querySelector(".bbody"),hd=box.querySelector(".bhead"); hd.onclick=function(){bd.style.display=bd.style.display==="none"?"":"none";box.querySelector(".arrow").textContent=bd.style.display==="none"?"▸":"▾"}; sh.appendChild(box);
    });
    sh.querySelectorAll(".vh").forEach(function(v){v.onclick=function(){jumpHandle(v.dataset.h)}});
    var uh=$("#unique");uh.innerHTML=""; r.unique.forEach(function(u){var c=document.createElement("div");c.className="ucard";c.innerHTML='<div class="uh" data-h="'+esc(u[0].replace("@",""))+'">'+u[0]+'</div><div class="uv">'+u[1]+'</div><div class="ui">'+tx("meaning")+u[2]+'</div>';c.querySelector(".uh").onclick=function(){jumpHandle(u[0].replace("@",""))};uh.appendChild(c)});
  }
  function buildPills(){
    var tw=cur().tweets,wrap=$("#boardPills");wrap.innerHTML=""; var counts={all:tw.length};Object.keys(BOARDS).forEach(function(k){counts[k]=0}); tw.forEach(function(t){counts[t.b]=(counts[t.b]||0)+1});
    function mk(key,label,color){var p=document.createElement("button");p.className="pill";p.innerHTML=label+' <span class="cnt">'+(counts[key]||0)+'</span>';if(st.board===key){p.setAttribute("data-on","1");p.style.background=color;p.style.borderColor=color} p.onclick=function(){st.board=key;buildPills();render()};return p}
    wrap.appendChild(mk("all",tx("all"),"#e7b24d")); Object.keys(BOARDS).forEach(function(k){wrap.appendChild(mk(k,boardLabel(k),BOARDS[k].color))});
  }
  function pass(t){
    if(st.board!=="all"&&t.b!==st.board)return false;
    if(st.tier!=="all"&&(""+t.tier)!==st.tier)return false;
    if(st.lang!=="all"&&t.lang!==st.lang)return false;
    if(st.q){var q=st.q.toLowerCase(); var hay=(bodyOf(t)+" "+(t.x_zh||"")+" "+(t.x_en||"")+" @"+t.h+" "+(t.tags||[]).join(" ")).toLowerCase(); if(hay.indexOf(q)<0)return false}
    return true
  }
  function render(){
    var m=cur().meta,tw=cur().tweets.filter(pass); tw.sort(function(a,b){return st.sort==="hot"?b.eng-a.eng:(a.t<b.t?1:-1)});
    var kol=new Set(tw.map(function(t){return t.h})).size; $("#tstat").innerHTML=tx("show")+' <b>'+tw.length+'</b> / '+m.n_tweets+' · <b>'+kol+'</b> '+tx("kols")+' · '+tx("monitor")+' '+m.n_accounts+' '+tx("accounts");
    var s=$("#stream"); if(!tw.length){s.innerHTML='<div class="empty">'+tx("empty")+'</div>';return} s.innerHTML="";
    tw.forEach(function(t){
      var B=BOARDS[t.b]||{color:"#5b8def"}, body=bodyOf(t), tags=(t.tags||[]).map(function(x){return '<span class="tag" data-tag="'+esc(x)+'">'+esc(x)+'</span>'}).join("");
      var c=document.createElement("div"); c.className="card"; c.tabIndex=0; c.style.setProperty("--bc",B.color);
      c.innerHTML='<div class="chead"><span class="hand" data-h="'+esc(t.h)+'">@'+esc(t.h)+'</span><span class="bchip" style="background:'+B.color+'">'+boardShort(t.b)+'</span>'+(t.tier===1?'<span class="t1">'+tx("tier1")+'</span>':'')+'<span class="lang">'+(t.lang==="zh"?tx("langZh"):tx("langEn"))+'</span><span class="time mono">'+esc(t.t)+'</span></div><div class="cbody">'+hl(body,st.q)+'</div><div class="cfoot"><span class="eng mono"><span>♥ '+fmt(t.lk)+'</span><span>⟲ '+fmt(t.rt)+'</span><span>💬 '+fmt(t.rp)+'</span></span><span class="tags">'+tags+'</span><span class="open">'+tx("open")+'</span></div>';
      var bodyEl=c.querySelector(".cbody"); requestAnimationFrame(function(){if(bodyEl.scrollHeight>bodyEl.clientHeight+4){bodyEl.classList.add("clamp"); var mm=document.createElement("span"); mm.className="more"; mm.textContent=tx("more"); bodyEl.after(mm); mm.onclick=function(e){e.stopPropagation();bodyEl.classList.toggle("open");bodyEl.classList.toggle("clamp");mm.textContent=bodyEl.classList.contains("open")?tx("less"):tx("more")}}});
      c.onclick=function(){window.open(t.u,"_blank","noopener")}; c.onkeydown=function(e){if(e.key==="Enter")window.open(t.u,"_blank","noopener")};
      c.querySelector(".hand").onclick=function(e){e.stopPropagation();jumpHandle(t.h)}; c.querySelectorAll(".tag").forEach(function(tg){tg.onclick=function(e){e.stopPropagation();$("#q").value=tg.dataset.tag;st.q=tg.dataset.tag;$("#clr").style.display="block";render()}});
      s.appendChild(c);
    })
  }
  function renderAll(){syncUi();renderReport();buildPills();render()}
  var qi=$("#q"),clr=$("#clr"); qi.oninput=function(){st.q=qi.value.trim();clr.style.display=qi.value?"block":"none";render()}; clr.onclick=function(){qi.value="";st.q="";clr.style.display="none";qi.focus();render()};
  document.addEventListener("keydown",function(e){if(e.key==="/"&&document.activeElement!==qi){e.preventDefault();qi.focus()} if(e.key==="Escape"&&document.activeElement===qi){qi.value="";st.q="";clr.style.display="none";render()}});
  function seg(id,key){var el=$(id);el.querySelectorAll("button").forEach(function(b){b.onclick=function(){el.querySelectorAll("button").forEach(function(x){x.removeAttribute("data-on")});b.setAttribute("data-on","1");st[key]=b.dataset.v;render()}})}
  seg("#sortSeg","sort"); seg("#tierSeg","tier"); seg("#langSeg","lang");
  $("#reset").onclick=function(){st.board="all";st.tier="all";st.lang="all";st.sort="hot";st.q="";qi.value="";clr.style.display="none";[["#sortSeg","hot"],["#tierSeg","all"],["#langSeg","all"]].forEach(function(p){var el=$(p[0]);el.querySelectorAll("button").forEach(function(x){x.setAttribute("data-on",x.dataset.v===p[1]?"1":"")})});buildPills();render()};
  app.querySelectorAll(".langsw button").forEach(function(b){b.onclick=function(){uiLang=b.dataset.lang;renderAll()}});
  renderAll();
})();
</script>
</div>
