Object.assign(UI.en,{priceOi:'Price (P) {p} · Open Interest (OI) {oi}',techExplain:[['How to read RSI(14)','Compares upward and downward momentum over 14 periods: above 70 is stretched, below 30 is weak, and around 50 is neutral. Overbought does not mean an immediate fall; confirm with trend and key levels.'],['20-period support / resistance','Left is the lowest low and right is the highest high over the prior 20 hourly bars. A confirmed close above resistance strengthens the upside case; a close below support weakens structure.'],['8-hour price–OI','Price up/OI up = long build; price down/OI up = short build; price up/OI down = possible short covering; price down/OI down = possible long exit. These are participation inferences, not trader identity.'],['What are P and OI?','P means Price and shows the eight-hour return. OI means Open Interest and shows the change in outstanding contracts. Positive means an increase and negative a decrease; OI has no direction by itself.']]});
