Object.assign(UI.en,{guideTitle:'Read This Page in 30 Seconds',guideSub:'Understand the definitions before the conclusions',morphFormula:'Four windows: latest 120 / 160 / 200 / 250 hourly bars; agreement = (bull votes − bear votes) ÷ 4',guideItems:[['What is scale agreement?','Each contract is scanned over its latest 120, 160, 200 and 250 hourly bars. <code>+100</code> means all four are bullish; <code>−100</code> means all are bearish. It is neither return nor win rate.'],['Why are there charts but no setup?','Charts include fresh and extended-watch structures. 0–45 bars is fresh, 46–90 is extended watch, and over 90 is expired. Extended watch is for review only.'],['What qualifies as a setup?','All rules must pass: fresh and valid geometry, trend alignment, triggered or near-trigger status, and reward/risk ≥1.20 from trigger, target and invalidation levels.'],['How should I read the backtest?','The portfolio test pools historical signals across 15 contracts. Win rate is the share directionally profitable after 24 hours; mean return is the average 24-hour directional move. No look-ahead, no future guarantee.']]});

Object.assign(UI.zh,{priceOi:'价格(P) {p} · 持仓(OI) {oi}',techExplain:[['RSI(14) 怎么看','比较最近14期上涨与下跌动能：70以上表示偏热，30以下表示偏弱，50附近相对中性。超买不等于马上下跌、超卖也不等于马上上涨，需结合趋势和关键位。'],['20周期支撑 / 阻力','左侧为当前K线之前20根小时K线最低价（支撑），右侧为最高价（阻力）。有效站上阻力说明上方空间打开；跌破支撑说明结构转弱，但都应等待小时收盘确认。'],['近8小时价仓','价格涨且持仓增=增仓上涨；价格跌且持仓增=增仓下跌；价格涨且持仓减=减仓上涨（可能空头回补）；价格跌且持仓减=减仓下跌（可能多头离场）。这是参与度推断，不是席位身份确认。'],['P / OI 是什么','P = Price，显示近8小时价格涨跌幅；OI = Open Interest，显示近8小时未平仓合约数量变化。正数表示增加，负数表示减少；OI本身没有多空方向，必须和价格一起读。']]});
Object.assign(UI.en,{priceOi:'Price (P) {p} · Open Interest (OI) {oi}',techExplain:[['How to read RSI(14)','Compares upward and downward momentum over 14 periods: above 70 is stretched, below 30 is weak, and around 50 is neutral. Overbought does not mean an immediate fall; confirm with trend and key levels.'],['20-period support / resistance','Left is the lowest low and right is the highest high over the prior 20 hourly bars. A confirmed close above resistance strengthens the upside case; a close below support weakens structure.'],['8-hour price–OI','Price up/OI up = long build; price down/OI up = short build; price up/OI down = possible short covering; price down/OI down = possible long exit. These are participation inferences, not trader identity.'],['What are P and OI?','P means Price and shows the eight-hour return. OI means Open Interest and shows the change in outstanding contracts. Positive means an increase and negative a decrease; OI has no direction by itself.']]});
