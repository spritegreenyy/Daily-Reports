I半导体", [["英伟达", [["@jimcramer", "", "市场最大市值股票（NVDA）正在暴涨，但没人知道原因。 <span style=\"color:#8fa0b3\">交易含义：缺乏明确催化剂的价格上涨，<b class=\"em\">可能隐含脆弱性</b></span>"]]], ["推理", [["@simonw", "", "循环（loops）只是模型无法可靠处理长问题的临时补丁；Fable、GPT-5.6（可能还有Kimi K3）已能原生完成长程推理，<b class=\"em\">无需辅助。</b> <span style=\"color:#8fa0b3\">交易含义：推理需求结构变化，可能减少对中间方案依赖，<b class=\"em\">利好原生推理芯片</b></span>"]]], ["其他 AI / 半导体", [["@Stephanie_Link", "", "Google 2026年资本开支上修至1950-2050亿美元，2027年继续增长，远超预期；Meta、亚马逊、微软、甲骨文料将跟进，<b class=\"em\">直接利好AVGO、NVDA、MU等半导体。</b> <span style=\"color:#8fa0b3\">交易含义：资本开支竞赛确认，<b class=\"em\">但需警惕FCF压力导致股价短期回调</b></span>"], ["@natolambert", "", "公开信息强烈支持蒸馏无害论，研究显示影响极小；但存在机密报告（如NSA数据）和私人简报，信息不对称。 <span style=\"color:#8fa0b3\">交易含义：蒸馏争议未决，若机密信息反转，<b class=\"em\">将冲击模型生态与芯片需求预期</b></span>"]]]]]]}, "report_en": {"insights": [{"title": "Hottest · AI Computing / GPU", "points": ["Core view: Key View: @jimcramer: NVDA is the largest market cap stock, surging without any clear reason. <b class=\"em\">This 'unknown cause' rally itself is a risk signal.</b>"]}, {"title": "Biggest Divergence · US Stocks / Fund Flows", "points": ["Core view: <b class=\"em\">Key View: @yardeni: The S&P</b> 500 <b class=\"em\">has been range-bound at</b> 7500 <b class=\"em\">for weeks.</b> Despite consensus on economic resilience and strong earnings, the market just won't rise; fundamental consensus alone can no longer push the index higher."]}, {"title": "High Alert · Crude Oil / Distillates", "points": ["Core view: Key View: @elerianm (Macro Economist): If the Red Sea situation persists (a big if), the impact will go far beyond oil transport—about 12% of global trade passes through this route, and many goods face disruption. Meanwhile, a second chokepoint is being weaponized. <b class=\"em\">Supply chain risks are spreading.</b>"]}, {"title": "Contrarian Variable · US Stocks / Fund Flows", "points": ["Core view: Key View: @TimmerFidelity: The payout ratio of the S&P 500 market-cap-weighted index has fallen below 70%, after being above that level for a long time. This change means listed companies' ability to conduct financial engineering through buybacks is weakening. <b class=\"em\">It could alter the structure of this long bull market.</b>"]}, {"title": "Unique View · AI Computing / GPU", "points": ["Core view: <b class=\"em\">Key View: @Stephanie_Link: Google raised its</b> 2026 <b class=\"em\">capital expenditure guidance from</b> $180-190 billion <b class=\"em\">to</b> $195-205 billion, <b class=\"em\">with a significant increase planned for</b> 2027. Meta, Amazon, Microsoft, and Oracle will inevitably follow. The semiconductor chain (AVGO, NVDA, MU) has the strongest logic."]}], "unique": [["@natolambert", "Public information shows the impact of distillation technology is minimal, but confidential reports may reveal a different situation. Beware of information asymmetry.", "If confidential information contradicts public information, it could trigger a repricing of AI regulation in the market."], ["@elerianm", "If the Red Sea situation persists (a big if), the impact will go far beyond oil transport—about 12% of global trade passes through this route, and many goods face disruption. Meanwhile, a second chokepoint is being weaponized. Supply chain risks are spreading.", "If the Red Sea crisis escalates, inflation expectations will be repriced, forcing central banks to delay rate cuts."], ["@TimmerFidelity", "The payout ratio of the S&P 500 market-cap-weighted index has fallen below 70%, after being above that level for a long time. This change means listed companies' ability to conduct financial engineering through buybacks is weakening. It could alter the structure of this long bull market.", "Declining buyback capacity will weaken the most stable buying force in US stocks. If combined with slowing earnings growth, valuations will come under pressure."], ["@Stephanie_Link", "Google raised its 2026 capital expenditure guidance from $180-190 billion to $195-205 billion, with a significant increase planned for 2027. Meta, Amazon, Microsoft, and Oracle will inevitably follow. The semiconductor chain (AVGO, NVDA, MU) has the strongest logic.", "The capex race is the hardcore support for the AI bull market, but if returns fall short of expectations, overinvestment will eat into profits."]], "sections": [["Macro Economy", [["AI Computing / GPU", [["@jimcramer", "", "NVDA is the largest market cap stock, surging without any clear reason. <b class=\"em\">This 'unknown cause' rally itself is a risk signal.</b> <span style=\"color:#8fa0b3\">Trading Implication: If NVDA pulls back, it could trigger a collective revaluation of the AI chain. <b class=\"em\">Bulls need to watch for momentum exhaustion.</b></span>"], ["@Stephanie_Link", "", "Google raised its 2026 capital expenditure guidance from $180-190 billion to $195-205 billion, with a significant increase planned for 2027. <b class=\"em\">Meta, Amazon, Microsoft, and Oracle will inevitably follow.</b> The semiconductor chain (AVGO, NVDA, MU) has the strongest logic. <span style=\"color:#8fa0b3\">Trading Implication: The capex race is the hardcore support for the AI bull market, but if returns fall short of expectations, <b class=\"em\">overinvestment will eat into profits.</b></span>"]]], ["Crude Oil / Distillates", [["@elerianm", "Macro Economist", "If the Red Sea situation persists (a big if), the impact will go far beyond oil transport—about 12% of global trade passes through this route, and many goods face disruption. Meanwhile, a second chokepoint is being weaponized. <b class=\"em\">Supply chain risks are spreading.</b> <span style=\"color:#8fa0b3\">Trading Implication: If the Red Sea crisis escalates, <b class=\"em\">inflation expectations will be repriced,</b> forcing central banks to delay rate cuts.</span>"]]], ["US Stocks / Fund Flows", [["@TimmerFidelity", "", "The payout ratio of the S&P 500 market-cap-weighted index has fallen below 70%, after being above that level for a long time. This change means listed companies' ability to conduct financial engineering through buybacks is weakening. <b class=\"em\">It could alter the structure of this long bull market.</b> <span style=\"color:#8fa0b3\">Trading Implication: Declining buyback capacity will weaken the most stable buying force in US stocks. If combined with slowing earnings growth, <b class=\"em\">valuations will come under pressure.</b></span>"], ["@yardeni", "", "The S&P 500 has been range-bound at 7500 for weeks. Despite consensus on economic resilience and strong earnings, the market just won't rise; fundamental consensus alone can no longer push the index higher. <span style=\"color:#8fa0b3\">Trading Implication: The index is stagnant while fundamentals are favorable. <b class=\"em\">This suggests the market is waiting for a new catalyst or risk release,</b> with a directional move imminent.</span>"]]], ["Macro Economy", [["@jam_croissant", "", "One of the most important charts for US stocks: semiconductor volatility continues to outperform index volatility, while dispersion rises and implied correlation falls. The market is paying for idiosyncratic stock risk, <b class=\"em\">not systemic risk,</b> a typical characteristic of leader rotation. <span style=\"color:#8fa0b3\">Trading Implication: If implied correlation starts to rise, it means the market is shifting from stock picking to risk aversion. <b class=\"em\">The semiconductor-led rally structure could break down.</b></span>"], ["@jaminball", "", "Google Cloud's annualized revenue is approaching $99 billion, up 82% year-over-year, with quarterly sequential growth accelerating again. <b class=\"em\">AI cloud demand is still accelerating, not peaking.</b> <span style=\"color:#8fa0b3\">Trading Implication: Accelerating cloud revenue growth is a necessary condition for sustained AI capex expansion. If growth slows, the capex narrative collapses.</span>"]]], ["Middle East / Iran", [["@M_McDonough", "", "Oil tanker transits through the Strait of Hormuz have been flat for three months after plunging from 65 ships per day to just 2, and are now only slowly recovering to 11. The Suez Canal and Bab el-Mandeb, though recovering, are still 30-40% below pre-crisis levels. None of the three major global shipping chokepoints have returned to normal. <span style=\"color:#8fa0b3\">Trading Implication: <b class=\"em\">Persistent shipping bottlenecks will push up transport costs and commodity prices,</b> creating obstacles for the final mile of inflation fighting.</span>"]]], ["Federal Reserve / Interest Rates", [["@darioperkins", "", "<b class=\"em\">In the past, you could write the Fed's response before an FOMC meeting,</b> then send it immediately after the news confirmed. Now no one can predict in advance; policy uncertainty has risen to historic highs. <span style=\"color:#8fa0b3\">Trading Implication: The blurring of the Fed's path means interest rate volatility will remain high, <b class=\"em\">weighing on risk asset valuations.</b></span>"]]]]], ["Geopolitics", [["Middle East", [["@elerianm", "Macro Economist", "If the Red Sea situation persists, it will affect about 12% of global trade flows, not just oil transport, putting upward pressure on prices of many goods. <b class=\"em\">Also beware of the weaponization risk of another key waterway.</b> <span style=\"color:#8fa0b3\">Trading Implication: <b class=\"em\">Red Sea risk has expanded from a single energy chokepoint to the entire global trade supply chain.</b> Watch for volatility in shipping insurance and freight derivatives.</span>"]]], ["US-China", [["@CollinSLKoh", "", "Beijing values the lives of frontline personnel, but the loss in the CCG3104 incident stemmed from its own high-speed maneuvering and operational errors. It is unclear whether China has recovered the remains of personnel missing since August 2025. <span style=\"color:#8fa0b3\">Trading Implication: <b class=\"em\">South China Sea law enforcement risk events may affect China's subsequent operational strategy,</b> but the short-term impact on shipping is limited.</span>"]]], ["Other Geopolitical", [["@shashj", "", "OpenAI has not disclosed details of its unreleased model losing control. AI has begun to surpass humans in cybersecurity, and only a very few experts globally can understand such vulnerabilities. Technical regulation faces new challenges. <span style=\"color:#8fa0b3\">Trading Implication: <b class=\"em\">AI safety incidents may accelerate countries' legislation on AI export controls and safety reviews,</b> affecting tech stock valuation logic.</span>"]]]]], ["Commodities", [["Crude Oil", [["@elerianm", "Macro Economist", "If the Red Sea situation persists, it will not only disrupt oil transport but could affect about 12% of global trade flows (many goods) and push up prices. <b class=\"em\">Also beware of a second supply chain weaponization path.</b> <span style=\"color:#8fa0b3\">Trading Implication: If the situation escalates, <b class=\"em\">crude oil and many commodity prices will get strong support,</b> but watch for diplomatic resolution progress.</span>"], ["@JavierBlas", "Energy Reporter (BBG)", "TotalEnergies' Q2 net profit was about $6 billion, up 68% year-over-year, beating expectations, driven by high oil prices, trading profits, and refining margins. <b class=\"em\">This is expected to be a theme in oil majors' quarterly reports.</b> $TTE maintains a $1.5 billion quarterly buyback. <span style=\"color:#8fa0b3\">Trading Implication: Improving oil stock earnings may attract capital back, <b class=\"em\">but beware of oil price pullback risk.</b></span>"]]]]], ["Weather / Climate", [["El Niño Status", [["@natolambert", "", "Public information shows the impact of distillation technology is minimal, but confidential reports may reveal a different situation. <b class=\"em\">Beware of information asymmetry.</b> <span style=\"color:#8fa0b3\">Trading Implication: If confidential information contradicts public information, <b class=\"em\">it could trigger a repricing of AI regulation in the market.</b></span>"]]], ["Weather / Climate", [["@natolambert", "", "Public information strongly supports that the impact of distillation technology is negligible, requiring no action. But there are confidential reports and private briefings <b class=\"em\">suggesting the situation may be more complex.</b> <span style=\"color:#8fa0b3\">Trading Implication: If confidential information confirms risks, <b class=\"em\">it could trigger tighter regulation,</b> affecting AI model training costs.</span>"]]]]], ["AI / Semiconductors", [["NVIDIA", [["@jimcramer", "", "The largest market cap stock (NVDA) is surging, but no one knows why. <span style=\"color:#8fa0b3\">Trading Implication: A price rise without a clear catalyst <b class=\"em\">may imply fragility.</b></span>"]]], ["Inference", [["@simonw", "", "Loops are just temporary patches for models that can't reliably handle long problems. Fable, GPT-5.6 (and possibly Kimi K3) can already natively perform long-range reasoning <b class=\"em\">without assistance.</b> <span style=\"color:#8fa0b3\">Trading Implication: Changes in inference demand structure may reduce reliance on intermediate solutions, <b class=\"em\">benefiting native inference chips.</b></span>"]]], ["Other AI / Semiconductors", [["@Stephanie_Link", "", "Google's 2026 capex guidance was raised to $195-205 billion, with continued growth in 2027, far exceeding expectations. Meta, Amazon, Microsoft, and Oracle are expected to follow, <b class=\"em\">directly benefiting AVGO, NVDA, MU and other semiconductors.</b> <span style=\"color:#8fa0b3\">Trading Implication: The capex race is confirmed, <b class=\"em\">but beware of short-term stock pullbacks due to FCF pressure.</b></span>"], ["@natolambert", "", "Public information strongly supports the distillation-is-harmless theory, with studies showing minimal impact. But there are confidential reports (e.g., NSA data) and private briefings, creating information asymmetry. <span style=\"color:#8fa0b3\">Trading Implication: The distillation controversy is unresolved. If confidential information reverses the view, <b class=\"em\">it will shock the model ecosystem and chip demand expectations.</b></span>"]]]]]]}, "tweets": [{"h": "jimcramer", "tier": 1, "b": "macro", "t": "2026-07-22 15:13", "x_zh": "记住，这个市场上最大的股票正在暴涨……而我们不知道原因……NVDA", "x_en": "Remember the largest stock in this market is on fire... and we dont know why... NVDA", "u": "https://x.com/jimcramer/status/2079947913946419354", "lk": 1269, "rt": 111, "rp": 318, "eng": 1698, "lang": "en", "tags": ["macro", "equities", "teacher_required"]}, {"h": "jaminball", "tier": 2, "b": "macro", "t": "2026-07-22 20:08", "x_zh": "Google Cloud再次大获成功。他们现在的年化营收约为990亿美元，同比增长82%。同比增速再次大幅跃升。季度同比增速趋势如下 $GOOG", "x_en": "Google Cloud knocked it out of the park again. They're now at a ~$99B run rate growing 82% YoY. Another MASSIVE jump in YoY growth\n\nQuarterly YoY growth trends below \n$GOOG", "u": "https://x.com/jaminball/status/2080022272681869474", "lk": 458, "rt": 62, "rp": 14, "eng": 534, "lang": "en", "tags": ["ai_semis", "software", "tech_equities"]}, {"h": "Stephanie_Link", "tier": 2, "b": "macro", "t": "2026-07-22 21:14", "x_zh": "$GOOGL 预计2026年资本支出1950亿至2050亿美元，此前预期为1800亿至1900亿美元，2027年还将显著增加。令人震惊的数字。其他人也会这么说，在我看来 - $META $AMZN $MSFT $ORCL。支持半导体交易 - $AVGO $NVDA $MU", "x_en": "$GOOGL\n sees 2026 Capex $195B-$205B vs prior $180B-$190B with significant increases in 2027.  Mind blowing #s.  Others will say same, imo - \n$META\n \n$AMZN\n \n$MSFT\n \n$ORCL\n.  \nSupports the semi trade - \n$AVGO\n \n$NVDA\n \n$MU", "u": "https://x.com/Stephanie_Link/status/2080038736532746500", "lk": 245, "rt": 19, "rp": 5, "eng": 269, "lang": "en", "tags": ["macro", "equities", "fund_manager"]}, {"h": "elerianm", "tier": 1, "b": "macro", "t": "2026-07-23 00:32", "x_zh": "如果这种情况持续下去，这是一个很大的“如果”，它可能不仅会扰乱石油运输，还会给价格带来更大的上行压力。全球大约12%的贸易通过红海，运输着各种各样的商品。此外，同时将另一种商品武器化", "x_en": "IF this persists, and that’s a big \"if\", it is likely to disrupt more than oil shipments and place more upward pressure on prices.\nRoughly 12% of global trade flows through the Red Sea, carrying a significant variety of goods.\nAlso, a second simultaneous weaponization of a", "u": "https://x.com/elerianm/status/2080088641406443836", "lk": 132, "rt": 24, "rp": 13, "eng": 169, "lang": "en", "tags": ["macro", "central_banks", "teacher_required"]}, {"h": "elerianm", "tier": 1, "b": "macro", "t": "2026-07-23 01:33", "x_zh": "来自 @FT：[谷歌的]“2026年资本支出将为1950亿至2050亿美元，高于此前1800亿至1900亿美元的指引。该股在盘后交易中下跌约3.5%。谷歌今年第二次上调资本支出预算，正值其与竞争对手Meta、微软", "x_en": "From the \n@FT\n:\n[Google's] \"capital expenditures in 2026 would be $195bn-$205bn, up from previous guidance of $180bn-$190bn. The stock dipped about 3.5 per cent in after-hours trading.\nGoogle’s second increase to its capex budget this year comes as it races rivals Meta, Microsoft", "u": "https://x.com/elerianm/status/2080103879006405069", "lk": 122, "rt": 26, "rp": 17, "eng": 165, "lang": "en", "tags": ["macro", "central_banks", "teacher_required"]}, {"h": "TimmerFidelity", "tier": 1, "b": "macro", "t": "2026-07-22 19:30", "x_zh": "在这个长期牛市中，金融工程方面正在发生微妙但可能意义深远的转变。在下面的标普500市值加权图表中，我们看到标普500市值加权指数的派息率现已降至70%以下。过去曾高于", "x_en": "A subtle but potentially profound shift is underway with regards to the financial engineering aspect of this secular bull market. In the S&P 500 Cap-weighted chart below, we see that the payout ratio for the S&P 500 cap-weighted index has now fallen below 70%. It used to be above", "u": "https://x.com/TimmerFidelity/status/2080012503434613060", "lk": 129, "rt": 25, "rp": 11, "eng": 165, "lang": "en", "tags": ["macro", "equities", "cycle"]}, {"h": "MichaelAArouet", "tier": 2, "b": "macro", "t": "2026-07-22 11:29", "x_zh": "所有左派叙事都基于感觉而非事实，但“对富人征税”真的很有趣。美国前10%的纳税人缴纳了59%的所得税，而底层50%只缴纳了3%。既然每个人都使用相同的国家服务，为什么最努力工作的人要付更多？", "x_en": "All left narratives are based on feelings instead of facts, but \"tax the rich\" is really funny.\n\nThe top 10% of US taxpayers pay 59% of income taxes, while the bottom 50% pay only 3%.\n\nAs everyone uses the same state services, why should the hardest-working people pay even more?", "u": "https://x.com/MichaelAArouet/status/2079891623148724676", "lk": 97, "rt": 22, "rp": 19, "eng": 138, "lang": "en", "tags": ["macro", "economics", "data"]}, {"h": "M_McDonough", "tier": 2, "b": "macro", "t": "2026-07-22 13:32", "x_zh": "通过全球三大咽喉要道的油轮交通量（30日移动平均）：霍尔木兹海峡：3月后暴跌约97%——从约65艘油轮降至约2艘。连续3个月持平，现在才勉强回升至11艘。苏伊士运河和曼德海峡：正在恢复，但仍比红海危机前的正常水平低约30-40%。", "x_en": "Tanker traffic through the world's 3 great chokepoints (30D MA)  \n  \n Hormuz: ~97% collapse after March — from ~65 tankers to ~2. Flatlined for 3 months, only now limping back to 11.\n \n Suez & Bab el-Mandeb: healing, but still ~30–40% below their pre–Red Sea crisis norm.", "u": "https://x.com/M_McDonough/status/2079922553112449357", "lk": 93, "rt": 28, "rp": 7, "eng": 128, "lang": "en", "tags": ["macro", "economics", "data"]}, {"h": "darioperkins", "tier": 2, "b": "macro", "t": "2026-07-22 15:40", "x_zh": "不久前，你还可以在FOMC会议前写好美联储回应，等消息确认后直接发送。没人报名做这个。", "x_en": "There was a time, not that long ago, when you could write your Fed response ahead of the FOMC meeting and just hit send once the news was confirmed. Nobody signed up for this", "u": "https://x.com/darioperkins/status/2079954695569760387", "lk": 52, "rt": 3, "rp": 7, "eng": 62, "lang": "en", "tags": ["macro", "central_banks", "economics"]}, {"h": "McClellanOsc", "tier": 2, "b": "macro", "t": "2026-07-22 20:29", "x_zh": "德哈维兰彗星客机也将喷气发动机安装在机翼内部，这是一个创新但问题重重的设计。维护起来难以接近，而且灾难性的发动机故障很容易导致机翼断裂。", "x_en": "The de Havilland Comet also had the jet engines mounted inside the wing, an innovative but problematic design. Tough to access for maintenance, and a catastrophic engine failure could have easily meant a wing rupture.", "u": "https://x.com/McClellanOsc/status/2080027467075740131", "lk": 23, "rt": 0, "rp": 7, "eng": 30, "lang": "en", "tags": ["macro", "technical", "cycle"]}, {"h": "DiMartinoBooth", "tier": 2, "b": "macro", "t": "2026-07-23 04:14", "x_zh": "祝福。东北部在南部和西部之后排名第三。中西部垫底。这是一个过程。如果南部和西部的卖家像过去一样迟迟找不到信仰，那么东北部乃至最终中西部的卖家（和买家）认清现实将需要更长时间。", "x_en": "Bless. Northeast fell 3rd after South & West. Midwest falling last. It’s a process. If sellers in the South and West are as slow as they’ve been to find religion, it will take even longer for reality to set in for sellers (AND BUYERS) in the Northeast & finally in the Midwest.", "u": "https://x.com/DiMartinoBooth/status/2080144541437272486", "lk": 16, "rt": 2, "rp": 3, "eng": 21, "lang": "en", "tags": ["macro", "central_banks", "economics"]}, {"h": "yardeni", "tier": 2, "b": "macro", "t": "2026-07-23 02:59", "x_zh": "尽管经济韧性强、盈利强劲，标普500指数数周来仍停滞在7500点。大家一致看好的基本面并未推动市场。\n\n会员专属", "x_en": "S&P 500 stuck at 7,500 for weeks despite a resilient economy and strong earnings. The bullish fundamentals everyone agrees on aren't moving the market.\n\n Members-Only", "u": "https://x.com/yardeni/status/2080125585628545240", "lk": 15, "rt": 2, "rp": 3, "eng": 20, "lang": "en", "tags": ["macro", "equities", "sellside"]}, {"h": "jam_croissant", "tier": 1, "b": "macro", "t": "2026-07-23 05:55", "x_zh": "目前美国股市最重要的图表之一。\n\n半导体波动率持续跑赢指数波动率，同时离散度上升、隐含相关性下降。市场在为个股风险买单，而非系统性风险。\n\n这通常是领导力的表现。", "x_en": "One of the most important charts in US equities right now.\n\nSemiconductor volatility continues to outperform index volatility, while dispersion rises and implied correlation falls. The market is paying up for single-name risk, not systemic risk.\n\nThat's typically what leadership", "u": "https://x.com/jam_croissant/status/2080169821241553164", "lk": 11, "rt": 0, "rp": 0, "eng": 11, "lang": "en", "tags": ["macro", "volatility", "options"]}, {"h": "CollinSLKoh", "tier": 2, "b": "geopolitics", "t": "2026-07-22 13:18", "x_zh": "我相信北京一直珍视生命——尤其是前线人员。\n\n不过我不确定他们是否成功找回了2025年8月CCG3104舰上失踪战友的遗骸——这些损失源于他们自己鲁莽的高强度操作和无能。", "x_en": "I believe Beijing has always valued human lives - especially frontline personnel. \n\nThough I'm not sure whether they managed to recover the remains of comrades lost onboard CCG3104 back in August 2025 - as a result of their own reckless high-octane maneuvers and incompetence.", "u": "https://x.com/CollinSLKoh/status/2079918990722531693", "lk": 213, "rt": 48, "rp": 33, "eng": 294, "lang": "en", "tags": ["geopolitics", "maritime", "indo_pacific"]}, {"h": "shashj", "tier": 1, "b": "geopolitics", "t": "2026-07-22 21:03", "x_zh": "OpenAI尚未公开披露其未发布模型如何逃脱限制的细节。即使披露了，AI系统开始在网络安全任务上超越人类意味着“全球只有极少数网络安全专家”能够真正理解这次突破的方式。", "x_en": "'OpenAI has not publicly disclosed the details of how its unreleased model escaped confinement. Even if it had, AI systems starting to surpass humans in cyber-security tasks means that “only very, very few cyber experts in the world” could properly understand the way the breach", "u": "https://x.com/shashj/status/2080036154217312496", "lk": 126, "rt": 46, "rp": 6, "eng": 178, "lang": "en", "tags": ["geopolitics", "defense", "europe"]}, {"h": "JavierBlas", "tier": 1, "b": "commodities", "t": "2026-07-23 06:25", "x_zh": "石油巨头二季度财报：道达尔能源以超预期表现开启财报季（调整后净利润约60亿美元，同比增长68%），得益于高油价、交易利润和炼油利润率。这很可能成为本季的主题。\n$TTE\n维持本季度15亿美元的股票回购计划。", "x_en": "BIG OIL 2Q EARNINGS: TotalEnergies opens the earnings season with a beat (adj net income of ~$6 billion, up 68% y-on-y) thanks to high prices, trading profits, and refining margins. It's likely to become the theme of the season. \n$TTE\n keeps buyback at $1.5 bn for the quarter.", "u": "https://x.com/JavierBlas/status/2080177355906007250", "lk": 60, "rt": 8, "rp": 4, "eng": 72, "lang": "en", "tags": ["commodities", "oil_energy", "supply_demand"]}, {"h": "natolambert", "tier": 2, "b": "weather", "t": "2026-07-22 21:55", "x_zh": "我认为目前的情况是：公开信息极大地倾向于认为蒸馏没问题，无需采取行动。公开研究表明影响极小。有一些机密报告（例如来自NSA及其他政府机构的数据）、私人简报", "x_en": "Where I think things are at: the public information MASSIVELY favors the state of affairs that distillation is fine, no action needed. Public research shows minimal effect.\n\nThere have been some classified reports (e.g. data from NSA, other govt agencies), private briefings from", "u": "https://x.com/natolambert/status/2080049053430390878", "lk": 43, "rt": 3, "rp": 3, "eng": 49, "lang": "en", "tags": ["ai_semis", "ai_research", "models"]}, {"h": "simonw", "tier": 2, "b": "ai_semis", "t": "2026-07-23 01:29", "x_zh": "我认为循环是一种短暂的补丁，用于那些无法可靠地持续处理长问题直到达成既定目标的模型。Fable和GPT-5.6（可能还有Kimi K3）可以直接做到这一点，无需辅助。", "x_en": "I think loops were a short-lived patch for models that couldn't reliably keep working on long problems until they hit a defined goal\n\nFable and GPT-5.6 (and probably Kimi K3 as well) can just do that out of the box, unassisted", "u": "https://x.com/simonw/status/2080102848050933904", "lk": 669, "rt": 40, "rp": 83, "eng": 792, "lang": "en", "tags": ["ai_semis", "ai_engineering", "developer"]}, {"h": "danielnewmanUV", "tier": 2, "b": "ai_semis", "t": "2026-07-22 21:39", "x_zh": "我不在乎市场对$GOOGL财报的即时反应。从长期来看，这对AI交易极为利好。自由现金流黑帮因为需要多等一会儿才能看到投资回报而闹腾。但回报终将到来。", "x_en": "I don’t care what the immediate reaction to the \n$GOOGL\n print is. This is incredibly bullish for the AI trade long term. FCF mafia having a fit because it has to wait a little longer for the investment to pay off. And it will.", "u": "https://x.com/danielnewmanUV/status/2080045150642786589", "lk": 228, "rt": 4, "rp": 20, "eng": 252, "lang": "en", "tags": ["ai_semis", "enterprise_tech", "semiconductors"]}, {"h": "eric_seufert", "tier": 2, "b": "ai_semis", "t": "2026-07-22 17:24", "x_zh": "围绕聊天机器人广告市场似乎出现了一个另类信息空间，导致人们认为OpenAI的广告产品彻底失败，聊天机器人中的广告根本不可行，整个类别永远不会产生", "x_en": "An alternate information space seems to have developed around the chatbot advertising market that has led people to believe that OpenAI's advertising product is an abject failure, ads in chatbots are fundamentally nonviable anyway, and the entire category will never generate a", "u": "https://x.com/eric_seufert/status/2079980857469583845", "lk": 36, "rt": 8, "rp": 6, "eng": 50, "lang": "en", "tags": ["ai_semis",       var B=BOARDS[t.b]||{color:"#5b8def"}, body=bodyOf(t), tags=(t.tags||[]).map(function(x){return '<span class="tag" data-tag="'+esc(x)+'">'+esc(x)+'</span>'}).join("");
      var c=document.createElement("div"); c.className="card"; c.tabIndex=0; c.style.setProperty("--bc",B.color);
      c.innerHTML='<div class="chead"><span class="hand" data-h="'+esc(t.h)+'">@'+esc(t.h)+'</span><span class="bchip" style="background:'+B.color+'">'+boardShort(t.b)+'</span>'+(t.tier===1?'<span class="t1">'+tx("tier1")+'</span>':'')+'<span class="lang">'+(t.lang==="zh"?tx("langZh"):tx("langEn"))+'</span><span class="time mono">'+esc(t.t)+'</span></div><div class="cbody">'+hl(body,st.q)+'</div><div class="cfoot"><span class="eng mono"><span>♥ '+fmt(t.lk)+'</span><span>⟲ '+fmt(t.rt)+'</span><span>💬 '+fmt(t.rp)+'</span></span><span class="tags">'+tags+'</span><span class="open">'+tx("open")+'</span></div>';
      var bodyEl=c.querySelector(".cbody"); requestAnimationFrame(function(){if(bodyEl.scrollHeight>bodyEl.clientHeight+4){bodyEl.classList.add("clamp"); var mm=document.createElement("span"); mm.className="more"; mm.textContent=tx("more"); bodyEl.after(mm); mm.onclick=function(e){e.stopPropagation();bodyEl.classList.toggle("open");bodyEl.classList.toggle("clamp");mm.textContent=bodyEl.classList.contains("open")?tx("less"):tx("more")}}});
      c.onclick=function(){window.open(t.u,"_blank","noopener")}; c.onkeydown=function(e){if(e.key==="Enter")window.open(t.u,"_blank","noopener")};
      c.querySelector(".hand").onclick=function(e){e.stopPropagation();jumpHandle(t.h)}; c.querySelectorAll(".tag").forEach(function(tg){tg.onclick=function(e){e.stopPropagation();$("#q").value=tg.dataset.tag;st.q=tg.dataset.tag;$("#clr").style.display="block";render()}});
      s.appendChild(c);
    })
  }
  function renderAll(){syncUi();renderReport();renderIndices();buildPills();render()}
  var qi=$("#q"),clr=$("#clr"); qi.oninput=function(){st.q=qi.value.trim();clr.style.display=qi.value?"block":"none";render()}; clr.onclick=function(){qi.value="";st.q="";clr.style.display="none";qi.focus();render()};
  document.addEventListener("keydown",function(e){if(e.key==="/"&&document.activeElement!==qi){e.preventDefault();qi.focus()} if(e.key==="Escape"&&document.activeElement===qi){qi.value="";st.q="";clr.style.display="none";render()}});
  function seg(id,key){var el=$(id);el.querySelectorAll("button").forEach(function(b){b.onclick=function(){el.querySelectorAll("button").forEach(function(x){x.removeAttribute("data-on")});b.setAttribute("data-on","1");st[key]=b.dataset.v;render()}})}
  seg("#sortSeg","sort"); seg("#tierSeg","tier"); seg("#langSeg","lang");
  $("#reset").onclick=function(){st.board="all";st.tier="all";st.lang="all";st.sort="hot";st.q="";qi.value="";clr.style.display="none";[["#sortSeg","hot"],["#tierSeg","all"],["#langSeg","all"]].forEach(function(p){var el=$(p[0]);el.querySelectorAll("button").forEach(function(x){x.setAttribute("data-on",x.dataset.v===p[1]?"1":"")})});buildPills();render()};
  app.querySelectorAll(".langsw button").forEach(function(b){b.onclick=function(){uiLang=b.dataset.lang;renderAll()}});
  renderAll();
})();
