e": "High Alert · Fed / Rates", "points": ["@donnelly_brent: Although Warsh publicly opposes forward guidance, Waller yesterday gave the clearest forward guidance: if core CPI is <b class=\"em\">0.4%</b>, he will vote to hike; if it is <b class=\"em\">0.2%</b>, he will not. He almost said it outright.", "Trading implication: Waller's 'data dependence' has been translated into specific thresholds, with <b class=\"em\">0.2%</b> core CPI becoming the rate hike trigger; the market will closely watch the next data release.", "Key data: <b class=\"em\">0.4%</b>, <b class=\"em\">0.2%</b>", "Interactions <b class=\"em\">162</b>+ · From Macroeconomic section"]}, {"title": "Contrarian Variable · Fed / Rates", "points": ["@AndreasSteno: We not only beat consensus, but also beat our own forecast—the Nowcast IQ model holds the softest US inflation forecast on Wall Street, and this morning the BLS confirmed we were right and then some: consensus expected core CPI month-on-month <b class=\"em\">+0.2%</b>, actual was <b class=\"em\">0.0%</b>.", "Trading implication: If model accuracy persists, it will reinforce market pricing of rapid inflation decline, benefiting rate-sensitive assets.", "Key data: <b class=\"em\">0.2%</b>, <b class=\"em\">0.0%</b>", "Interactions <b class=\"em\">468</b>+ · From Macroeconomic section"]}, {"title": "Sentiment Shift · Fed / Rates", "points": ["@biancoresearch: Finally something market-relevant... over <b class=\"em\">100</b> minutes. Also, Bloomberg headline in red: Warsh says 'mission accomplished' is not his view of today's CPI data.", "Trading implication: Warsh's denial of 'mission accomplished' suggests hawkishness remains within the Fed; market pricing of rate cuts may be overly optimistic.", "Key data: <b class=\"em\">100</b>", "Interactions <b class=\"em\">74</b>+ · From Macroeconomic section"]}, {"title": "Unique View · Precious Metals", "points": ["@TaviCosta (Macro Strategy (Crescat)): Copper prices are refusing to confirm gold's recent weakness; this resilience is telling. I suspect gold is about to remind investors why this is still a solid long-term bull market.", "Trading implication: If the copper-gold divergence persists, the gold bull thesis will gain support from physical demand, but watch for the risk of a copper catch-down.", "Interactions <b class=\"em\">900</b>+ · From Macroeconomic section"]}], "unique": [["@AndreasSteno", "We not only beat consensus, but also beat our own forecast—the Nowcast IQ model holds the softest US inflation forecast on Wall Street, and this morning the BLS confirmed we were right and then some: consensus expected core CPI month-on-month +0.2%, actual was 0.0%.", "If model accuracy persists, it will reinforce market pricing of rapid inflation decline, benefiting rate-sensitive assets."], ["@donnelly_brent", "Although Warsh publicly opposes forward guidance, Waller yesterday gave the clearest forward guidance: if core CPI is 0.4%, he will vote to hike; if it is 0.2%, he will not. He almost said it outright.", "Waller's 'data dependence' has been translated into specific thresholds, with 0.2% core CPI becoming the rate hike trigger; the market will closely watch the next data release."], ["@gdb", "El Niño Costero off the coast of Peru is rapidly intensifying, with sea surface temperature anomalies in the Niño 1+2 region approaching +3°C, similar to the same period in 1997; expected to expand to Ecuador within two weeks, potentially triggering dramatic changes in South American precipitation patterns.", "If El Niño intensity continues to exceed expectations, it will heighten the risk of reduced South American agricultural output (soybeans, corn) and may impact Chilean copper production."], ["@TaviCosta", "Copper prices are refusing to confirm gold's recent weakness; this resilience is telling. I suspect gold is about to remind investors why this is still a solid long-term bull market.", "If the copper-gold divergence persists, the gold bull thesis will gain support from physical demand, but watch for the risk of a copper catch-down."]], "sections": [["Macroeconomic", [["Precious Metals", [["@TaviCosta", "Macro Strategy (Crescat)", "Copper prices are refusing to confirm gold's recent weakness; this resilience is telling. I suspect gold is about to remind investors why this is still a solid long-term bull market. <span style=\"color:#8fa0b3\">Trading implication: If the copper-gold divergence persists, the gold bull thesis will gain support from physical demand, but watch for the risk of a copper catch-down.</span>"], ["@DariusDale42", "", "I support Chairman Warsh and his Fed colleagues in making our nearly three-year asset allocation view wrong, and would gladly serve the Fed in any capacity if I can help the institution shift from gold back to bonds as the primary reserve asset. <span style=\"color:#8fa0b3\">Trading implication: DariusDale has long been bearish on bonds and bullish on gold; if the Fed succeeds in pivoting, bonds will regain appeal.</span>"]]], ["Fed / Rates", [["@AndreasSteno", "", "We not only beat consensus, but also beat our own forecast—the Nowcast IQ model holds the softest US inflation forecast on Wall Street, and this morning the BLS confirmed we were right and then some: consensus expected core CPI month-on-month <b class=\"em\">+0.2%</b>, actual was <b class=\"em\">0.0%</b>. <span style=\"color:#8fa0b3\">Trading implication: If model accuracy persists, it will reinforce market pricing of rapid inflation decline, benefiting rate-sensitive assets.</span>"], ["@donnelly_brent", "", "Although Warsh publicly opposes forward guidance, Waller yesterday gave the clearest forward guidance: if core CPI is <b class=\"em\">0.4%</b>, he will vote to hike; if it is <b class=\"em\">0.2%</b>, he will not. He almost said it outright. <span style=\"color:#8fa0b3\">Trading implication: Waller's 'data dependence' has been translated into specific thresholds, with <b class=\"em\">0.2%</b> core CPI becoming the rate hike trigger; the market will closely watch the next data release.</span>"], ["@biancoresearch", "", "Finally something market-relevant... over <b class=\"em\">100</b> minutes. Also, Bloomberg headline in red: Warsh says 'mission accomplished' is not his view of today's CPI data. <span style=\"color:#8fa0b3\">Trading implication: Warsh's denial of 'mission accomplished' suggests hawkishness remains within the Fed; market pricing of rate cuts may be overly optimistic.</span>"], ["@michaelkantro", "Macro Strategy (Piper Sandler)", "I expect the Fed's tone to continue following labor and inflation data surprises, with <b class=\"em\">2026</b> marking the first double negative surprise in both labor and inflation data. <span style=\"color:#8fa0b3\">Trading implication: If a double negative surprise is confirmed, the Fed's pivot to dovishness could be faster than market expectations.</span>"], ["@DiMartinoBooth", "", "Wall Street was whispering that core CPI could hit <b class=\"em\">0.4%</b>, double the consensus, with positioning tilted toward an upside surprise. Instead, core CPI was flat, surprising all economists surveyed by business surveys. Conversely, falling energy prices dragged down the headline, surprising no one. <span style=\"color:#8fa0b3\">Trading implication: The market's misjudgment of core inflation is significant; short covering could drive rates and the USD lower in the short term.</span>"]]], ["Macroeconomic", [["@BobEUnlimited", "Macro Research", "The stock market frenzy was fragile from the start—sky-high expectations, exhausted speculators, and tightening financial conditions eroding price momentum. A new geopolitical conflict could easily push it over the edge. <span style=\"color:#8fa0b3\">Trading implication: If geopolitical risks escalate, high-valuation stocks will be hit first; defensive assets and gold may benefit.</span>"]]]]], ["Geopolitics", [["Middle East", [["@shashj", "", "Oil prices did not rise further because the market bets Trump will compromise four months before the midterm elections; on <b class=\"em\">July</b> <b class=\"em\">14</b>, he already abandoned the transit fee plan, confirming market judgment. <span style=\"color:#8fa0b3\">Trading implication: If Trump does not compromise, oil prices face upside risk; current market pricing is overly optimistic.</span>"], ["@james_acton32", "", "The military reality in the Strait of Hormuz has not changed since mid-<b class=\"em\">June</b>: Iran can block international shipping, and the US can counter-blockade Iran. Recent history and the midterm election timeline suggest Iran is unlikely to blink first. <span style=\"color:#8fa0b3\">Trading implication: The probability of a prolonged stalemate is high; oil volatility will remain elevated, and shipping insurance costs will rise.</span>"], ["@ELuttwak", "", "The NYT deliberately amplifies Iran's capabilities and downplays the US military, even acting as a tool for the Revolutionary Guard: claiming US bombing of bridges and power grids 'could constitute war crimes' is completely misleading. <span style=\"color:#8fa0b3\">Trading implication: Media narrative bias may lead the market to underestimate US military capability and overestimate Iran's deterrence.</span>"], ["@AliVaez", "", "If the US and Iran let the current fragile understanding break down, the next ceasefire will only be a pause before the next battle, and war could become the norm. <span style=\"color:#8fa0b3\">Trading implication: The diplomatic window is closing; geopolitical premiums should be priced in continuously, not as a one-off event.</span>"]]], ["Russia-Ukraine", [["@samagreene", "", "The State Department's statement on Russia-Ukraine is strong in rhetoric but weak in actionable points, almost suggesting it does not truly believe in its own mission. Rome Statute signatories should respond in kind. <span style=\"color:#8fa0b3\">Trading implication: Actual US support for Russia-Ukraine may be weaker than rhetoric; the market should not overprice escalation risk.</span>"]]], ["US-China", [["@ryanl_hass", "", "Sharing a written exchange on the US-China military balance and key factors in a West Pacific conflict, but no specific new judgments provided. <span style=\"color:#8fa0b3\">Trading implication: The topic is gaining attention but lacks trading signals; follow-up substantive analysis is needed.</span>"]]], ["Other Geopolitics", [["@matthewkroenig", "", "A <b class=\"em\">13</b>-digit (trillion-level) increase in defense spending cannot be ignored, but spending sufficient to deter or defeat hostile powers is necessary and ultimately cheaper than losing a great power war. <span style=\"color:#8fa0b3\">Trading implication: The long-term upward trend in defense spending is confirmed; the defense sector and bond term premiums should continue to reflect this expectation.</span>"]]]]], ["Commodities", [["Crude Oil", [["@shashj", "", "One reason oil prices did not rise further is that the market believes Trump will eventually compromise, with only four months until the midterm elections; on <b class=\"em\">July</b> <b class=\"em\">14</b>, he already abandoned the transit fee plan. <span style=\"color:#8fa0b3\">Trading implication: Political gamesmanship is a short-term cap on oil prices; if Trump hardens his stance, oil could rise quickly.</span>"]]], ["Metals", [["@TaviCosta", "Macro Strategy (Crescat)", "Copper prices are refusing to confirm gold's recent weakness; this resilience is significant. I suspect gold is about to remind investors why this is still a solid long-term bull market. <span style=\"color:#8fa0b3\">Trading implication: The copper-gold divergence is an important cross-market signal; if gold catches up, it could drive the entire precious metals sector higher.</span>"]]]]], ["Weather & Climate", [["El Niño Status", [["@gdb", "OpenAI President", "El Niño Costero off the coast of Peru is rapidly intensifying, with sea surface temperature anomalies in the Niño <b class=\"em\">1</b><b class=\"em\">+2</b> region approaching <b class=\"em\">+3°C</b>, similar to the same period in <b class=\"em\">1997</b>; expected to expand to Ecuador within two weeks, potentially triggering dramatic changes in South American precipitation patterns. <span style=\"color:#8fa0b3\">Trading implication: If El Niño intensity continues to exceed expectations, it will heighten the risk of reduced South American agricultural output (soybeans, corn) and may impact Chilean copper production.</span>"]]]]], ["AI / Semiconductors", [["Inference", [["@Mayhem4Markets", "", "NousResearch's open-source AI agent Hermes is highly capable, and the market undervalues its potential; inference-side compute demand may accelerate due to the flourishing open-source ecosystem. <span style=\"color:#8fa0b3\">Trading implication: If open-source model performance continues to approach closed-source, the inference chip market landscape will become more fragmented.</span>"]]], ["Other AI / Semiconductors", [["@skorusARK", "", "Some US states have imposed moratoriums on data centers, reminiscent of policy mistakes that stifled nuclear power. Fortunately, these are state-level bans, so data centers can relocate to friendly states, but if they spread, they will impact AI compute infrastructure. <span style=\"color:#8fa0b3\">Trading implication: If data center bans proliferate, they will dampen short-term AI chip demand but benefit overseas compute deployment.</span>"]]]]]]}, "tweets": [{"h": "TaviCosta", "tier": 1, "b": "macro", "t": "2026-07-14 22:25", "x_zh": "铜拒绝确认黄金近期的疲软。这种韧性意味深长。我怀疑黄金即将提醒投资者，为什么这仍然是一个根深蒂固的长期牛市。", "x_en": "Copper refuses to confirm gold’s recent weakness.\n\nThat resilience speaks volumes.\n\nI suspect gold is about to remind investors why this remains a well-established secular bull market.\n\n\nhttps://\ntavicosta.substack.com/p/a-message-fr\nom-copper\n…", "u": "https://x.com/TaviCosta/status/2077157589322981452", "lk": 739, "rt": 118, "rp": 43, "eng": 900, "lang": "en", "tags": ["macro", "commodities", "cycle"]}, {"h": "AndreasSteno", "tier": 1, "b": "macro", "t": "2026-07-14 13:01", "x_zh": "我们不仅超过了共识预期，还超越了自己的预测。昨天，我们的Nowcast IQ模型持有市场上最温和的美国通胀预测。今早，美国劳工统计局证明了我们的正确——甚至更多。记分牌：共识预期：环比-0.1%整体，+0.2%核心；Nowcast IQ：", "x_en": "We didn't just beat consensus, we beat our own forecast\n\nYesterday, our Nowcast IQ models held the SOFTEST US inflation forecast of anyone on the street. This morning, the BLS proved us right — and then some.\n\nThe scoreboard:\n\nConsensus: -0.1% MoM headline, +0.2% core\nNowcast IQ:", "u": "https://x.com/AndreasSteno/status/2077015700976124327", "lk": 368, "rt": 30, "rp": 70, "eng": 468, "lang": "en", "tags": ["macro", "rates_fx", "cross_asset"]}, {"h": "bgurley", "tier": 2, "b": "macro", "t": "2026-07-14 18:02", "x_zh": "很多州都张开双臂欢迎——所以我对此没意见。“联邦制度的一个令人愉快的意外是，一个勇敢的州，如果其公民选择，可以充当实验室……”既然这些地方的人确实在使用AI，我确实想知道他们是否应该为此付费。", "x_en": "Plenty of states have open arms - so I am cool with it. “It is one of the happy incidents of the federal system that a single courageous State may, if its citizens choose, serve as a laboratory…”\n\nSince people in these places do use AI, I do wonder if they should have to pay", "u": "https://x.com/bgurley/status/2077091437985009730", "lk": 334, "rt": 16, "rp": 29, "eng": 379, "lang": "en", "tags": ["ai_semis", "venture", "technology"]}, {"h": "donnelly_brent", "tier": 1, "b": "macro", "t": "2026-07-14 12:16", "x_zh": "尽管Warsh公开反对前瞻性指引，但Waller昨天却给出了最明确的前瞻性指引。如果核心CPI为0.4，他将投票支持加息。他没有完全直说，但基本上表达了这意思。而如果是0.2，他不会。他的讲话显示", "x_en": "Despite Warsh's professed view against forward guidance, Waller offered up the most explicit forward guidance possible yestserday.\n\nIf core CPI is 0.4, he will vote for a hike. He didn't quite say this outright, but he pretty much said it. And 0.2 he will not.\n\nHis speech shows", "u": "https://x.com/donnelly_brent/status/2077004380931260820", "lk": 116, "rt": 10, "rp": 36, "eng": 162, "lang": "en", "tags": ["macro", "rates_fx", "trader"]}, {"h": "michaelkantro", "tier": 2, "b": "macro", "t": "2026-07-14 16:25", "x_zh": "我预计美联储的基调将继续跟随劳动力和通胀数据的意外变化，这些数据现在出现了2026年的首次双重负面意外。", "x_en": "I expect the Fed’s tone to continue following surprises in labor and inflation data, which have now seen the first double-negative surprise of 2026.", "u": "https://x.com/MichaelKantro/status/2077067072555626826", "lk": 81, "rt": 13, "rp": 23, "eng": 117, "lang": "en", "tags": ["macro", "cycle", "sellside"]}, {"h": "biancoresearch", "tier": 1, "b": "macro", "t": "2026-07-14 15:45", "x_zh": "终于，市场有动静了……超过100分钟。此外，彭博终端上出现红色标题：*WARSH：'任务完成'并非我今天对CPI数据的看法", "x_en": "Finally, something for markets... over 100 minutes in.\n\nAlso, a red headline on BB\n\n*WARSH: 'MISSION ACCOMPLISHED' NOT MY VIEW AFTER CPI DATA TODAY", "u": "https://x.com/biancoresearch/status/2077056872717173050", "lk": 36, "rt": 4, "rp": 34, "eng": 74, "lang": "en", "tags": ["macro", "rates_fx", "bonds"]}, {"h": "BobEUnlimited", "tier": 1, "b": "macro", "t": "2026-07-14 10:28", "x_zh": "解开这场狂热。股市狂热本就脆弱，因为过高的预期、投机性投资者的疲惫以及金融条件的收紧导致价格动能减弱。新的战争很可能将其推过边缘。", "x_en": "Unraveling This Mania\n\nThe equity mania was already fragile as sky high expectations, speculative investor exhaustion, and tightening financial conditions drove fading price action. Renewed war is likely to put it over the edge.\n\n\nhttps://\nbobeunlimited.substack.com/p/unraveling-t\nhis-mania\n…", "u": "https://x.com/BobEUnlimited/status/2076977042998911300", "lk": 47, "rt": 8, "rp": 11, "eng": 66, "lang": "en", "tags": ["macro", "rates_fx", "cycle"]}, {"h": "BobEUnlimited", "tier": 1, "b": "macro", "t": "2026-07-14 19:15", "x_zh": "还有其他人收到这个Schwab的“提议”吗？继Fidelity要求发行人支付15%的费用以换取免收交易费和数据的做法之后。这笔费用要么由投资者支付，要么挤压（本已紧张的）发行人利润。无论哪种方式，如此繁重的费用对投资者来说都是糟糕的结果。", "x_en": "Anyone else get this Schwab \"offer\" following Fidelity's lead demanding issuers pay 15% of fees in exchange for no ticket charge & data?\n\nHas to be paid either by the investor or squeeze (already tight) issuer margins. Either way such onerous fees are a bad outcome for investors.", "u": "https://x.com/BobEUnlimited/status/2077109645986963774", "lk": 43, "rt": 6, "rp": 9, "eng": 58, "lang": "en", "tags": ["macro", "rates_fx", "cycle"]}, {"h": "DariusDale42", "tier": 2, "b": "macro", "t": "2026-07-14 16:49", "x_zh": "在美联储制度变革期间管理多资产组合的风险：如果你负责为你的家庭或其他家庭管理多资产组合（或多个组合）的风险，那么你可能会发现这段简短的讨论与你所受的任何教育一样有价值。", "x_en": "RISK MANAGING MULTI-ASSET PORTFOLIOS AMID FED REGIME CHANGE: If you are responsible for risk managing a multi-asset portfolio (or portfolios) for your family or other families, then it is likely that you will find this short discussion to be as valuable as any education you've", "u": "https://x.com/DariusDale42/status/2077073110285619340", "lk": 41, "rt": 2, "rp": 4, "eng": 47, "lang": "en", "tags": ["macro", "risk_regime", "quant"]}, {"h": "Mayhem4Markets", "tier": 2, "b": "macro", "t": "2026-07-15 00:51", "x_zh": "最后一批零件本周到货。然后我将完成这个超棒的组装。等不及在一个工作站里装4块RTX 6K Pro了！", "x_en": "Final parts are arriving this week.\n\nThen I will complete this awesome build.\n\nCan't wait for 4 x RTX 6K Pros in a single workstation!", "u": "https://x.com/Mayhem4Markets/status/2077194201112908201", "lk": 31, "rt": 1, "rp": 6, "eng": 38, "lang": "en", "tags": ["macro", "rates_fx", "market_narrative"]}, {"h": "DiMartinoBooth", "tier": 2, "b": "macro", "t": "2026-07-15 04:18", "x_zh": "市场传言核心CPI将录得0.4%，是共识预期的两倍，且市场已为上行意外做好准备。但持平的核心数据让接受@business调查的每一位经济学家都感到意外。相反，拖累整体CPI的能源价格下跌却无人感到意外。", "x_en": "Street was whispering about a 0.4% print on the CORE, double consensus & positioned for an upside surprise.\n\nThe unchanged CORE read took every economist \n@business\n surveyed by surprise.\n\nConversely, the fall in energy prices that dragged down the headline took NO ONE by surprise.", "u": "https://x.com/DiMartinoBooth/status/2077246442301776351", "lk": 18, "rt": 3, "rp": 2, "eng": 23, "lang": "en", "tags": ["macro", "central_banks", "economics"]}, {"h": "Mayhem4Markets", "tier": 2, "b": "macro", "t": "2026-07-14 22:04", "x_zh": "老实说被低估了。@   function renderAll(){syncUi();renderReport();buildPills();render()}
  var qi=$("#q"),clr=$("#clr"); qi.oninput=function(){st.q=qi.value.trim();clr.style.display=qi.value?"block":"none";render()}; clr.onclick=function(){qi.value="";st.q="";clr.style.display="none";qi.focus();render()};
  document.addEventListener("keydown",function(e){if(e.key==="/"&&document.activeElement!==qi){e.preventDefault();qi.focus()} if(e.key==="Escape"&&document.activeElement===qi){qi.value="";st.q="";clr.style.display="none";render()}});
  function seg(id,key){var el=$(id);el.querySelectorAll("button").forEach(function(b){b.onclick=function(){el.querySelectorAll("button").forEach(function(x){x.removeAttribute("data-on")});b.setAttribute("data-on","1");st[key]=b.dataset.v;render()}})}
  seg("#sortSeg","sort"); seg("#tierSeg","tier"); seg("#langSeg","lang");
  $("#reset").onclick=function(){st.board="all";st.tier="all";st.lang="all";st.sort="hot";st.q="";qi.value="";clr.style.display="none";[["#sortSeg","hot"],["#tierSeg","all"],["#langSeg","all"]].forEach(function(p){var el=$(p[0]);el.querySelectorAll("button").forEach(function(x){x.setAttribute("data-on",x.dataset.v===p[1]?"1":"")})});buildPills();render()};
  app.querySelectorAll(".langsw button").forEach(function(b){b.onclick=function(){uiLang=b.dataset.lang;renderAll()}});
  renderAll();
})();
</script>
</div>
