her_required"]}, {"h": "jukan05", "tier": 1, "b": "macro", "t": "2026-07-13 03:31", "x_zh": "★★KIS KR Tech: SK海力士(000660) - 2Q26不及预期是稳定长期上涨的开始。KIS半导体分析师Minsook Chae预测SK海力士(000660)2Q26营业利润为60.4万亿韩元(环比+61%,同比+556%),比65万亿韩元的共识低8%。分析师因公司下调了2Q26的ASP增长假设;1)", "x_en": "★★KIS KR Tech: SK Hynix (000660) - 2Q26 miss is start of stable long term upside\n\nKIS Semicon analyst Minsook Chae previews SK Hynix (000660) 2Q26 OPe at W60.4tn (+61% QoQ, +556% YoY), 8% below W65tn consensus. Analyst lowered the ASP growth assumption for 2Q26 due to Co's; 1)", "u": "https://x.com/jukan05/status/2076509701999825259", "lk": 268, "rt": 45, "rp": 29, "eng": 342, "lang": "en", "tags": ["ai_semis", "memory_hbm", "supply_chain"]}, {"h": "elerianm", "tier": 1, "b": "macro", "t": "2026-07-12 16:50", "x_zh": "本周末美国和伊朗之间冲突的显著升级将考验当前市场共识,即此类事态不太可能演变为全面军事冲突。如果该共识成立,油价将在几小时后在亚洲开盘。", "x_en": "This weekend’s significant intensification of the skirmishes between the US and Iran will test the prevailing market consensus that such developments are unlikely to evolve into a full-scale military conflict.\nIf that consensus holds, oil prices will open in Asia in a few hours", "u": "https://x.com/elerianm/status/2076348425524650064", "lk": 225, "rt": 40, "rp": 39, "eng": 304, "lang": "en", "tags": ["macro", "central_banks", "teacher_required"]}, {"h": "AndreasSteno", "tier": 1, "b": "macro", "t": "2026-07-13 06:40", "x_zh": "我讨厌高税收,但为什么有人会誓死捍卫美国医疗体系,这超出了我的理解。你在地球上找不到任何系统能提供更差的价值。极其昂贵。结果平庸。", "x_en": "I hate high taxes, but why anyone would die on the hill defending the U.S. healthcare system is beyond my understanding. \n\nYou can't find a system anywhere on Earth that delivers worse value for money.\n\nIncredibly expensive. Mediocre outcome.", "u": "https://x.com/AndreasSteno/status/2076557467618582848", "lk": 172, "rt": 14, "rp": 44, "eng": 230, "lang": "en", "tags": ["macro", "rates_fx", "cross_asset"]}, {"h": "SantiagoAuFund", "tier": 1, "b": "macro", "t": "2026-07-13 01:49", "x_zh": "今天(又)读到关于世界被“重新布线”以及这将如何对美国产生负面影响的内容。这很有趣。因为美国才是进行重新布线的那个。而且在这方面的18个月内,美国比世界其他地区在过去18年里的尝试做得更多。", "x_en": "Read something (again) today about world being “rewired” & how this will negatively impact the US. Which is funny.  Bc the US is the one doing the rewiring. And have done more in 18 months with this regard than rest of the world has accomplished in their attempts over last 18 yrs", "u": "https://x.com/SantiagoAuFund/status/2076484180355981558", "lk": 162, "rt": 6, "rp": 12, "eng": 180, "lang": "en", "tags": ["macro", "rates_fx", "dollar"]}, {"h": "BobEUnlimited", "tier": 1, "b": "macro", "t": "2026-07-12 11:03", "x_zh": "上周在Bloomberg Surveillance节目中谈到,由AI狂热驱动的极高预期、不断增长的资产供应以及升级的伊朗冲突,很可能会共同导致未来的下行风险。", "x_en": "Stopped by Bloomberg Surveillance last week to talk through how sky high expectations driven by the AI mania, rising asset supply, and the escalating Iran conflict are likely to combine to create downside risks ahead.", "u": "https://x.com/BobEUnlimited/status/2076261036030583082", "lk": 28, "rt": 3, "rp": 7, "eng": 38, "lang": "en", "tags": ["macro", "rates_fx", "cycle"]}, {"h": "GavinSBaker", "tier": 1, "b": "geopolitics", "t": "2026-07-12 18:15", "x_zh": "AI基础设施的超级看涨情况将是*如果*市场份额从某些推理利润率超过90%的前沿实验室转向更便宜的模型,无论是开源还是闭源。这将通过增加每单位智能来提高终端客户在AI支出上的投资回报率。", "x_en": "The mega bull case for AI infrastructure would be *if* market share shifted away from certain frontier labs with 90%+ inference margins toward cheaper models, whether open-source or closed.\n\nIt would increase the ROI on AI spend for end customers by increasing intelligence per", "u": "https://x.com/GavinSBaker/status/2076369936251851091", "lk": 3800, "rt": 685, "rp": 297, "eng": 4782, "lang": "en", "tags": ["ai_semis", "tech_equities", "fund_manager"]}, {"h": "tparsi", "tier": 2, "b": "geopolitics", "t": "2026-07-13 01:54", "x_zh": "告诉@BBCWorld，军事行动不太可能从根本上改变有利于美国或伊朗的地面事实。充其量，它可能促成新一轮谈判，届时试图通过武力重塑地面现实的吸引力终于减弱。", "x_en": "Told \n@BBCWorld\n that military action is unlikely to fundamentally change facts on the ground in favor of the US or Iran. At best, it may produce another round of talks in which the appeal of trying to reshape realities on the ground through force has finally diminished.", "u": "https://x.com/tparsi/status/2076485358678614331", "lk": 311, "rt": 63, "rp": 16, "eng": 390, "lang": "en", "tags": ["geopolitics", "middle_east", "diplomacy"]}, {"h": "tparsi", "tier": 2, "b": "geopolitics", "t": "2026-07-13 04:17", "x_zh": "海峡问题上存在可行的妥协方案；各方几天前曾接近达成。我不认为军事行动会以让美国或伊朗能够放弃妥协、将自己的偏好强加于对方的方式改变地面事实。", "x_en": "There is a workable compromise on the Strait; the parties were close to reaching it a few days ago. I don't see military action changing facts on the ground in a manner that would enable either the US or Iran to forgo a compromise and force its preference on the other.", "u": "https://x.com/tparsi/status/2076521417416261801", "lk": 140, "rt": 20, "rp": 8, "eng": 168, "lang": "en", "tags": ["geopolitics", "middle_east", "diplomacy"]}, {"h": "JavierBlas", "tier": 1, "b": "geopolitics", "t": "2026-07-13 07:25", "x_zh": "专栏：美伊战争的结束使油价降至约75美元/桶。但俄乌战争的升级正在推高石油精炼产品的成本。结果如何？燃料价格仍高企，仿佛原油还在100美元以上。@Opinion", "x_en": "COLUMN: The end of the US-Iran war has brought oil down to ~$75 a barrel. But the escalation of the Russia-Ukraine war is inflating the cost of petroleum refined products. The result? Fuel prices remain as high as if crude was still above $100. \n\n\n@Opinion", "u": "https://x.com/JavierBlas/status/2076568682810011739", "lk": 58, "rt": 19, "rp": 5, "eng": 82, "lang": "en", "tags": ["commodities", "oil_energy", "supply_demand"]}, {"h": "ELuttwak", "tier": 2, "b": "geopolitics", "t": "2026-07-12 15:01", "x_zh": "https://youtube.com/watch?v=NOJYmTTEKA8…埃尔多安勉强连任，不会再当选。他的继任者将拆除那些只让未受教育者印象深刻的奥斯曼复兴式新军装束。", "x_en": "https://\nyoutube.com/watch?v=NOJYmT\nTEKA8\n…\nErdogan was barely re-elected & will not be re-elected again. His successor will dismantle the Ottoman-revival yeniseri paraphenelia that impresses only the uneducated.", "u": "https://x.com/ELuttwak/status/2076321024262406345", "lk": 66, "rt": 9, "rp": 6, "eng": 81, "lang": "en", "tags": ["geopolitics", "strategy", "history"]}, {"h": "CollinSLKoh", "tier": 2, "b": "geopolitics", "t": "2026-07-13 03:14", "x_zh": "自2016年以来，我从北京听到“注定失败”和“搬起石头砸自己的脚”等类似说法无数次，数都数不清。照这个速度下去，菲律宾将没有更多的脚可砸了。", "x_en": "I hear \"doomed to failure\" and 'shooting oneself in the foot\" amongst many such lines from Beijing so many times since 2016 that I lost count. At this rate going forward, the Philippines will have no more feet to shoot at.", "u": "https://x.com/CollinSLKoh/status/2076505507964277197", "lk": 59, "rt": 6, "rp": 8, "eng": 73, "lang": "en", "tags": ["geopolitics", "maritime", "indo_pacific"]}, {"h": "anasalhajji", "tier": 1, "b": "geopolitics", "t": "2026-07-13 02:47", "x_zh": "油价上涨近4%，但布伦特仍低于80美元/桶。", "x_en": "Oil prices are up by almost 4% but Brent remains below $80/b", "u": "https://x.com/anasalhajji/status/2076498812286189974", "lk": 34, "rt": 2, "rp": 0, "eng": 36, "lang": "en", "tags": ["commodities", "oil_energy", "middle_east"]}, {"h": "GoddessofGrain", "tier": 2, "b": "geopolitics", "t": "2026-07-12 12:23", "x_zh": "黑海局势升级对粮食流动究竟意味着什么？中国在未来一年可能购买多少粮食？本周及更多内容……周日恐惧：黑海危机与中国粮食购买展望 https://open.substack.com/pub/consusconsensus/p/sunday-scaries-a-black-sea-meltdown?r=1rhyn9&utm_campaign=post&utm_medium=web&showWelcomeOnShare=true…", "x_en": "What could the escalation in the Black Sea really mean for grain flow and how much grain could China look to buy in the year ahead? That and more this week...\n\nSunday Scaries: A Black Sea Meltdown and China's Grain Buying Outlook \nhttps://\nopen.substack.com/pub/consuscons\nensus/p/sunday-scaries-a-black-sea-meltdown?r=1rhyn9&utm_campaign=post&utm_medium=web&showWelcomeOnShare=true\n…", "u": "https://x.com/GoddessofGrain/status/2076281281357238422", "lk": 15, "rt": 2, "rp": 3, "eng": 20, "lang": "en", "tags": ["commodities", "agri_softs", "trader"]}, {"h": "Ole_S_Hansen", "tier": 1, "b": "geopolitics", "t": "2026-07-12 09:25", "x_zh": "如表所示，     var uh=$("#unique");uh.innerHTML=""; r.unique.forEach(function(u){var c=document.createElement("div");c.className="ucard";c.innerHTML='<div class="uh" data-h="'+esc(u[0].replace("@",""))+'">'+u[0]+'</div><div class="uv">'+u[1]+'</div><div class="ui">'+tx("meaning")+u[2]+'</div>';c.querySelector(".uh").onclick=function(){jumpHandle(u[0].replace("@",""))};uh.appendChild(c)});
  }
  function buildPills(){
    var tw=cur().tweets,wrap=$("#boardPills");wrap.innerHTML=""; var counts={all:tw.length};Object.keys(BOARDS).forEach(function(k){counts[k]=0}); tw.forEach(function(t){counts[t.b]=(counts[t.b]||0)+1});
    function mk(key,label,color){var p=document.createElement("button");p.className="pill";p.innerHTML=label+' <span class="cnt">'+(counts[key]||0)+'</span>';if(st.board===key){p.setAttribute("data-on","1");p.style.background=color;p.style.borderColor=color} p.onclick=function(){st.board=key;buildPills();render()};return p}
    wrap.appendChild(mk("all",tx("all"),"#e7b24d")); Object.keys(BOARDS).forEach(function(k){wrap.appendChild(mk(k,boardLabel(k),BOARDS[k].color))});
  }
  function pass(t){
    if(st.board!=="all"&&t.b!==st.board)return false;
    if(st.tier!=="all"&&(""+t.tier)!==st.tier)return false;
    if(st.lang!=="all"&&t.lang!==st.lang)return false;
    if(st.q){var q=st.q.toLowerCase(); var hay=(bodyOf(t)+" "+(t.x_zh||"")+" "+(t.x_en||"")+" @"+t.h+" "+(t.tags||[]).join(" ")).toLowerCase(); if(hay.indexOf(q)<0)return false}
    return true
  }
  function render(){
    var m=cur().meta,tw=cur().tweets.filter(pass); tw.sort(function(a,b){return st.sort==="hot"?b.eng-a.eng:(a.t<b.t?1:-1)});
    var kol=new Set(tw.map(function(t){return t.h})).size; $("#tstat").innerHTML=tx("show")+' <b>'+tw.length+'</b> / '+m.n_tweets+' · <b>'+kol+'</b> '+tx("kols")+' · '+tx("monitor")+' '+m.n_accounts+' '+tx("accounts");
    var s=$("#stream"); if(!tw.length){s.innerHTML='<div class="empty">'+tx("empty")+'</div>';return} s.innerHTML="";
    tw.forEach(function(t){
      var B=BOARDS[t.b]||{color:"#5b8def"}, body=bodyOf(t), tags=(t.tags||[]).map(function(x){return '<span class="tag" data-tag="'+esc(x)+'">'+esc(x)+'</span>'}).join("");
      var c=document.createElement("div"); c.className="card"; c.tabIndex=0; c.style.setProperty("--bc",B.color);
      c.innerHTML='<div class="chead"><span class="hand" data-h="'+esc(t.h)+'">@'+esc(t.h)+'</span><span class="bchip" style="background:'+B.color+'">'+boardShort(t.b)+'</span>'+(t.tier===1?'<span class="t1">'+tx("tier1")+'</span>':'')+'<span class="lang">'+(t.lang==="zh"?tx("langZh"):tx("langEn"))+'</span><span class="time mono">'+esc(t.t)+'</span></div><div class="cbody">'+hl(body,st.q)+'</div><div class="cfoot"><span class="eng mono"><span>♥ '+fmt(t.lk)+'</span><span>⟲ '+fmt(t.rt)+'</span><span>💬 '+fmt(t.rp)+'</span></span><span class="tags">'+tags+'</span><span class="open">'+tx("open")+'</span></div>';
      var bodyEl=c.querySelector(".cbody"); requestAnimationFrame(function(){if(bodyEl.scrollHeight>bodyEl.clientHeight+4){bodyEl.classList.add("clamp"); var mm=document.createElement("span"); mm.className="more"; mm.textContent=tx("more"); bodyEl.after(mm); mm.onclick=function(e){e.stopPropagation();bodyEl.classList.toggle("open");bodyEl.classList.toggle("clamp");mm.textContent=bodyEl.classList.contains("open")?tx("less"):tx("more")}}});
      c.onclick=function(){window.open(t.u,"_blank","noopener")}; c.onkeydown=function(e){if(e.key==="Enter")window.open(t.u,"_blank","noopener")};
      c.querySelector(".hand").onclick=function(e){e.stopPropagation();jumpHandle(t.h)}; c.querySelectorAll(".tag").forEach(function(tg){tg.onclick=function(e){e.stopPropagation();$("#q").value=tg.dataset.tag;st.q=tg.dataset.tag;$("#clr").style.display="block";render()}});
      s.appendChild(c);
    })
  }
  function renderAll(){syncUi();renderReport();buildPills();render()}
  var qi=$("#q"),clr=$("#clr"); qi.oninput=function(){st.q=qi.value.trim();clr.style.display=qi.value?"block":"none";render()}; clr.onclick=function(){qi.value="";st.q="";clr.style.display="none";qi.focus();render()};
  document.addEventListener("keydown",function(e){if(e.key==="/"&&document.activeElement!==qi){e.preventDefault();qi.focus()} if(e.key==="Escape"&&document.activeElement===qi){qi.value="";st.q="";clr.style.display="none";render()}});
  function seg(id,key){var el=$(id);el.querySelectorAll("button").forEach(function(b){b.onclick=function(){el.querySelectorAll("button").forEach(function(x){x.removeAttribute("data-on")});b.setAttribute("data-on","1");st[key]=b.dataset.v;render()}})}
  seg("#sortSeg","sort"); seg("#tierSeg","tier"); seg("#langSeg","lang");
  $("#reset").onclick=function(){st.board="all";st.tier="all";st.lang="all";st.sort="hot";st.q="";qi.value="";clr.style.display="none";[["#sortSeg","hot"],["#tierSeg","all"],["#langSeg","all"]].forEach(function(p){var el=$(p[0]);el.querySelectorAll("button").forEach(function(x){x.setAttribute("data-on",x.dataset.v===p[1]?"1":"")})});buildPills();render()};
  app.querySelectorAll(".langsw button").forEach(function(b){b.onclick=function(){uiLang=b.dataset.lang;renderAll()}});
  renderAll();
})();
</script>
