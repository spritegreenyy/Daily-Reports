"em\">500</b>, <b class=\"em\">12%</b>", "Interactions <b class=\"em\">56</b>+ · from Macroeconomics section"]}], "unique": [["@chamath", "Using the China threat narrative to protect frontier lab business models is a mistake; it only sacrifices everyone's interests to protect the equity of 5,000 investors in OAI and Ant. Let the market compete freely.", "If policy intervention distorts competition, AI sector valuation premiums may face regulatory risk"], ["@LukeGromen", "Ending the dollar's reserve status post-1971 and pricing the dollar fairly against the yuan is mechanically simple but politically difficult; based on US-China nuclear power cost comparison, the dollar needs to depreciate 83-90% against the yuan, benefiting gold.", "If dollar credit restructuring begins, gold and yuan assets will see a long-term revaluation"], ["@JKempEnergy", "US oil rig count averaged 447 in July, the highest in 14 months, up sharply from the February low of 409; drilling activity increased after the Iran war pushed up oil prices, expected to translate into higher production in coming months.", "If production increases materialize, oil upside will be limited, putting more pressure on OPEC+"], ["@chigrl", "A full closure of the Bab el-Mandeb Strait would reduce global oil supply by another 7%, as most Saudi crude exports cannot leave the region; currently, Saudi Arabia is using the Yanbu pipeline via the Red Sea as an alternative route.", "Yanbu pipeline capacity is a key buffer variable in the Bab el-Mandeb closure scenario; if that pipeline is also threatened, oil upside risk will sharply amplify"]], "sections": [["Macroeconomics", [["China / US-China", [["@chamath", "", "Using the China threat narrative to protect frontier lab business models is a mistake; it only sacrifices everyone's interests to protect the equity of <b class=\"em\">5000</b> investors in OAI and Ant. Let the market compete freely. <span style=\"color:#8fa0b3\">Trading implication: If policy intervention distorts competition, AI sector valuation premiums may face regulatory risk</span>"]]], ["Macroeconomics", [["@RaoulGMI", "Global Macro", "AI is humanity's last technological discovery, as all subsequent technological waves will be born from it; whoever owns the frontier model owns the machine that produces everything. <span style=\"color:#8fa0b3\">Trading implication: Long-term holding logic for AI infrastructure strengthens, but beware of valuation bubbles</span>"]]], ["Precious Metals", [["@LukeGromen", "Global Macro", "Ending the dollar's reserve status post-<b class=\"em\">1971</b> and pricing the dollar fairly against the yuan is mechanically simple but politically difficult; based on US-China nuclear power cost comparison, the dollar needs to depreciate <b class=\"em\">83</b><b class=\"em\">-90%</b> against the yuan, benefiting gold. <span style=\"color:#8fa0b3\">Trading implication: If dollar credit restructuring begins, gold and yuan assets will see a long-term revaluation</span>"]]], ["Crude / Distillates", [["@JKempEnergy", "", "US oil rig count averaged <b class=\"em\">447</b> in <b class=\"em\">July</b>, the highest in <b class=\"em\">14</b> months, up sharply from the <b class=\"em\">February</b> low of <b class=\"em\">409</b>; drilling activity increased after the Iran war pushed up oil prices, expected to translate into higher production in coming months. <span style=\"color:#8fa0b3\">Trading implication: If production increases materialize, oil upside will be limited, putting more pressure on OPEC+</span>"]]], ["Fed / Rates", [["@darioperkins", "", "The market is pricing the BoE's response rather than UK fiscal risk; the BoE has publicly offered the government a deal—tighter fiscal policy in exchange for lower rates. <span style=\"color:#8fa0b3\">Trading implication: If UK fiscal tightening materializes, short-end GBP rates will decline, benefiting UK bonds</span>"], ["@DiMartinoBooth", "", "The most likely path for housing affordability: inflation shock first keeps long-end rates and mortgage rates high, even as demand weakens; then, if unemployment rises and consumption deteriorates, rates will fall due to economic pressure. <span style=\"color:#8fa0b3\">Trading implication: For rates trading, first short duration, then switch to long duration after economic data deteriorates</span>"]]], ["US Stocks / Flows", [["@yardeni", "", "DeepSeek panic redux: Moonshot's <b class=\"em\">2.8 trillion</b> parameter Kimi K<b class=\"em\">3</b> model hit the market last Friday, compounded by Korean chip margin pressure; SOXX and S&P <b class=\"em\">500</b> semiconductor index could fall another <b class=\"em\">12%</b> to key technical support. <span style=\"color:#8fa0b3\">Trading implication: Semiconductor sector is oversold short-term, but wait for technical support confirmation before considering a bottom-fish</span>"]]]]], ["Geopolitics", [["Middle East", [["@tparsi", "Iran expert", "Iran is unlikely to accept Qatar's <b class=\"em\">10</b>-day ceasefire proposal, viewing it as a US tactic to calm energy markets; after <b class=\"em\">10</b> days, the US will resume strikes, repeating the cycle in a month. <span style=\"color:#8fa0b3\">Trading implication: Failed ceasefire expectations will support crude oil risk premium, short-term oil prices unlikely to fall</span>"], ["@JavierBlas", "Energy journalist (BBG)", "The US claims the new phase of war will weaken Iran's attack capability in the Strait of Hormuz, but <b class=\"em\">10</b> days have passed, and the IRGC continues to hit tankers; last night another vessel was hit and the crew abandoned ship. <span style=\"color:#8fa0b3\">Trading implication: Hormuz shipping insurance and freight rates will continue to surge, crude supply disruption risk remains unresolved</span>"]]], ["US-China", [["@ryanl_hass", "", "Senator Duckworth's warning reflects growing Washington concern that <b class=\"em\">2028</b> Taiwan risk is higher than <b class=\"em\">2027</b>, and economic blockade risk is higher than full-scale military invasion. <span style=\"color:#8fa0b3\">Trading implication: Taiwan risk time window shifts later, but economic blockade scenario could have a greater impact on semiconductors and shipping</span>"]]], ["Other Geopolitics", [["@ianbremmer", "Geopolitics (Eurasia Group)", "If you truly believe AI will achieve recursive self-improvement in the next few years, then wasting resources now fighting other countries seems untimely. <span style=\"color:#8fa0b3\">Trading implication: Accelerated AI development may change great power competition priorities, weakening geopolitical risk premium in the long run</span>"]]]]], ["Commodities", [["Crude Oil", [["@chigrl", "", "A full closure of the Bab el-Mandeb Strait would reduce global oil supply by another <b class=\"em\">7%</b>, as most Saudi crude exports cannot leave the region; currently, Saudi Arabia is using the Yanbu pipeline via the Red Sea as an alternative route. <span style=\"color:#8fa0b3\">Trading implication: Yanbu pipeline capacity is a key buffer variable in the Bab el-Mandeb closure scenario; if that pipeline is also threatened, oil upside risk will sharply amplify</span>"], ["@JavierBlas", "Energy journalist (BBG)", "The US claims it will weaken Iran's attack capability in the Strait of Hormuz, but ten days into the new phase, the IRGC continues to hit tankers; last night another ship was hit, and the crew had to jump into lifeboats. <span style=\"color:#8fa0b3\">Trading implication: Actual transit risk in the Strait of Hormuz has not decreased due to US statements; tanker war risk premiums and diversion costs will continue to rise</span>"], ["@AndreasSteno", "", "If the situation in the Bab el-Mandeb Strait worsens further, it could severely disrupt some Saudi pipeline oil flows. <span style=\"color:#8fa0b3\">Trading implication: If Saudi pipeline infrastructure is damaged, it would simultaneously impact both Red Sea and Persian Gulf export routes, creating a dual supply shock</span>"], ["@JKempEnergy", "", "US oil rig count averaged <b class=\"em\">447</b> in <b class=\"em\">July</b>, the highest in <b class=\"em\">14</b> months, up sharply from the <b class=\"em\">February</b> low of <b class=\"em\">409</b>; the increase will gradually feed into second-half production. <span style=\"color:#8fa0b3\">Trading implication: US production growth is a key contrarian variable to current oil upside; if production growth exceeds expectations, it will partially offset geopolitical premium</span>"]]], ["Metals", [["@LukeGromen", "Global Macro", "Ending the dollar's reserve status post-<b class=\"em\">1971</b> and pricing the dollar fairly against the yuan is mechanically simple but politically difficult; the US-China <b class=\"em\">1</b>GW nuclear power cost difference suggests the dollar needs to depreciate <b class=\"em\">83</b><b class=\"em\">-90%</b>, benefiting gold. <span style=\"color:#8fa0b3\">Trading implication: If the dollar reset narrative is priced by the market, gold will become a core cross-asset hedge, not just a simple inflation hedge</span>"]]]]], ["Weather / Climate", [["El Niño Status", [["@darioperkins", "", "El Niño Costero off Peru is rapidly strengthening, with sea surface temperature anomalies in the Niño <b class=\"em\">1</b><b class=\"em\">+2</b> region approaching <b class=\"em\">+3°C</b>, similar to the same period in <b class=\"em\">1997</b>; expected to expand to Ecuador within two weeks. <span style=\"color:#8fa0b3\">Trading implication: If El Niño continues to strengthen, it will exacerbate global agricultural supply tightness, pushing up futures prices for soybeans, corn, etc.</span>"]]], ["Weather / Climate", [["@darioperkins", "", "El Niño Costero off Peru is rapidly strengthening, with sea surface temperature anomalies in the Niño <b class=\"em\">1</b><b class=\"em\">+2</b> region approaching <b class=\"em\">+3°C</b>, similar to the same period in <b class=\"em\">1997</b>; expected to expand to Ecuador within two weeks, potentially triggering South American agricultural production risks. <span style=\"color:#8fa0b3\">Trading implication: If El Niño continues to strengthen, it will exacerbate global agricultural supply tightness, pushing up futures prices for soybeans, corn, etc.</span>"]]]]], ["AI / Semiconductors", [["NVIDIA", [["@ARKInvest", "", "Users' pursuit of AI model intelligence far exceeds cost considerations; frontier labs continue to pay high premiums, and NVIDIA's pricing power as the core computing supplier remains solid. <span style=\"color:#8fa0b3\">Trading implication: If open-source model performance approaches, NVIDIA's premium logic will be challenged</span>"]]], ["Other AI / Semiconductors", [["@bgurley", "", "If government protection maintains AI pricing power for a few companies, all US companies will be forced to pay AI costs far above market levels, harming the competitiveness of the entire industry and distorting natural pricing in the semiconductor market. <span style=\"color:#8fa0b3\">Trading implication: Policy intervention is the biggest uncertainty variable for current AI semiconductor valuations</span>"]]]]]]}, "tweets": [{"h": "chamath", "tier": 1, "b": "macro", "t": "2026-07-21 06:43", "x_zh": "利用中国威胁论欺骗美国政府以保护前沿实验室的商业模式是一个错误。这是在牺牲其他人的利益，保护OAI和Ant的5000名投资者的股权。这将是一个非常愚蠢的决定。让市场来决定。", "x_en": "Tricking the US Government to protect frontier labs’ business model by using a China boogeyman is a mistake. \n\nIt is protecting the equity of 5,000 people who are investors in OAI and Ant at the sale of everyone else. This would be a terribly stupid decision. \n\nLet the market", "u": "https://x.com/chamath/status/2079457219892871458", "lk": 806, "rt": 120, "rp": 83, "eng": 1009, "lang": "en", "tags": ["macro", "equities", "technology"]}, {"h": "RaoulGMI", "tier": 1, "b": "macro", "t": "2026-07-20 20:50", "x_zh": "这是我们玩过的最大的游戏。人工智能是我们将发现的最后一项技术，因为后续的每一波浪潮都将源于它。谁拥有前沿技术，谁就不仅拥有一个行业……谁就拥有生产其他一切事物的机器。这就是为什么没有", "x_en": "It’s the biggest game we’ve ever played.\n\nAI is the last technology we'll ever discover, because every wave that follows will come out of it. And whoever owns the frontier doesn't just own an industry… they own the machinery that produces everything else.\n\nThat's why no", "u": "https://x.com/RaoulGMI/status/2079308028659294509", "lk": 678, "rt": 66, "rp": 65, "eng": 809, "lang": "en", "tags": ["macro", "crypto", "long_cycle"]}, {"h": "LukeGromen", "tier": 1, "b": "macro", "t": "2026-07-20 17:41", "x_zh": "这在机制上简单，但在政治上困难：只需结束1971年后建立的美元储备地位，并让美元相对于人民币合理估值。中国与美国生产1吉瓦核电的成本对比表明，在这种情况下，美元兑人民币需贬值83-90%。黄金=", "x_en": "It's mechanically simple but politically difficult:\n\nSimply end USD reserve status as structured post-1971 and value the USD appropriately v. CNY.\n\nThe cost to produce 1 GW of nuclear power in China v. in US suggests USD would have to fall 83-90% v. CNY in that case.\n\nGold =", "u": "https://x.com/LukeGromen/status/2079260339279970432", "lk": 503, "rt": 65, "rp": 43, "eng": 611, "lang": "en", "tags": ["macro", "sovereign_debt", "commodities"]}, {"h": "PeterLBrandt", "tier": 1, "b": "macro", "t": "2026-07-21 02:52", "x_zh": "经过50年的交易，我对单笔交易的看法完全改变了。与其担心交易能否赚钱，我更关心的是遵守我的规则。以下只是其中一些规则。我只需要找到正确的X/Y交叉点。", "x_en": "After 50 years of trading my perspective of an individual trade has completely changed\n\nRather than concern about whether a trade will make money or not,\n\nMy concern is with following my rules\n\nHere are just some of them\n\nI just need to ID the right X/Y intersect", "u": "https://x.com/PeterLBrandt/status/2079399049388798160", "lk": 362, "rt": 28, "rp": 10, "eng": 400, "lang": "en", "tags": ["commodities", "technical", "trader"]}, {"h": "M_McDonough", "tier": 2, "b": "macro", "t": "2026-07-20 17:42", "x_zh": "随着中东局势升级推动对咽喉要道船舶通行数据的需求，ECAN在@TheTerminal上新增了苏伊士运河和巴拿马运河的实时追踪器——加入霍尔木兹海峡和曼德海峡——按方向和船舶类型细分，包括船舶数量和", "x_en": "With escalation in the Middle East driving demand for chokepoint vessel-crossing data, ECAN on \n@TheTerminal\n now adds real-time trackers for the Suez and Panama Canals — joining Hormuz and Bab el-Mandeb — each broken out by direction and vessel type, in both vessel counts and", "u": "https://x.com/M_McDonough/status/2079260675386257747", "lk": 84, "rt": 23, "rp": 5, "eng": 112, "lang": "en", "tags": ["macro", "economics", "data"]}, {"h": "AndreasSteno", "tier": 1, "b": "macro", "t": "2026-07-20 16:16", "x_zh": "这将是糟糕的，因为它可能对来自沙特的部分管道石油流动造成严重破坏。", "x_en": "This would be bad, as it could potentially wreak havoc on some of the piped Oil flows from Saudi as well", "u": "https://x.com/AndreasSteno/status/2079239040512008572", "lk": 75, "rt": 7, "rp": 22, "eng": 104, "lang": "en", "tags": ["macro", "rates_fx", "cross_asset"]}, {"h": "chigrl", "tier": 1, "b": "macro", "t": "2026-07-20 17:17", "x_zh": "随着对美联储政策路径和利率短期前景的不确定性增加，货币市场基金正转向超短期持有，远离哪怕只有温和利率风险的资产。基金经理正试图避免重演2022年初的情况，当时", "x_en": "Money‑market funds are shifting toward ultra short-term holdings and away from assets with even modest interest-rate risk as uncertainty grows over the Federal Reserve’s policy path and the near-term outlook for rates.\n\nManagers are trying to avoid a repeat of early 2022, when", "u": "https://x.com/chigrl/status/2079254457079021765", "lk": 87, "rt": 10, "rp": 1, "eng": 98, "lang": "en", "tags": ["commodities", "oil_energy", "metals"]}, {"h": "DiMartinoBooth", "tier": 2, "b": "macro", "t": "2026-07-20 23:14", "x_zh": "实现可负担性的最可能路径：“起初，通胀冲击可能使长期收益率和抵押贷款利率保持高位，即使需求减弱。之后，如果失业率继续上升且消费恶化，利率将下降，因为经济正在表面之下崩溃。”", "x_en": "The likeliest path to affordability: “At first, inflation shock could keep long term yields & mortgage rates elevated even as demand weakens. Later, if unemployment continues to rise & consumption deteriorates, rates would fall because the economy is breaking beneath the surface”", "u": "https://x.com/DiMartinoBooth/status/2079344250114707767", "lk": 66, "rt": 5, "rp": 5, "eng": 76, "lang": "en", "tags": ["macro", "central_banks", "economics"]}, {"h": "darioperkins", "tier": 2, "b": "macro", "t": "2026-07-20 18:02", "x_zh": "说实话，财政规则我不感兴趣。市场在试图预测英国央行的反应，而不是英国的‘财政风险’。而英国央行一直公开向英国政府提供一项交易——更紧缩的财政政策换取更低的利率……", "x_en": "Tbh the fiscal rules dont interest me. The market is trying to forecast the BoE response, not UK \"fiscal risk\". And the BoE has been openly offering the UK govt a deal - tighter fiscal policy for lower interest rates...", "u": "https://x.com/darioperkins/status/2079265780818907354", "lk": 54, "rt": 10, "rp": 12, "eng": 76, "lang": "en", "tags": ["macro", "central_banks", "economics"]}, {"h": "yardeni", "tier": 2, "b": "macro", "t": "2026-07-20 20:04", "x_zh": "Yardeni Research 每日图表（2026年7月20日）\n\nDeepSeek 担忧卷土重来。Moonshot 的 2.8万亿参数 Kimi K3 模型周五吓坏市场，加剧了韩国芯片保证金追缴压力。SOXX 和标普500半导体指数可能再跌12%至关键技术支撑位。", "x_en": "Yardeni Research Chart of the Day (July 20, 2026)\n\nDeepSeek fears are back. Moonshot's 2.8T-parameter Kimi K3 model spooked markets Friday, compounding Korea margin-call pressure on chips. The SOXX and S&P 500 Semis index could slide 12% more to key technical support.", "u": "https://x.com/yardeni/status/2079296529748185188", "lk": 48, "rt": 6, "rp": 2, "eng": 56, "lang": "en", "tags": ["macro", "equities", "sellside"]}, {"h": "JKempEnergy", "tier": 1, "b": "macro", "t": "2026-07-20 09:57", "x_zh": "美国石油钻井平台数量在7月迄今平均升至447座，为14个月来最高，高于2月近期低点409座（当时与伊朗的战争推高了油价）。额外的钻井活动可能会在后续转化为更高的产量。", "x_en": "U.S. RIGS drilling for oil have climbed to an average of 447 so far in July, the highest for fourteen months, and up from a recent low of just 409 in February, before the war with Iran lifted oil prices. The extra drilling is likely to filter through into higher output during the", "u": "https://x.com/JKempEnergy/status/2079143544036491603", "lk": 31, "rt": 13, "rp": 1, "eng": 45, "lang": "en", "tags": ["commodities", "oil_energy", "data"]}, {"h": "ARKInvest", "tier": 1, "b": "macro", "t": "2026-07-20 22:15", "x_zh": "你会为了稍微降低智能而切换到更便宜的AI模型吗？@downingARK 在《头脑风暴》中指出，几乎没人这么做，这正是前沿实验室能持续获得高溢价收入的原因。", "x_en": "Would you switch to a cheaper AI model if it meant slightly less intelligence? \n@downingARK\n joins \"The Brainstorm\" and points out that almost nobody does, and that is exactly why frontier labs keep commanding premium revenue.", "u": "https://x.com/ARKInvest/status/2079329251044852107", "lk": 19, "rt": 2, "rp": 0, "eng": 21, "lang": "en", "tags": ["macro", "equities", "innovation"]}, {"h": "tparsi", "tier": 2, "b": "geopolitics", "t": "2026-07-21 01:23", "x_zh": "告诉 @AJEnglish，伊朗不太可能接受卡塔尔的10天停火提议。德黑兰可能将其视为安抚能源市场的努力，而美国会在10天后重启攻击。然后大约一个月后重复这一循环。", "x_en": "Told \n@AJEnglish\n that Iran is unlikely to accept Qatar's 10-day ceasefire proposal. Tehran will likely see it as an effort to calm energy markets, only for the US to restart attacks in 10 days. And then repeat this cycle in another month or so.", "u": "https://x.com/tparsi/status/2079376798333222939", "lk": 1200, "rt": 235, "rp": 36, "eng": 1471, "lang": "en", "tags": ["geopolitics", "middle_east", "diplomacy"]}, {"h": "bgurley", "tier": 2, "b": "geopolitics", "t": "2026-07-20 13:50", "x_zh": "思考软件‘开放’的方式是成为低成本生产商（而非高利润生产商）。当一家（或两家）公司在创纪录时间内达到创纪录估值时，这自然会吸引竞争（理应如此）。我们需要让自由市场发挥作用。", "x_en": "The way to think about “open” in software is being a low-cost producer (vs a high margin one). When a company (or 2) achieves record valuations in record time, that rightfully attracts competition (as it should). We need to let the free market work.", "u": "https://x.com/bgurley/status/2079202357049790551", "lk": 932, "rt": 194, "rp": 74, "eng": 1200, "lang": "en", "tags": ["ai_semis", "venture", "technology"]}, {"h": "KofmanMichael", "tier": 1, "b": "geopolitics", "t": "2026-07-20 14:13", "x_zh": "很明显，按照目前的发展趋势，很快就会有公告发布。", "x_en": "It’s pretty clear the way things are going there will be announcements soon.", "u": "https://x.com/KofmanMichael/status/2079208055275651424", "lk": 845, "rt": 56, "rp": 11, "eng": 912, "lang": "en", "tags": ["geopolitics", "russia", "military"]}, {"h": "ianbremmer", "tier": 1, "b": "geopolitics", "t": "2026-07-20 19:02", "x_zh": "如果你真的相信未来几年人工智能会实现递归自我改进，那么认为我们应该浪费资源与其他国家争斗的想法就变得过时了。", "x_en": "if you truly believe in recursive self improvement of artificial intelligence in the next few years, the idea that we should be wasting resources fighting other countries becomes quaint.", "u": "https://x.com/ianbremmer/status/2079280777909379528", "lk": 330, "rt": 23, "rp": 36, "eng": 389, "lang": "en", "tags": ["geopolitics", "political_risk", "global_macro"]}, {"h": "tparsi", "tier": 2, "b": "geopolitics", "t": "2026-07-21 01:39", "x_zh": "在@AJEnglish上解释过，只要各方一边谈判一边通过军事手段塑造外交格局，和谈就不会成功。伊朗很可能会试图让美国付出高昂代价，以至于特朗普不会受到诱惑去……", "x_en": "Explained on \n@AJEnglish\n that as long as the parties seek to negotiate while simultaneously shaping the diplomatic landscape through military means, then talks will not succeed.\n\nThe Iranians will likely seek to impose such a high cost on the US that Trump won't be tempted to", "u": "https://x.com/tparsi/status/2079380617645392287", "lk": 179, "rt": 32, "rp": 10, "eng": 221, "lang": "en", "tags": ["geopolitics", "middle_east", "diplomacy"]}, {"h": "JavierBlas", "tier": 1, "b": "geopolitics", "t": "2026-07-21 06:40", "x_zh": "战争新阶段（美国称将削弱伊朗在霍尔木兹海峡的攻击能力）进入第十天，伊斯兰革命卫队仍在袭击油轮。昨夜又有一艘船只被击中，船员被迫跳上救生艇。", "x_en": "Ten days into the new phase of the war (which the US said would degrade Iranian attack capabilities in the Strait of Hormuz), the IRGC keeps hitting oil tankers. Overnight, another vessel was hit and the crew had to jump into the lifeboats.", "u": "https://x.com/JavierBlas/status/2079456429677691040", "lk": 154, "rt": 41, "rp": 10, "eng": 205, "lang": "en", "tags": ["commodities", "oil_energy", "supply_demand"]}, {"h": "Charles_Lister", "tier": 2, "b": "geopolitics", "t": "2026-07-20 23:42", "x_zh": "明天叙利亚经济复苏与国际重返社会将迎来重要进展，央行行长@SafwatRaslan将公布打击洗钱与恐怖融资国家战略。这是数月工作与磋商的成果。", "x_en": "Important development coming tomorrow in #Syria's economic recovery & international reintegration, as Central Bank Governor \n@SafwatRaslan\n will reveal the National Strategy to Combat Money Laundering & Terrorist Fina   function renderIndices(){var c=cur(),wrap=$("#indices"),keys=['energy','metals','grains','softs'];wrap.innerHTML='';keys.forEach(function(key){var x=(c.indices||{})[key]||{},score=x.score,col=x.color||'#8fa0b3',has=score!==null&&score!==undefined,state=!has?tx('noSignal'):(score>10?tx('bull'):(score<-10?tx('bear'):tx('balanced'))),left=has&&score<0?50-Math.abs(score)/2:50,width=has?Math.abs(score)/2:0,label=uiLang==='en'?(x.label_en||key):(x.label_zh||key),card=document.createElement('div');card.className='idxcard';card.innerHTML='<div class="idxhead"><b>'+esc(label)+'</b><span class="idxscore '+(!has?'none':score>=0?'pos':'neg')+'">'+(has?(score>0?'+':'')+score.toFixed(1):'—')+'</span></div><div class="idxstate">'+state+'</div><div class="idxunder">'+IDXUNDER[uiLang][key]+'</div><div class="idxaxis"><i class="idxfill" style="left:'+left+'%;width:'+width+'%;background:'+col+'"></i></div><div class="idxmeta"><span>'+tx('mentions')+' '+(x.mentions||0)+' · '+tx('signals')+' '+(x.signal_tweets||0)+'</span><span>↑'+(x.bullish||0)+' / ↓'+(x.bearish||0)+' · KOL '+(x.kols||0)+'</span></div><div class="idxspark">'+idxSpark((c.index_history||{})[key],col)+'</div>';wrap.appendChild(card)});$("#idxnote").textContent=tx('indexNote')}

  function renderReport(){
    var r=report(),m=cur().meta;
    $("#win").textContent=uiLang==="en"?m.window_en:m.window_zh; $("#sub").textContent=uiLang==="en"?m.subtitle_en:m.subtitle_zh;

      var name=pair[0],subs=pair[1],col=REPC[name]||"#5b8def",nvp=subs.reduce(function(a,s){return a+s[1].length},0);
      var inner=subs.map(function(sd){return '<div class="subg"><div class="subh" style="--sc:'+col+';color:'+col+'">'+sd[0]+'</div>'+sd[1].map(function(row){return '<div class="vp"><span class="vh" data-h="'+esc(row[0].replace("@",""))+'">'+row[0]+'</span>'+(row[1]?'<span class="vr">'+row[1]+'</span>':'')+row[2]+'</div>'}).join("")+'</div>'}).join("");
      var box=document.createElement("div");box.className="bsec";box.innerHTML='<div class="bhead" style="background:'+col+'">'+name+' <span style="font-weight:500;opacity:.75;font-size:12px">'+subs.length+' '+tx("domains")+' · '+nvp+' '+tx("items")+'</span><span class="arrow">▾</span></div><div class="bbody">'+inner+'</div>';
      var bd=box.querySelector(".bbody"),hd=box.querySelector(".bhead"); hd.onclick=function(){bd.style.display=bd.style.display==="none"?"":"none";box.querySelector(".arrow").textContent=bd.style.display==="none"?"▸":"▾"}; sh.appendChild(box);
    });

    var uh=$("#unique");uh.innerHTML=""; r.unique.forEach(function(u){var c=document.createElement("div");c.className="ucard";c.innerHTML='<div class="uh" data-h="'+esc(u[0].replace("@",""))+'">'+u[0]+'</div><div class="uv">'+u[1]+'</div><div class="ui">'+tx("meaning")+u[2]+'</div>';c.querySelector(".uh").onclick=function(){jumpHandle(u[0].replace("@",""))};uh.appendChild(c)});
  }
  function buildPills(){
    var tw=cur().tweets,wrap=$("#boardPills");wrap.innerHTML=""; var counts={all:tw.length};Object.keys(BOARDS).forEach(function(k){counts[k]=0}); tw.forEach(function(t){counts[t.b]=(counts[t.b]||0)+1});

    })
  }
