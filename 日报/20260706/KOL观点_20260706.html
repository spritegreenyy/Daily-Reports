"rp": 2, "eng": 5, "lang": "en", "tags": ["macro", "sovereign_debt", "commodities"]}, {"h": "darrencao2024", "tier": 1, "b": "macro", "t": "2026-07-05 23:42", "x": "市场喜欢好消息，能容忍坏消息，但最讨厌不确定性。\n由于中期选举的原因，我认为美股下半年几乎必然继续大幅波动，如何应对这样的波动行情？跟大家分享我对下半年投资美股的看法：\n\nhttps://\nyoutube.com/watch?v=5nPmt_\n-FDs4&t=14s\n…", "u": "https://x.com/darrencao2024/status/2073915551752032391", "lk": 2, "rt": 0, "rp": 2, "eng": 4, "lang": "zh", "tags": ["macro", "equities", "credit"]}, {"h": "BobEUnlimited", "tier": 1, "b": "macro", "t": "2026-07-05 10:35", "x": "首笔投资的回报率可以是20%,但不代表未来5年投下的1万亿至5万亿美元都能匹配这个回报。要维持不错的回报,要么需要极其可观的总营收增长,要么资本开支得大幅减少。", "u": "https://x.com/BobEUnlimited/status/2073717495819579738", "lk": 1, "rt": 0, "rp": 0, "eng": 1, "lang": "en", "tags": ["macro", "rates_fx", "cycle"]}, {"h": "globalmacro", "tier": 1, "b": "macro", "t": "2026-07-05 23:55", "x": "与2000年类似:科技崩盘时,市场的「汽车股」部分曾反弹,随后两年一起下跌。我盯的信号是 QQQ 被猛烈抛售、而道指创新高。看起来正在发生。可能只是噪音或过早,但那是关键信号。", "u": "https://x.com/globalmacro/status/2073918632766099752", "lk": 0, "rt": 0, "rp": 0, "eng": 0, "lang": "en", "tags": ["macro", "framing"]}, {"h": "globalmacro", "tier": 1, "b": "macro", "t": "2026-07-05 22:44", "x": "当美联储把利率固定在目标区间时,它就必然要印钱或销钱来维持利率——无论买卖10年期国债、抵押债还是短债。对货币供给的影响相同,QT与QE的差别只是质与久期。", "u": "https://x.com/globalmacro/status/2073900814964253027", "lk": 0, "rt": 0, "rp": 0, "eng": 0, "lang": "en", "tags": ["macro", "framing"]}, {"h": "anasalhajji", "tier": 1, "b": "geopolitics", "t": "2026-07-05 10:13", "x": "石油市场谈的是同一时点的供给对需求,而不是两个不同时点的供给对供给。", "u": "https://x.com/anasalhajji/status/2073711836734661033", "lk": 42, "rt": 5, "rp": 1, "eng": 48, "lang": "en", "tags": ["commodities", "oil_energy", "middle_east"]}, {"h": "JavierBlas", "tier": 1, "b": "geopolitics", "t": "2026-07-05 12:35", "x": "OPEC+核心国已同意8月再增产18.8万桶/日。过去一段时间这些月度增产是「虚」的——战争使多数国家无法开采;但随着霍尔木兹重新开放,它们将越来越实质地影响市场。", "u": "https://x.com/JavierBlas/status/2073747593146822699", "lk": 23, "rt": 3, "rp": 8, "eng": 34, "lang": "en", "tags": ["commodities", "oil_energy", "supply_demand"]}, {"h": "Charles_Lister", "tier": 2, "b": "geopolitics", "t": "2026-07-06 00:22", "x": "这幅图景不准确。土耳其有其角色(叙利亚北部互联互通),但把叙利亚打造为「该地区走廊」的大玩家是沙特、以及近来低调发力的阿联酋;且驱动力并非敌视以色列,而是支持叙利亚复苏。", "u": "https://x.com/Charles_Lister/status/2073925616664023390", "lk": 17, "rt": 2, "rp": 1, "eng": 20, "lang": "en", "tags": ["geopolitics", "middle_east", "syria"]}, {"h": "anasalhajji", "tier": 1, "b": "geopolitics", "t": "2026-07-05 10:22", "x": "霍尔木兹目前正在限制 OPEC+ 七国这些决定的冲击,但其全面效应要到明年才会显现。眼下我们在等沙特阿美的官方售价(OSP)。", "u": "https://x.com/anasalhajji/status/2073714052350513508", "lk": 12, "rt": 2, "rp": 1, "eng": 15, "lang": "en", "tags": ["commodities", "oil_energy", "middle_east"]}, {"h": "Charles_Lister", "tier": 2, "b": "geopolitics", "t": "2026-07-06 00:31", "x": "谈土耳其角色时,同样该关注欧洲。叙利亚财长受邀出席巴黎G7峰会,是为沙拉总统在塞浦路斯欧盟峰会演讲预热——他在那里揭示了整套政策愿景。", "u": "https://x.com/Charles_Lister/status/2073927862088827152", "lk": 8, "rt": 0, "rp": 0, "eng": 8, "lang": "en", "tags": ["geopolitics", "middle_east", "syria"]}, {"h": "anasalhajji", "tier": 1, "b": "geopolitics", "t": "2026-07-05 09:38", "x": "震撼一幕:俄罗斯乌拉尔原油正驶向亚洲(绿点满载、红点空载)。印度6月进口俄油创历史新高——7月会不会再创纪录?", "u": "https://x.com/anasalhajji/status/2073702991245287447", "lk": 0, "rt": 0, "rp": 0, "eng": 0, "lang": "en", "tags": ["commodities", "oil_energy", "middle_east"]}, {"h": "HFI_Research", "tier": 1, "b": "commodities", "t": "2026-07-06 00:43", "x": "过去24小时的霍尔木兹：美军护航油轮编队回归，大批油轮进出。我们追踪到3艘以「prosperity」结尾的VLCC入境；看富查伊拉待命的VLCC，还会有3–4艘「Prosperity」级VLCC进去。", "u": "https://x.com/HFI_Research/status/2073930809875259639", "lk": 98, "rt": 17, "rp": 4, "eng": 119, "lang": "en", "tags": ["commodities", "oil_energy", "nat_gas_lng"]}, {"h": "Beth_Kindig", "tier": 1, "b": "commodities", "t": "2026-07-05 19:03", "x": "康宁：「多数机构预测，每年新增上线的AI电力将从'25到2028年翻倍；同期GPU部署速率大致沿同一轨迹。」($GLW $MSFT $META $AMZN $GOOG $NVDA)", "u": "https://x.com/Beth_Kindig/status/2073845167929368785", "lk": 36, "rt": 5, "rp": 12, "eng": 53, "lang": "en", "tags": ["ai_semis", "tech_equities", "ai_infra"]}, {"h": "aeberman12", "tier": 1, "b": "commodities", "t": "2026-07-06 01:59", "x": "Pouyanné 所谓「绝望的卖家」是身为大型贸易机构在替自己的头寸讲故事。「绝望抛售」是好标题，但近期油价下跌更像是霍尔木兹风险溢价的消失，而非海湾产油国的甩卖。", "u": "https://x.com/aeberman12/status/2073949860986785818", "lk": 1, "rt": 0, "rp": 1, "eng": 2, "lang": "en", "tags": ["commodities", "oil_energy", "geology"]}, {"h": "Weather_West", "tier": 1, "b": "weather", "t": "2026-07-05 20:53", "x": "越来越多迹象显示,7月中旬前落基山与中部平原之间某处可能形成大范围、强烈、甚至破纪录的中层高压(「热穹顶」),或给美国大片地区带来广泛而严重的热浪。", "u": "https://x.com/Weather_West/status/2073872842702062060", "lk": 96, "rt": 31, "rp": 4, "eng": 131, "lang": "en", "tags": ["weather_climate", "climate_risk", "us_west"]}, {"h": "BenNollWeather", "tier": 1, "b": "weather", "t": "2026-07-05 14:50", "x": "太平洋正在「发烧」:一场规模超过美国本土八倍的海洋热浪正在铺开,今年可能对全球天气事件产生深远的连锁影响。", "u": "https://x.com/BenNollWeather/status/2073781588975079896", "lk": 30, "rt": 9, "rp": 1, "eng": 40, "lang": "en", "tags": ["weather_climate", "enso", "global_weather"]}, {"h": "burgwx", "tier": 1, "b": "weather", "t": "2026-07-06 01:48", "x": "纽约东南部与康涅狄格存在灾害叠加的真实风险——昨日遭强风暴袭击的部分地区,今晚至周二局地降雨或超4–8英寸,可能拖长当地恢复时间。", "u": "https://x.com/burgwx/status/2073947187499745631", "lk": 22, "rt": 3, "rp": 3, "eng": 28, "lang": "en", "tags": ["weather_climate", "models", "tropics"]}, {"h": "webberweather", "tier": 1, "b": "weather", "t": "2026-07-06 00:10", "x": "台风Bavi正经历眼墙置换周期(ERC),雷达上出现次级风速极大值;其内核掠过罗塔岛可能加速了ERC发展。内外眼墙比约3,是ERC的典型特征。", "u": "https://x.com/webberweather/status/2073922425272889609", "lk": 27, "rt": 1, "rp": 0, "eng": 28, "lang": "en", "tags": ["weather_climate", "enso", "tropics"]}, {"h": "jukan05", "tier": 1, "b": "ai_semis", "t": "2026-07-05 22:04", "x": "1) 利好NPO供应链;2) 英伟达 Rubin Ultra 规格下调,标志其性能护城河正被侵蚀;3) 利空CPO供应链;4) 大赢家:AMD与TPU生态?", "u": "https://x.com/jukan05/status/2073890864628421111", "lk": 92, "rt": 7, "rp": 14, "eng": 113, "lang": "en", "tags": ["ai_semis", "memory_hbm", "supply_chain"]}, {"h": "BenBajarin", "tier": 1, "b": "ai_semis", "t": "2026-07-05 19:58", "x": "我还没见过哪个看空AI的人,是真正研究了AI在前20%早期采用型企业内部如何被实际应用、其价值如何在全组织规模化并可量化、尤其在关键任务职能上的高价值。", "u": "https://x.com/BenBajarin/status/2073859027461947851", "lk": 34, "rt": 2, "rp": 10, "eng": 46, "lang": "en", "tags": ["ai_semis", "consumer_tech", "semiconductors"]}, {"h": "SemiAnalysis_", "tier": 1, "b": "ai_semis", "t": "2026-07-05 21:00", "x": "英伟达将大量增售 Oberon Rubin 机架及 Oberon Rubin「Ultra」机架来弥补这一缺口。我们在核心研究与AI加速器报告中讨论了这些大规模延期与取消对存储、PCB与ODM供应链的影响。", "u": "https://x.com/SemiAnalysis_/status/2073874679266218087", "lk": 32, "rt": 0, "rp": 3, "eng": 35, "lang": "en", "tags": ["ai_semis", "semiconductors", "ai_infra"]}, {"h": "SemiAnalysis_", "tier": 1, "b": "ai_semis", "t": "2026-07-05 21:00", "x": "Kyber NVL144 机架架构因PCB中板可制造性仍具挑战,已推迟至2028年;通过CPO将8个Oberon机架经NVSwitch互联的 NVL576,也很可能延期或限于小批量。", "u": "https://x.com/SemiAnalysis_/status/2073874673096384932", "lk": 32, "rt": 0, "rp": 3, "eng": 35, "lang": "en", "tags": ["ai_semis", "semiconductors", "ai_infra"]}, {"h": "SemiAnalysis_", "tier": 1, "b": "ai_semis", "t": "2026-07-05 21:00", "x": "同时传出四计算die版 Rubin Ultra 已被取消,只剩较小的双计算die版本,其真实性能大致只有四die版的一半。", "u": "https://x.com/SemiAnalysis_/status/2073874677684957196", "lk": 25, "rt": 0, "rp": 1, "eng": 26, "lang": "en", "tags": ["ai_semis", "semiconductors", "ai_infra"]}, {"h": "BenBajarin", "tier": 1, "b": "ai_semis", "t": "2026-07-05 16:34", "x": "被严重低估的一点:企业将为网络安全向前沿实验室付出巨资——他们能拿到公众没有的模型、支付溢价、需要新等级的算力,这将成为一种战略依赖。经过更多研究,我对此的信念更强了。", "u": "https://x.com/BenBajarin/status/2073807620599857462", "lk": 5, "rt": 1, "rp": 3, "eng": 9, "lang": "en", "tags": ["ai_semis", "consumer_tech", "semiconductors"]}, {"h": "danielnewmanUV", "tier": 2, "b": "ai_semis", "t": "2026-07-05 16:46", "x": "感觉 $IREN 董事会当初做那份薪酬方案时,是知道些什么的。", "u": "https://x.com/danielnewmanUV/status/2073810806207041980", "lk": 5, "rt": 0, "rp": 1, "eng": 6, "lang": "en", "tags": ["ai_semis", "enterprise_tech", "semiconductors"]}, {"h": "PatrickMoorhead", "tier": 1, "b": "ai_semis", "t": "2026-07-05 21:54", "x": "《科技一周前瞻》(7/6):华盛顿花了两周决定你能用哪些AI模型;据报自愿发布标准本周或落地,此前OpenAI应华盛顿要求扣下了最新模型。美国还解除了……", "u": "https://x.com/PatrickMoorhead/status/2073888296313204974", "lk": 3, "rt": 0, "rp": 1, "eng": 4, "lang": "en", "tags": ["ai_semis", "semiconductors", "enterprise_tech"]}, {"h": "BenBajarin", "tier": 1, "b": "ai_semis", "t": "2026-07-06 00:55", "x": "要看关键任务应用——AI在那里对业务价值高得多:网络安全、机密计算、金融/工程/编码等。关键任务分层次,价值链也各不相同,所以简单说「多产出」并不成立。", "u": "https://x.com/BenBajarin/status/2073933831422476338", "lk": 1, "rt": 0, "rp": 1, "eng": 2, "lang": "en", "tags": ["ai_semis", "consumer_tech", "semiconductors"]}, {"h": "BenBajarin", "tier": 1, "b": "ai_semis", "t": "2026-07-05 22:07", "x": "关于泡沫空头，一个更有意思的点是：他们显然不了解历史上泡沫破裂之后发生了什么。纸上谈兵的泡沫空头该研究一下「繁荣—崩溃—再建设」周期。无论是不是泡沫，这一轮的规模都很大。", "u": "https://x.com/BenBajarin/status/2073891501059580353", "lk": 1, "rt": 0, "rp": 1, "eng": 2, "lang": "en", "tags": ["ai_semis", "consumer_tech", "semiconductors"]}]}}, "boards": {"macro": {"label": "宏观经济", "color": "#5b8def", "short": "宏观"}, "geopolitics": {"label": "地缘政治", "color": "#ec6f57", "short": "地缘"}, "commodities": {"label": "大宗商品", "color": "#e0952f", "short": "大宗"}, "weather": {"label": "天气气候", "color": "#33bfad", "short": "天气"}, "ai_semis": {"label": "AI半导体", "color": "#b18ef0", "short": "AI"}}, "repColors": {"宏观经济": "#5b8def", "地缘政治": "#ec6f57", "大宗商品": "#e0952f", "股票": "#3fb36a", "AI半导体": "#b18ef0", "天气气候": "#33bfad"}, "dates": ["2026-07-06"]}</script>
<script>
(function(){
  var app=document.getElementById("kolapp");
  var P=JSON.parse(document.getElementById("payload").textContent);
  var DATA=P.data,BOARDS=P.boards,REPC=P.repColors,DATES=P.dates;
  var st={date:DATES[0],board:"all",tier:"all",lang:"all",sort:"hot",q:""};
  var $=function(s){return app.querySelector(s)};
  function esc(s){return (s||"").replace(/[&<>]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;"}[c]})}
  function hl(s,q){s=esc(s);if(!q)return s;try{var re=new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");return s.replace(re,"<mark>$1</mark>")}catch(e){return s}}
  function fmt(n){return n>=1000?(n/1000).toFixed(n>=10000?0:1)+"k":""+n}
  function cur(){return DATA[st.date]}
  function jumpHandle(h){$("#q").value="@"+h;st.q="@"+h;$("#clr").style.display="block";st.board="all";buildPills();render();
    $("#stream").scrollIntoView({behavior:"smooth",block:"start"})}

  var dsel=$("#dateSel");
  DATES.forEach(function(d){var o=document.createElement("option");o.value=d;o.textContent=d;dsel.appendChild(o)});
  dsel.value=st.date;
  dsel.onchange=function(){st.date=dsel.value;st.board="all";renderAll()};

  function renderReport(){
    var r=cur().report,m=cur().meta;
    $("#win").textContent=m.window;
    $("#sub").textContent=m.subtitle;
    // insights
    var ih=$("#insights");ih.innerHTML="";
    r.insights.forEach(function(it,i){
      var c=document.createElement("div");c.className="icard";
      c.innerHTML='<h3><span class="inum">'+(i+1)+'</span><span>'+esc(it.title)+'</span></h3>'+
        '<ul>'+it.points.map(function(p){return "<li>"+p+"</li>"}).join("")+'</ul>';
      ih.appendChild(c);
    });
    // sections (board -> subdomain -> viewpoints)
    var sh=$("#sections");sh.innerHTML="";
    r.sections.forEach(function(pair){
      var name=pair[0],subs=pair[1],col=REPC[name]||"#5b8def";
      var box=document.createElement("div");box.className="bsec";
      var nvp=subs.reduce(function(a,s){return a+s[1].length},0);
      var inner=subs.map(function(sd){
        var subn=sd[0],rows=sd[1];
        return '<div class="sub"><div class="subh" style="--sc:'+col+';color:'+col+'">'+esc(subn)+'</div>'+
          rows.map(function(row){
            return '<div class="vp"><span class="vh" data-h="'+esc(row[0].replace("@",""))+'">'+esc(row[0])+'</span>'+
              '<span class="vr">'+esc(row[1])+'</span>'+row[2]+'</div>';
          }).join("")+'</div>';
      }).join("");
      box.innerHTML='<div class="bhead" style="background:'+col+'">'+esc(name)+
        ' <span style="font-weight:500;opacity:.75;font-size:12px">'+subs.length+' 领域 · '+nvp+' 条</span>'+
        '<span class="arrow">▾</span></div><div class="bbody">'+inner+'</div>';
      var bd=box.querySelector(".bbody"),hd=box.querySelector(".bhead");
      hd.onclick=function(){bd.style.display=bd.style.display==="none"?"":"none";
        box.querySelector(".arrow").textContent=bd.style.display==="none"?"▸":"▾"};
      sh.appendChild(box);
    });
    // wire viewpoint handles
    sh.querySelectorAll(".vh").forEach(function(v){v.onclick=function(){jumpHandle(v.dataset.h)}});
    // unique
    var uh=$("#unique");uh.innerHTML="";
    r.unique.forEach(function(u){
      var c=document.createElement("div");c.className="ucard";
      c.innerHTML='<div class="uh" data-h="'+esc(u[0].replace("@",""))+'">'+esc(u[0])+'</div>'+
        '<div class="uv">'+esc(u[1])+'</div><div class="ui">交易含义：'+esc(u[2])+'</div>';
      c.querySelector(".uh").onclick=function(){jumpHandle(u[0].replace("@",""))};
      uh.appendChild(c);
    });
  }

  function buildPills(){
    var tw=cur().tweets,wrap=$("#boardPills");wrap.innerHTML="";
    var counts={all:tw.length};Object.keys(BOARDS).forEach(function(k){counts[k]=0});
    tw.forEach(function(t){counts[t.b]=(counts[t.b]||0)+1});
    function mk(key,label,color){var p=document.createElement("button");p.className="pill";
      p.innerHTML=label+' <span class="cnt">'+(counts[key]||0)+'</span>';
      if(st.board===key){p.setAttribute("data-on","1");p.style.background=color;p.style.borderColor=color}
      p.onclick=function(){st.board=key;buildPills();render()};return p}
    wrap.appendChild(mk("all","全部","#e7b24d"));
    Object.keys(BOARDS).forEach(function(k){wrap.appendChild(mk(k,BOARDS[k].label,BOARDS[k].color))});
  }
  function pass(t){
    if(st.board!=="all"&&t.b!==st.board)return false;
    if(st.tier!=="all"&&(""+t.tier)!==st.tier)return false;
    if(st.lang!=="all"&&t.lang!==st.lang)return false;
    if(st.q){var q=st.q.toLowerCase();if((t.x+" @"+t.h).toLowerCase().indexOf(q)<0)return false}
    return true}
  function render(){
    var m=cur().meta,tw=cur().tweets.filter(pass);
    tw.sort(function(a,b){return st.sort==="hot"?b.eng-a.eng:(a.t<b.t?1:-1)});
    var kol=new Set(tw.map(function(t){return t.h})).size;
    $("#tstat").innerHTML='当前显示 <b>'+tw.length+'</b> / '+m.n_tweets+' 条 · <b>'+kol+'</b> 位 KOL · 监测 '+m.n_accounts+' 账号';
    var s=$("#stream");
    if(!tw.length){s.innerHTML='<div class="empty">没有匹配的推文 —— 换个词或点「重置」。</div>';return}
    s.innerHTML="";
    tw.forEach(function(t){
      var B=BOARDS[t.b]||{short:"其他",color:"#5b8def"};
      var c=document.createElement("div");c.className="card";c.tabIndex=0;c.style.setProperty("--bc",B.color);
      var tags=(t.tags||[]).map(function(x){return '<span class="tag" data-tag="'+esc(x)+'">'+esc(x)+'</span>'}).join("");
      c.innerHTML='<div class="chead"><span class="hand" data-h="'+esc(t.h)+'">@'+esc(t.h)+'</span>'+
        '<span class="bchip" style="background:'+B.color+'">'+B.short+'</span>'+
        (t.tier===1?'<span class="t1">一线</span>':'')+'<span class="lang">'+(t.lang==="zh"?"中":"EN")+'</span>'+
        '<span class="time mono">'+esc(t.t)+'</span></div>'+
        '<div class="cbody">'+hl(t.x,st.q)+'</div>'+
        '<div class="cfoot"><span class="eng mono"><span>♥ '+fmt(t.lk)+'</span><span>⟲ '+fmt(t.rt)+'</span><span>💬 '+fmt(t.rp)+'</span></span>'+
        '<span class="tags">'+tags+'</span><span class="open">打开 ↗</span></div>';
      var body=c.querySelector(".cbody");
      requestAnimationFrame(function(){if(body.scrollHeight>body.clientHeight+4){body.classList.add("clamp");
        var mm=document.createElement("span");mm.className="more";mm.textContent="展开全文 ▾";body.after(mm);
        mm.onclick=function(e){e.stopPropagation();body.classList.toggle("open");body.classList.toggle("clamp");
          mm.textContent=body.classList.contains("open")?"收起 ▴":"展开全文 ▾"}}});
      c.onclick=function(){window.open(t.u,"_blank","noopener")};
      c.onkeydown=function(e){if(e.key==="Enter")window.open(t.u,"_blank","noopener")};
      c.querySelector(".hand").onclick=function(e){e.stopPropagation();jumpHandle(t.h)};
      c.querySelectorAll(".tag").forEach(function(tg){tg.onclick=function(e){e.stopPropagation();
        $("#q").value=tg.dataset.tag;st.q=tg.dataset.tag;$("#clr").style.display="block";render()}});
      s.appendChild(c);
    });
  }
  function renderAll(){renderReport();buildPills();render()}

  var qi=$("#q"),clr=$("#clr");
  qi.oninput=function(){st.q=qi.value.trim();clr.style.display=qi.value?"block":"none";render()};
  clr.onclick=function(){qi.value="";st.q="";clr.style.display="none";qi.focus();render()};
  document.addEventListener("keydown",function(e){
    if(e.key==="/"&&document.activeElement!==qi){e.preventDefault();qi.focus()}
    if(e.key==="Escape"&&document.activeElement===qi){qi.value="";st.q="";clr.style.display="none";render()}});
  function seg(id,key){var el=$(id);el.querySelectorAll("button").forEach(function(b){b.onclick=function(){
    el.querySelectorAll("button").forEach(function(x){x.removeAttribute("data-on")});b.setAttribute("data-on","1");st[key]=b.dataset.v;render()}})}
  seg("#sortSeg","sort");seg("#tierSeg","tier");seg("#langSeg","lang");
  $("#reset").onclick=function(){st.board="all";st.tier="all";st.lang="all";st.sort="hot";st.q="";qi.value="";clr.style.display="none";
    [["#sortSeg","hot"],["#tierSeg","all"],["#langSeg","all"]].forEach(function(p){var el=$(p[0]);
      el.querySelectorAll("button").forEach(function(x){x.setAttribute("data-on",x.dataset.v===p[1]?"1":"")})});
    buildPills();render()};
  renderAll();
})();
</script>
</div>
</body>
</html>
