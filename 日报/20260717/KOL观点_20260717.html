ractions <b class=\"em\">100</b>+ · From Macroeconomics"]}, {"title": "Sentiment Shift · Fed / Rates", "points": ["@LawrenceLepard: I am a balance sheet hawk until something breaks—then I will surrender like Greenspan, Bernanke, and Powell. Rates fall, inflation rises, bond markets crash, and then comes QE <b class=\"em\">3.0</b>.", "Trading implication: If a liquidity crisis hits bond markets, forced central bank easing will benefit gold and Bitcoin.", "Key data: <b class=\"em\">3.0</b>", "Interactions <b class=\"em\">82</b>+ · From Macroeconomics"]}], "unique": [["@LawrenceLepard", "I am a balance sheet hawk until something breaks—then I will surrender like Greenspan, Bernanke, and Powell. Rates fall, inflation rises, bond markets crash, and then comes QE 3.0.", "If a liquidity crisis hits bond markets, forced central bank easing will benefit gold and Bitcoin."], ["@jimcramer", "One or two large portfolio managers are blowing up, dragging down all the leveraged tech players: SanDisk, AMD, Intel, Arm, etc. This is a tech deleveraging.", "If the chain reaction of blow-ups continues, tech sector liquidity risk will spill over to index heavyweights."], ["@BobEUnlimited", "Consumer nominal spending growth is near 7%, but income growth is only 3% with no stimulus checks. Historically, such extreme divergence has never lasted more than two quarters.", "If retail data subsequently declines, current consumer stock pricing will face a correction."], ["@RichardHaass", "The US should adopt strategic patience, rather than forcing war before reducing the vulnerability of Iran's neighbors and the role of the Strait of Hormuz.", "If the US chooses patience, short-term military risk declines, but long-term standoff may suppress risk appetite."]], "sections": [["Macroeconomics", [["Macroeconomics", [["@jimcramer", "", "One or two large portfolio managers are blowing up, dragging down all the leveraged tech players: SanDisk, AMD, Intel, Arm, etc. This is a tech deleveraging. <span style=\"color:#8fa0b3\">Trading implication: If the chain reaction of blow-ups continues, tech sector liquidity risk will spill over to index heavyweights.</span>"], ["@AndreasSteno", "", "The profit opportunities from Trump's geopolitical pivot increasingly favor those with connections or deep pockets. The more you pay, the less likely you are to be at the back of the line. <span style=\"color:#8fa0b3\">Trading implication: Inequality in policy arbitrage may amplify market volatility and increase tail risks.</span>"], ["@BobEUnlimited", "Macro Research", "Consumer nominal spending growth is near <b class=\"em\">7%</b>, but income growth is only <b class=\"em\">3%</b> with no stimulus checks. Historically, such extreme divergence has never lasted more than two quarters. <span style=\"color:#8fa0b3\">Trading implication: If retail data subsequently declines, current consumer stock pricing will face a correction.</span>"], ["@yardeni", "", "Foreign investors bought a record <b class=\"em\">903.8 billion</b> USD in US stocks over the past year. But historical patterns show foreign buying often peaks near tops. <span style=\"color:#8fa0b3\">Trading implication: Peaks in foreign inflows are often contrarian indicators; be wary of reversal risk in capital flows.</span>"]]], ["US Stocks / Fund Flows", [["@TimmerFidelity", "", "The S&P <b class=\"em\">500</b> ex-AI has only a <b class=\"em\">20%</b> 50-day correlation with the S&P <b class=\"em\">500</b> index, far below the equal-weight S&P <b class=\"em\">500</b>. Ex-AI is a good place to find uncorrelated returns. <span style=\"color:#8fa0b3\">Trading implication: The low correlation between AI and non-AI sectors offers diversification opportunities, but watch for spillover effects during AI corrections.</span>"]]], ["Fed / Rates", [["@LawrenceLepard", "", "I am a balance sheet hawk until something breaks—then I will surrender like Greenspan, Bernanke, and Powell. Rates fall, inflation rises, bond markets crash, and then comes QE <b class=\"em\">3.0</b>. <span style=\"color:#8fa0b3\">Trading implication: If a liquidity crisis hits bond markets, forced central bank easing will benefit gold and Bitcoin.</span>"]]]]], ["Geopolitics", [["Middle East", [["@tparsi", "Iran expert", "Oil traders warn that after the Strait of Hormuz closes again, market buffer inventories are exhausted, putting upward pressure on oil prices. <span style=\"color:#8fa0b3\">Trading implication: Depleted inventories mean oil prices are highly sensitive to supply disruptions; any new disturbance could trigger a sharp rally.</span>"], ["@vali_nasr", "Middle East scholar", "Iran's leadership sees the US-Iran memorandum as a tactical US retreat, aimed at easing global economic pressure and preparing for the next round of war. Any restraint will only invite more pressure. <span style=\"color:#8fa0b3\">Trading implication: Iran's hardline stance means limited room for negotiations, and the geopolitical premium may persist.</span>"], ["@Charles_Lister", "", "Chevron and other joint ventures will sign a memorandum of understanding with Iraq to build the Basra-Kirkuk oil pipeline and refurbish the Kirkuk-Banias pipeline to Syria. <span style=\"color:#8fa0b3\">Trading implication: New pipelines could alter Middle East oil export routes, reducing dependence on the Strait of Hormuz.</span>"], ["@RichardHaass", "", "The US should adopt strategic patience, rather than forcing war before reducing the vulnerability of Iran's neighbors and the role of the Strait of Hormuz. <span style=\"color:#8fa0b3\">Trading implication: If the US chooses patience, short-term military risk declines, but long-term standoff may suppress risk appetite.</span>"]]], ["US-China", [["@shashj", "", "Stealing voter data is not necessarily about manipulating a specific election; China obtained <b class=\"em\">40 million</b> UK voter records in <b class=\"em\">2021</b><b class=\"em\">-22</b>. <span style=\"color:#8fa0b3\">Trading implication: Data theft may be used for long-term influence operations, not short-term election interference.</span>"], ["@DerekJGrossman", "", "Trump's accusations of Chinese interference in the <b class=\"em\">2020</b> election won't change the situation; Beijing understands it's pandering to voters. In reality, Trump wants to strengthen bilateral ties, and Xi will just laugh it off. <span style=\"color:#8fa0b3\">Trading implication: US-China relations will not deteriorate in the short term due to election rhetoric, but the long-term game remains unchanged.</span>"]]], ["Other Geopolitics", [["@PeterZeihan", "", "Although drone warfare will look very different a decade from now, South Korea has already taken a leading position in next-generation military drone technology. <span style=\"color:#8fa0b3\">Trading implication: South Korean defense stocks and supply chains may benefit from growing drone demand.</span>"]]]]], ["Commodities", [["Crude Oil", [["@tparsi", "Iran expert", "The Strait of Hormuz is closed again, and crude traders warn that market inventories have exhausted their buffer. &#x<b class=\"em\">27</b>;We burned through all the buffer, everything is gone&#x<b class=\"em\">27</b>;, the market is near running on empty. <span style=\"color:#8fa0b3\">Trading implication: If the strait blockade persists, oil prices face significant upside risk, but watch for potential reversals from strategic reserve releases or diplomatic breakthroughs.</span>"], ["@PeterLBrandt", "", "Fifty years of chart experience, labeling the current pattern as a diamond pattern, which may signal a top, but anything is possible, direction undetermined. <span style=\"color:#8fa0b3\">Trading implication: If the diamond pattern is confirmed, it could trigger technical selling, but wait for confirmation of a breakout.</span>"]]], ["Natural Gas", [["@JKempEnergy", "", "After the Iran-US ceasefire ended, LNG exports via Hormuz were disrupted again. Investment managers bought <b class=\"em\">28</b> TWh of European natural gas futures, with bullish sentiment significantly heating up. <span style=\"color:#8fa0b3\">Trading implication: If geopolitical tensions ease or alternative supplies arrive, long positions may face a squeeze.</span>"]]], ["Agriculture", [["@BobEUnlimited", "Macro Research", "US residents have exhausted their financial capacity to maintain real spending in <b class=\"em\">1</b>H<b class=\"em\">26</b>. Any (moderate) relief from lower oil prices is more likely to be saved than spent. <span style=\"color:#8fa0b3\">Trading implication: If the saving propensity persists, agricultural demand will struggle to gain traction, and bullish logic must rely on the supply side.</span>"]]]]], ["Weather / Climate", []], ["AI / Semiconductors", [["AMD", [["@jimcramer", "", "AMD and other tech stocks may be dragged into a massive liquidation due to large portfolio manager blow-ups. <span style=\"color:#8fa0b3\">Trading implication: AMD faces selling pressure driven by liquidity risk.</span>"]]], ["Inference", [["@jaminball", "", "Kimi K<b class=\"em\">3</b> inference pricing at <b class=\"em\">$5.4</b>/million tokens, below Opus and GPT<b class=\"em\">-5.5</b>, but open-source model pricing is converging with closed-source. <span style=\"color:#8fa0b3\">Trading implication: The downward trend in inference costs may slow, benefiting high-end inference chips.</span>"]]], ["Other AI / Semiconductors", [["@skorusARK", "", "AI labs lack a unified strategy to counter NIMBYism, with no effective action beyond orbital solutions. <span style=\"color:#8fa0b3\">Trading implication: Regulatory resistance may delay AI infrastructure expansion, indirectly affecting semiconductor demand.</span>"]]]]]]}, "tweets": [{"h": "BillAckman", "tier": 1, "b": "macro", "t": "2026-07-17 02:37", "x_zh": "我们的移民政策需要改革，让最优秀和最聪明的人能在美国接受教育并留在这里为国家创造价值。只要他们的价值观与国家的长期利益一致，他们的签证就应该得到快速处理。有人能……", "x_en": "Our immigration policies need to be reformed to allow the best and brightest to be educated in the USA and stay here to create value for our country. As long as their values are aligned with the long-term interests of our country, their visas should be fast tracked. \n\nCan someone \nhttps://\nx.com/threcylawrence\n/threcylawrence/status/2077698775167189272\n…", "u": "https://x.com/BillAckman/status/2077945781986767013", "lk": 2170, "rt": 195, "rp": 691, "eng": 3056, "lang": "en", "tags": ["macro", "equities", "activist"]}, {"h": "jimcramer", "tier": 1, "b": "macro", "t": "2026-07-16 19:10", "x_zh": "但这次应该很明显，一两个大型投资组合经理正在爆仓，连带所有科技股中的保证金交易者一起遭殃：SanDisk、AMD、英特尔、Arm 等等。科技股的大规模平仓。", "x_en": "But this time it should be quite obvious that one or two big portfolio managers are blowing up taking with them all the margined players in tech: Sandisk, AMD, Intel, Arm and so many others. The great tech unwind", "u": "https://x.com/jimcramer/status/2077833374131994654", "lk": 1248, "rt": 162, "rp": 212, "eng": 1622, "lang": "en", "tags": ["macro", "equities", "teacher_required"]}, {"h": "PeterLBrandt", "tier": 1, "b": "macro", "t": "2026-07-17 00:10", "x_zh": "我画图表已经五十年了——以投机为生。自1978年起就是经典图表派。我不确定这该叫什么。我打赌在X上我可能是第一个将其标注为钻石形态的人。不确定这样对不对。这会不会是某种顶部？一切皆有可能。", "x_en": "Been charting for five decades - made my living as a speculator\nBeen a classical chartist since 1978\nNot sure exactly what to call this\nI'll bet on X I might have been the first to label this a diamond\nNot sure that will be right\nCould it be a top of sorts\nEverything is possible", "u": "https://x.com/PeterLBrandt/status/2077908803820097664", "lk": 617, "rt": 40, "rp": 33, "eng": 690, "lang": "en", "tags": ["commodities", "technical", "trader"]}, {"h": "PeterLBrandt", "tier": 1, "b": "macro", "t": "2026-07-16 21:51", "x_zh": "两张图表值得你思考。$MSFT #梅琳达应该卖出", "x_en": "Two charts that should get you thinking \n\n$MSFT\n \n#Melinda_should_sell", "u": "https://x.com/PeterLBrandt/status/2077873817507279000", "lk": 234, "rt": 17, "rp": 9, "eng": 260, "lang": "en", "tags": ["commodities", "technical", "trader"]}, {"h": "AndreasSteno", "tier": 1, "b": "macro", "t": "2026-07-17 05:20", "x_zh": "你付的钱越多，就越不可能在特朗普无数次地缘政治大转弯中赚钱时排在队伍后面。他们甚至不再试图掩饰。能接触到特朗普的人，或者有钱人，都能在此之前从中获利。", "x_en": "The more you pay, the less likely you are to end up at the back of the line when it comes to making money from Trump's countless geopolitical U-turns.\n\nThey're not even trying to hide it anymore. People with access to Trump, or with deep pockets, get to profit from it all before", "u": "https://x.com/AndreasSteno/status/2077986822991298825", "lk": 167, "rt": 14, "rp": 16, "eng": 197, "lang": "en", "tags": ["macro", "rates_fx", "cross_asset"]}, {"h": "BobEUnlimited", "tier": 1, "b": "macro", "t": "2026-07-16 17:13", "x_zh": "消费者能否在收入增长3%且没有刺激措施的情况下，保持名义支出增长接近7%（今天的零售销售数据）？历史上从未在如此极端的情况下持续超过几个季度。感谢 @thedailyshot", "x_en": "Will consumers keep their nominal spending growth at near 7% (today's retail sales print) with 3% income growth and no stimmies on the horizon?  Never happened at such an extreme for more than a couple quarters in history. h/t \n@thedailyshot", "u": "https://x.com/BobEUnlimited/status/2077803704527224950", "lk": 83, "rt": 11, "rp": 6, "eng": 100, "lang": "en", "tags": ["macro", "rates_fx", "cycle"]}, {"h": "yardeni", "tier": 2, "b": "macro", "t": "2026-07-16 17:46", "x_zh": "Yardeni Research 每日图表（2026年7月16日）。过去一年外国投资者买入美国股票创纪录的9038亿美元。这本来是利好消息，但他们的买入峰值往往出现在最糟糕的时机。我们接近顶部了吗？", "x_en": "Yardeni Research Chart of the Day (July 16, 2026)\n\nA record $903.8B in US equities bought by foreign investors over the past year. That would be bullish news, except they have a pattern of peaking at exactly the wrong time. Are we near a top?", "u": "https://x.com/yardeni/status/2077812026668154967", "lk": 73, "rt": 13, "rp": 6, "eng": 92, "lang": "en", "tags": ["macro", "equities", "sellside"]}, {"h": "SantiagoAuFund", "tier": 1, "b": "macro", "t": "2026-07-17 02:25", "x_zh": "这应该不会让任何人感到惊讶。你以为我们没有各种目的地的复制品吗？……#我们当然有", "x_en": "This should in no way be surprising to anyone.  You think we don’t have replicas of various destinations…?\n#OfCourseWeDo", "u": "https://x.com/SantiagoAuFund/status/2077942620102263136", "lk": 66, "rt": 4, "rp": 12, "eng": 82, "lang": "en", "tags": ["macro", "rates_fx", "dollar"]}, {"h": "LawrenceLepard", "tier": 2, "b": "macro", "t": "2026-07-17 00:10", "x_zh": "就是这样。我是个资产负债表鹰派，直到出问题，然后我会像格林斯潘、伯南克和鲍威尔一样屈服。这不难理解，伙计们。更低的利率，更高的通胀，债券市场崩溃，然后砰！第三次大印钞！有比特币吗？", "x_en": "So there you have it.  I am a balance sheet hawk until something breaks and then I will cave like Greenspan, the Bernack and Powell.  This isn’t hard folks.  Lower rates, higher inflation, the bond market breaks and BOOM!   Big Print Number 3!   Got Bitcoin?", "u": "https://x.com/LawrenceLepard/status/2077908675377664083", "lk": 71, "rt": 3, "rp": 8, "eng": 82, "lang": "en", "tags": ["macro", "gold", "hard_assets"]}, {"h": "TimmerFidelity", "tier": 1, "b": "macro", "t": "2026-07-16 23:09", "x_zh": "除了欧洲银行，标普500除AI板块仍然是寻找非相关回报的好地方。下面我们看到，除AI组合与标普500指数在50天基础上的相关性仅为20%，远低于等权标普500指数。", "x_en": "Beyond European banks, the S&P 500 ex-AI remains a good place to look for uncorrelated returns. Below we see that the ex-AI basket is only 20% correlated to the S&P 500 (SPX) on a 50-day basis, much lower than the equal-weighted S&P 500 (SPW).", "u": "https://x.com/TimmerFidelity/status/2077893289324445845", "lk": 49, "rt": 6, "rp": 10, "eng": 65, "lang": "en", "tags": ["macro", "equities", "cycle"]}, {"h": "BobEUnlimited", "tier": 1, "b": "macro", "t": "2026-07-16 10:27", "x_zh": "美国家庭需求的真正问题\n\n家庭在2026年上半年为了维持实际支出而捉襟见肘，因为价格飙升。任何（适度的）缓解可能来自油价下跌，更可能在2026年下半年被存起来，而不是用于新一轮挥霍。", "x_en": "The Real Problem with US HH Demand\n\nHouseholds stretched in 1H26 just to maintain real spending as prices surged. Any (modest) relief may come from falling gas prices is more likely to be socked away in 2H26 than spent on a new bender.\n\n\nhttps://\nbobeunlimited.substack.com/p/the-real-pro\nblem-with-us-hh-demand\n…", "u": "https://x.com/BobEUnlimited/status/2077701545278246981", "lk": 49, "rt": 7, "rp": 9, "eng": 65, "lang": "en", "tags": ["macro", "rates_fx", "cycle"]}, {"h": "JKempEnergy", "tier": 1, "b": "macro", "t": "2026-07-16 10:21", "x_zh": "投资经理对欧洲天然气价格前景变得更加看涨，因为伊朗与美国停火结束后，霍尔木兹海峡的液化天然气出口再次中断。基金经理购买了相当于28太瓦时的", "x_en": "INVESTMENT MANAGERS are turning more bullish about the outlook for Europe’s gas prices after the end of the ceasefire between Iran and the United States interrupted LNG exports through the Strait of Hormuz again. Fund managers purchased the equivalent of 28 terawatt-hours of", "u": "https://x.com/JKempEnergy/status/2077700018488942612", "lk": 21, "rt": 13, "rp": 2, "eng": 36, "lang": "en", "tags": ["commodities", "oil_energy", "data"]}, {"h": "ARKInvest", "tier": 1, "b": "macro", "t": "2026-07-16 22:30", "x_zh": "星舰第13次飞行即将发射。这里是你应该关注的一分钟指南。", "x_en": "Starship Flight 13 is about to launch. Here's your 1-minute guide on what you should be watching for.", "u": "https://x.com/ARKInvest/status/2077883475328147883", "lk": 27, "rt": 4, "rp": 4, "eng": 35, "lang": "en", "tags": ["macro", "equities", "innovation"]}, {"h": "yardeni", "tier": 2, "b": "macro", "t": "2026-07-17 02:43", "x_zh": "尽管储蓄率低、实际收入持平、债务上升以及几个月前就应该迫使消费回落的负担能力警告，消费者仍在以创纪录的水平支出。\n\n仅限会员", "x_en": "Consumers keep spending at record levels despite low savings, flat real income, rising debt, and affordability warnings that should have forced a pullback months ago.\n\n Members-Only", "u": "https://x.com/yardeni/status/2077947296612852126", "lk": 12, "rt": 1, "rp": 1, "eng": 14, "lang": "en", "tags": ["macro", "equities", "sellside"]}, {"h": "tparsi", "tier": 2, "b": "geopolitics", "t": "2026-07-16 20:03", "x_zh": "石油交易员警告市场接近空转，因为霍尔木兹海峡再次关闭\n\n在伊朗战争初期充当减震器的库存正在减少，因为关键水道再次关闭\n\n“我们已经用完了所有的缓冲。一切。”", "x_en": "Oil traders warn market is close to running on empty as Hormuz shuts again\n\nStockpiles that acted as shock absorbers early in Iran war are running low as crucial waterway closes again\n\n“We’ve burned through all of the buffers we had. Everything.”", "u": "https://x.com/tparsi/status/20778466577905 ["geopolitics", "middle_east", "diplomacy"]}, {"h": "Charles_Lister", "tier": 2, "b": "geopolitics", "t": "2026-07-16 20:50", "x_zh": "更多详情，来自@SJFindlay和@rayajalabi：\n\n一家合资企业（雪佛龙、洛杉矶的TI Capital以及叙利亚-卡塔尔的al-Khayyat兄弟）将与伊拉克签署谅解备忘录，建设一条从巴士拉到基尔库克的石油管道，并改造通往叙利亚的基尔库克-巴尼亚斯管道。\n\nhttps://ft.com/content/eb6e0b25-6682-46bc-a879-136a38d1d7d6?syn-25a6b1a6=1", "x_en": "More on this, by \n@SJFindlay\n & \n@rayajalabi\n:\n\nA joint venture (\n@Chevron\n, LA-based TI Capital & the Syrian-Qatari al-Khayyat brothers) will sign an MOU with #Iraq to build an oil pipeline from #Basra-#Kirkuk & revamp the #Kirkuk-#Baniyas pipeline to #Syria.\n\n\nhttps://\nft.com/content/eb6e0b\n25-6682-46bc-a879-136a38d1d7d6?syn-25a6b1a6=1\n…", "u": "https://x.com/Charles_Lister/status/2077858404932980934", "lk": 80, "rt": 17, "rp": 1, "eng": 98, "lang": "en", "tags": ["geopolitics", "middle_east", "syria"]}, {"h": "PeterZeihan", "tier": 1, "b": "geopolitics", "t": "2026-07-16 21:26", "x_zh": "虽然今天的无人机战争在十年后可能看起来大不相同，但韩国处于引领下一代军用无人机技术的有利位置。#韩国 #无人机战争 #地缘政治", "x_en": "While the drone warfare of today will likely look far different in ten years, South Korea is well positioned to lead the next generation of military drone technology.\n\n#southkorea #dronewarfare #geopolitics", "u": "https://x.com/PeterZeihan/status/2077867593315303918", "lk": 43, "rt": 3, "rp": 0, "eng": 46, "lang": "en", "tags": ["geopolitics", "demographics", "supply_chain"]}, {"h": "Charles_Lister", "tier": 2, "b": "geopolitics", "t": "2026-07-16 23:04", "x_zh": "有趣。\n\n在下面这条推文（批评国际足联世界杯裁判）今天变得有些病毒式传播后，国际足联刚刚向X发出版权投诉，强制删除了视频内容。\n\n我要补充的是，这些视频内容在网上*到处*都是。", "x_en": "Interesting.\n\nAfter the below tweet (criticising \n@FIFAWorldCup\n refereeing) went somewhat viral today, \n@FIFAcom\n just issued a copyright complaint to \n@X\n, forcibly removing the video content.\n\nVideo content that is *everywhere* online, I’d add.", "u": "https://x.com/Charles_Lister/status/2077892265616289905", "lk": 31, "rt": 8, "rp": 3, "eng": 42, "lang": "en",
