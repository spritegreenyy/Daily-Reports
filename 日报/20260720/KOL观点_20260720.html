sks and strategy homogenization</span>"]]], ["Fed / Interest Rates", [["@charliebilello", "", "US inflation has been above the Fed's target for <b class=\"em\">64</b> consecutive months, averaging <b class=\"em\">4%</b> annually since <b class=\"em\">2019</b>, yet the Fed is expanding its balance sheet (QE). This completely contradicts the expected operation of raising rates and shrinking the balance sheet. <span style=\"color:#8fa0b3\">Trading implication: If the market begins to price in a loss of Fed independence, long-end rates and the dollar could face a crisis of confidence</span>"]]], ["China / US-China", [["@yardeni", "", "Chinese tech stocks (CQQQ) have rebounded from lows but have significantly underperformed QQQ over the long term. China has completely missed the AI rally reshaping US, Korean, and Taiwanese markets, requiring a new catalyst to change. <span style=\"color:#8fa0b3\">Trading implication: If Chinese AI policy or technological breakthroughs emerge, it could trigger a massive rotation of funds from US AI to Chinese tech</span>"]]]]], ["Geopolitics", [["Middle East", [["@elerianm", "Macro Economist", "After the US-Iran conflict escalated, Brent crude broke above <b class=\"em\">$90</b>/barrel in Asian trading, with geopolitical premium quickly returning. <span style=\"color:#8fa0b3\">Trading implication: Oil prices are short-term sentiment-driven; focus on whether the conflict continues to expand</span>"], ["@ELuttwak", "", "The Iranian Revolutionary Guard system cannot be changed by bombing, but systematically targeting key targets like electricity can proportionally weaken its operational capability. <span style=\"color:#8fa0b3\">Trading implication: If military action focuses on infrastructure, it could alter the conflict's cost-benefit ratio</span>"], ["@JKempEnergy", "", "After the US-Iran ceasefire collapsed, investors quickly reduced Brent shorts and established longs, with short covering driving the oil price rebound. <span style=\"color:#8fa0b3\">Trading implication: Position adjustments already reflect short-term risks; subsequent oil prices depend on actual supply disruptions</span>"]]], ["US-China", [["@yardeni", "", "Chinese tech stocks CQQQ have rebounded from lows but have significantly lagged US QQQ over the long term, missing the AI rally. <span style=\"color:#8fa0b3\">Trading implication: Policy or technological breakthroughs are needed to change the relative weakness of Chinese tech stocks</span>"]]]]], ["Commodities", [["Crude Oil", [["@elerianm", "Macro Economist", "After the US-Iran conflict escalated, Brent crude broke above <b class=\"em\">$90</b>/barrel in Asian trading, with a clear short-term geopolitical premium. <span style=\"color:#8fa0b3\">Trading implication: If the conflict does not expand further, levels above <b class=\"em\">$90</b> may be unsustainable</span>"], ["@BobEUnlimited", "Macro Research", "Only <b class=\"em\">1%</b> of investors expect oil prices to reach <b class=\"em\">$100</b>/barrel by year-end, with very low confidence in sustained price increases. <span style=\"color:#8fa0b3\">Trading implication: If the current geopolitical premium fades, oil prices could quickly fall back</span>"], ["@JKempEnergy", "", "After the US-Iran ceasefire ended, investors quickly covered Brent shorts and established new longs, with short covering driving the oil price rebound. <span style=\"color:#8fa0b3\">Trading implication: If tensions ease, long liquidation could trigger a secondary decline</span>"]]]]], ["Weather / Climate", [["El Niño Status", [["@natolambert", "", "The El Niño Costero off the coast of Peru is rapidly intensifying, with sea surface temperature anomalies in the Niño <b class=\"em\">1</b><b class=\"em\">+2</b> region approaching <b class=\"em\">+3°C</b>, similar to the same period in <b class=\"em\">1997</b>; expected to expand to Ecuador within two weeks, potentially triggering global climate chain reactions. <span style=\"color:#8fa0b3\">Trading implication: Rapid intensification of El Niño increases the probability of extreme weather, affecting agricultural and energy trading strategies</span>"]]]]], ["AI / Semiconductors", [["NVIDIA", [["@natolambert", "", "The rental price of H<b class=\"em\">100</b> computing power will remain around <b class=\"em\">$2</b>/hour for the long term, entering a plateau after supply increases, with limited short-term volatility. <span style=\"color:#8fa0b3\">Trading implication: Stabilizing computing power pricing may weaken GPU manufacturers' marginal pricing power but benefit downstream AI application cost control</span>"]]]]]]}, "tweets": [{"h": "chamath", "tier": 1, "b": "macro", "t": "2026-07-19 16:36", "x_zh": "加密货币，特别是比特币多头目前面临两个问题：1）边际流动性更倾向于投机预测市场和股票市场；2）用于挖BTC的边际能源如果重新分配给AI代币，价值可提升10-20倍。这些变化感觉是结构性的，但我", "x_en": "There are two problems rn for crypto and, specifically, bitcoin bulls:\n\n1) marginal liquidity would rather speculate in prediction markets and equity markets \n\n2) marginal energy to mine BTC is worth 10-20x if reallocated to serving AI tokens \n\nThese changes feel structural but I", "u": "https://x.com/chamath/status/2078881723555647642", "lk": 3255, "rt": 274, "rp": 724, "eng": 4253, "lang": "en", "tags": ["macro", "equities", "technology"]}, {"h": "elerianm", "tier": 1, "b": "macro", "t": "2026-07-20 01:12", "x_zh": "想想看，在这次世界杯他们的行为之前，我一直支持阿根廷和他们的球迷。我怀疑我需要很长时间才能从过去几周我和数十亿人所震惊的事情中恢复过来。#世界杯", "x_en": "And to think that, before their behavior at this World Cup, I had always supported Argentina and their fans.\nI suspect that it will take me a long time to get over what billions of others and I have been shocked by over the last few weeks.\n#worldcup", "u": "https://x.com/elerianm/status/2079011421753409704", "lk": 1553, "rt": 153, "rp": 129, "eng": 1835, "lang": "en", "tags": ["macro", "central_banks", "teacher_required"]}, {"h": "charliebilello", "tier": 2, "b": "macro", "t": "2026-07-19 17:31", "x_zh": "美国通胀已连续64个月高于美联储目标水平，自2019年以来平均每年4%。那么为什么美联储又要扩大资产负债表（QE）？他们应该做完全相反的事——加息并缩表。#终结美联储", "x_en": "US Inflation has now been above the Fed's target level for 64 consecutive months, averaging 4% per year since 2019.\n\nSo why is the Fed expanding its balance sheet again (QE)?\n\nThey should be doing the exact opposite - hiking rates and shrinking their balance sheet.\n\n#EndtheFed", "u": "https://x.com/charliebilello/status/2078895537969889658", "lk": 931, "rt": 228, "rp": 110, "eng": 1269, "lang": "en", "tags": ["macro", "data", "markets"]}, {"h": "RaoulGMI", "tier": 1, "b": "macro", "t": "2026-07-19 23:04", "x_zh": "我认为西班牙现在保持着国际足球史上最长的不败纪录……38场比赛", "x_en": "I think Spain now holds the longest unbeaten streak in the history of international football ...38 games", "u": "https://x.com/RaoulGMI/status/2078979392752001025", "lk": 723, "rt": 16, "rp": 10, "eng": 749, "lang": "en", "tags": ["macro", "crypto", "long_cycle"]}, {"h": "RaoulGMI", "tier": 1, "b": "macro", "t": "2026-07-19 18:39", "x_zh": "每个机构总是以人的速度运行。董事会、基金、政府……它们移动的速度和人类说话、争论和投票一样快。这个天花板正在被打破。阿布扎比正在其投资委员会中使用AI。企业也在用它", "x_en": "Every institution has always run at the speed of its people. Boards, funds, governments... they moved as fast as humans could talk, argue and vote.\n\nThat ceiling is starting to come off.\n\nAbu Dhabi is running AI on its investment committees. Corporations are using it in", "u": "https://x.com/RaoulGMI/status/2078912606689984630", "lk": 430, "rt": 44, "rp": 44, "eng": 518, "lang": "en", "tags": ["macro", "crypto", "long_cycle"]}, {"h": "elerianm", "tier": 1, "b": "macro", "t": "2026-07-20 00:31", "x_zh": "回应本周末美国与伊朗的升级冲突，布伦特原油在亚洲交易时段目前高于每桶90美元。#经济 #石油 #市场 #能源", "x_en": "Responding to this weekend's US-Iran escalation, Brent crude is currently above $90 a barrel in Asian trading.\n#economy #oil #markets #energy", "u": "https://x.com/elerianm/status/2079001271361483235", "lk": 160, "rt": 32, "rp": 26, "eng": 218, "lang": "en", "tags": ["macro", "central_banks", "teacher_required"]}, {"h": "BobEUnlimited", "tier": 1, "b": "macro", "t": "2026-07-19 19:15", "x_zh": "只有1%的投资者认为年底前油价可能达到100美元/桶。", "x_en": "Only 1% of investors think that 100/bbl oil could exist to close the year.", "u": "https://x.com/BobEUnlimited/status/2078921580533436547", "lk": 137, "rt": 20, "rp": 19, "eng": 176, "lang": "en", "tags": ["macro", "rates_fx", "cycle"]}, {"h": "JKempEnergy", "tier": 1, "b": "macro", "t": "2026-07-19 11:38", "x_zh": "停火结束后布伦特原油的空头回补反弹。在美国和伊朗结束停火并升级对波斯湾航运和基础设施的袭击后，投资者争相削减看跌空头头寸并建立新的看涨多头头寸。", "x_en": "Brent’s short covering rally after ceasefire ends\n\nInvestors raced to trim bearish short positions and establish new bullish long ones in Brent after the United States and Iran ended their ceasefire and escalated attacks on shipping and infrastructure across the Persian Gulf.", "u": "https://x.com/JKempEnergy/status/2078806610705613149", "lk": 67, "rt": 17, "rp": 5, "eng": 89, "lang": "en", "tags": ["commodities", "oil_energy", "data"]}, {"h": "yardeni", "tier": 2, "b": "macro", "t": "2026-07-19 22:01", "x_zh": "CQQQ已从低点反弹，但长期来看交易价格仍仅为QQQ的一小部分。中国科技股错过了重塑美国、韩国和台湾市场的AI涨势。要改变这一局面需要什么？", "x_en": "Yardeni Research Chart of the Day (July 19, 2026)\n\nCQQQ has bounced from its low but still trades at a fraction of QQQ over any long horizon. China tech has sat out the AI rallies reshaping US, South Korean, and Taiwanese markets. What would it take to change that?", "u": "https://x.com/yardeni/status/2078963522348650943", "lk": 31, "rt": 1, "rp": 2, "eng": 34, "lang": "en", "tags": ["macro", "equities", "sellside"]}, {"h": "chigrl", "tier": 1, "b": "macro", "t": "2026-07-19 18:08", "x_zh": "明天早上8点加入我们在@NTLiveMedia的Morning Gap Macro节目！可爱的@maggielake将代替@AnthonyCrudele，与我@ces921和@NinjaTrader_Jim一起。特别嘉宾@gnoble79将于美国东部时间上午8:30登场。", "x_en": "Join us for the Morning Gap Macro show on \n@NTLiveMedia\n at 8:00 AM tomorrow morning! \n\nThe lovely \n@maggielake\n will be filling in for \n@AnthonyCrudele\n along with myself, \n@ces921\n and \n@NinjaTrader_Jim\n \n\nSPECIAL GUEST \n@gnoble79\n up at 8:30 AM ET\n\nhttps://\nyoutube.com/live/zd7rJbinZ\neg?si=6rFqRGE5UZoVKlV9\n…", "u": "https://x.com/chigrl/status/2078904817099911391", "lk": 15, "rt": 1, "rp": 0, "eng": 16, "lang": "en", "tags": ["commodities", "oil_energy", "metals"]}, {"h": "ELuttwak", "tier": 2, "b": "geopolitics", "t": "2026-07-19 12:45", "x_zh": "革命卫队政权无法通过轰炸改变，但如果系统性地专注于一两个目标类别，该政权的运作能力将按比例减弱。发电是主要例子，无需摧毁发电站。", "x_en": "The Revolutionary Guard regime cannot be changed by bombing but if it were systematic by focusing on one or two target categories, the regime's ability to operate would be diminished pro rata. Electrical generation is the prime example, without need of destroying power stations", "u": "https://x.com/ELuttwak/status/2078823428828561526", "lk": 129, "rt": 21, "rp": 3, "eng": 153, "lang": "en", "tags": ["geopolitics", "strategy", "history"]}, {"h": "natolambert", "tier": 2, "b": "weather", "t": "2026-07-19 15:41", "x_zh": "按照这个速度，H100将永远保持在每小时约2美元。", "x_en": "At this rate h100s will stay about $2/hour forever", "u": "https://x.com/natolambert/status/2078867764283105629", "lk": 916, "rt": 15, "rp": 25, "eng": 956, "lang": "en", "tags": ["ai_semis", "ai_research", "models"]}, {"h": "natolambert", "tier": 2, "b": "weather", "t": "2026-07-19 14:21", "x_zh": "如果最近Kimi K3的事件终于让你相信你需要尝试理解中国实验室如何对待AI——以及它与旧金山权力中心有何不同——你应该阅读这篇文章。", "x_en": "If recent events with Kimi K3 have finally convinced you that you need to try and understand how the Chinese labs approach AI - and how it differs than the SF center of power - you should read this post:", "u": "https://x.com/natolambert/status/2078847722128633910", "lk": 572, "rt": 52, "rp": 16, "eng": 640, "lang": "en", "tags": ["ai_semis", "ai_research", "models"]}, {"h": "gdb", "tier": 2, "b": "ai_semis", "t": "2026-07-19 22:58", "x_zh": "感觉像是推进数学的分水岭时刻。能够真正改善人们生活的科学和医学进步现在感觉非常接近。", "x_en": "Feels like a watershed moment for advancing mathematics. Scientific and medical advances which can really improve people’s lives feeling very close now.", "u": "https://x.com/gdb/status/2078977720793661459", "lk": 589, "rt": 32, "rp": 50, "eng": 671, "lang": "en", "tags": ["ai_semis", "ai", "executive"]}, {"h": "danielnewmanUV", "tier": 2, "b": "ai_semis", "t": "2026-07-19 13:40", "x_zh": "市场会自行运作，波动性将动摇对AI建设的信心。但半导体股票，尤其是内存，将在未来几年内实现前所未有的盈利。我们并没有那么快地增加产能。利润率将上升，需求甚至远未达到顶峰。", "x_en": "Markets will market and volatility will shake confidence in the AI buildout. But semiconductor stocks, especially memory will have unprecedented earnings over the next few years. \n\nWe aren’t adding capacity that fast. Margins will rise and demand hasn’t even close to peaked.", "u": "https://x.com/danielnewmanUV/status/2078837368799232290", "lk": 211, "rt": 14, "rp": 21, "eng": 246, "lang": "en", "tags": ["ai_semis", "enterprise_tech", "semiconductors"]}, {"h": "anshelsag", "tier": 2, "b": "ai_semis", "t": "2026-07-19 18:30", "x_zh": "我想我准备好去伦敦参加#Unpacked了。", "x_en": "I think I'm ready for London and #Unpacked", "u": "https://x.com/anshelsag/status/2078910324003250472", "lk": 11, "rt": 0, "rp": 1, "eng": 12, "lang": "en", "tags": ["ai_semis", "semiconductors", "hardware"]}]}}, "boards": {"macro": {"label_zh": "宏观经济", "label_en": "Macro", "color": "#5b8def", "short_zh": "宏观", "short_en": "Macro"}, "geopolitics": {"label_zh": "地缘政治", "label_en": "Geopolitics", "color": "#ec6f57", "short_zh": "地缘", "short_en": "Geo"}, "commodities": {"label_zh": "大宗商品", "label_en": "Commodities", "color": "#e0952f", "short_zh": "大宗", "short_en": "Cmdty"}, "weather": {"label_zh": "天气气候", "label_en": "Weather", "color": "#33bfad", "short_zh": "天气", "short_en": "Weather"}, "ai_semis": {"label_zh": "AI半导体", "label_en": "AI & Semis", "color": "#b18ef0", "short_zh": "AI", "short_en": "AI"}}, "repColors": {"宏观经济": "#5b8def", "地缘政治": "#ec6f57", "大宗商品": "#e0952f", "股票": "#3fb36a", "AI半导体": "#b18ef0", "AI半导体科技": "#b18ef0", "AI / 半导体": "#b18ef0", "天气气候": "#33bfad"}, "dates": ["2026-07-20"]}</script>
<script>
(function(){
  var app=document.getElementById("kolapp"),P=JSON.parse(document.getElementById("payload").textContent),DATA=P.data,BOARDS=P.boards,REPC=P.repColors,DATES=P.dates;
  var uiLang=(new URLSearchParams(location.search).get("lang")||localStorage.getItem("windrise_lang")||"zh");
  var st={date:DATES[0],board:"all",tier:"all",lang:"all",sort:"hot",q:""};
  var UI={zh:{title:'KOL 交易主线<span class="g"> · </span>可视化终端',s1:'一 · 本日核心交易启示',s2:'二 · 五大板块 · 逐条观点',s3:'三 · 独到 / 有启发性的观点',s4:'四 · 全部推文 · 可检索（点击跳转原推）',search:'搜索关键词 / @账号（按 / 聚焦，Esc 清空）',hot:'热度',latest:'最新',all:'全部',tier1:'一线',tier2:'二线',zhOnly:'中文',enOnly:'EN',bi:'中英',reset:'重置',open:'打开 ↗',more:'展开全文 ▾',less:'收起 ▴',empty:'没有匹配的推文 —— 换个词或点「重置」。',show:'当前显示',kols:'位 KOL',monitor:'监测',accounts:'账号',domains:'领域',items:'条',meaning:'交易含义：',langZh:'中',langEn:'EN'},en:{title:'KOL Trading Themes<span class="g"> · </span>Visual Terminal',s1:'I · Core Trading Takeaways',s2:'II · Five Sectors · View by View',s3:'III · Distinctive / Insightful Views',s4:'IV · All Tweets · Searchable (click to open source)',search:'Search keyword / @handle (press / to focus, Esc to clear)',hot:'Hot',latest:'Latest',all:'All',tier1:'Tier 1',tier2:'Tier 2',zhOnly:'Chinese',enOnly:'English',bi:'Both',reset:'Reset',open:'Open ↗',more:'Expand ▾',less:'Collapse ▴',empty:'No matching tweets. Try another keyword or reset.',show:'Showing',kols:'KOLs',monitor:'monitoring',accounts:'accounts',domains:'domains',items:'items',meaning:'Trading implication: ',langZh:'ZH',langEn:'EN'}};
  var $=function(s){return app.querySelector(s)};
  function esc(s){return (s||"").replace(/[&<>]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;"}[c]})}
  function tx(k){return UI[uiLang][k]||UI.zh[k]||k}
  function boardLabel(k){var b=BOARDS[k]||{};return uiLang==="en"?(b.label_en||b.label_zh||k):(b.label_zh||k)}
  function boardShort(k){var b=BOARDS[k]||{};return uiLang==="en"?(b.short_en||b.short_zh||k):(b.short_zh||k)}
  function report(){var c=DATA[st.date];return uiLang==="en"?c.report_en:c.report_zh}
  function bodyOf(t){return uiLang==="en"?(t.x_en||t.x_zh||""):(t.x_zh||t.x_en||"")}
  function fmt(n){return n>=1000?(n/1000).toFixed(n>=10000?0:1)+"k":""+n}
  function hl(s,q){s=s||"";if(!q)return s;try{var re=new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");return s.replace(re,"<mark>$1</mark>")}catch(e){return s}}
  function cur(){return DATA[st.date]}
  function jumpHandle(h){$("#q").value="@"+h;st.q="@"+h;$("#clr").style.display="block";st.board="all";buildPills();render();$("#stream").scrollIntoView({behavior:"smooth",block:"start"})}
  function syncUi(){
    localStorage.setItem("windrise_lang",uiLang); document.documentElement.lang=uiLang==="en"?"en":"zh-CN";
    document.title=(uiLang==="en"?"KOL Trading Themes · Visual Terminal":"KOL 交易主线 · 可视化终端")+" · 2026-07-20";
    $("#title").innerHTML=tx("title"); $("#st1").textContent=tx("s1"); $("#st2").textContent=tx("s2"); $("#st3").textContent=tx("s3"); $("#st4").textContent=tx("s4");
    $("#q").placeholder=tx("search"); $("#reset").textContent=tx("reset");
    [["#sortSeg",["hot","latest"]],["#tierSeg",["all","tier1","tier2"]],["#langSeg",["bi","zhOnly","enOnly"]]].forEach(function(pair){
      var btns=$(pair[0]).querySelectorAll("button"); pair[1].forEach(function(k,i){btns[i].textContent=tx(k)})});
    app.querySelectorAll(".langsw button").forEach(function(b){b.setAttribute("data-on",b.dataset.lang===uiLang?"1":"")});
  }
  var dsel=$("#dateSel"); DATES.forEach(function(d){var o=document.createElement("option");o.value=d;o.textContent=d;dsel.appendChild(o)}); dsel.value=st.date;
  dsel.onchange=function(){st.date=dsel.value;st.board="all";renderAll()};

  function renderReport(){
    var r=report(),m=cur().meta;
    $("#win").textContent=uiLang==="en"?m.window_en:m.window_zh; $("#sub").textContent=uiLang==="en"?m.subtitle_en:m.subtitle_zh;
    var ih=$("#insights");ih.innerHTML=""; r.insights.forEach(function(it,i){var c=document.createElement("div");c.className="icard";c.innerHTML='<h3><span class="inum">'+(i+1)+'</span><span>'+it.title+'</span></h3><ul>'+it.points.map(function(p){return "<li>"+p+"</li>"}).join("")+'</ul>';ih.appendChild(c)});
    var sh=$("#sections");sh.innerHTML="";
    r.sections.forEach(function(pair){
      var name=pair[0],subs=pair[1],col=REPC[name]||"#5b8def",nvp=subs.reduce(function(a,s){return a+s[1].length},0);
      var inner=subs.map(function(sd){return '<div class="subg"><div class="subh" style="--sc:'+col+';color:'+col+'">'+sd[0]+'</div>'+sd[1].map(function(row){return '<div class="vp"><span class="vh" data-h="'+esc(row[0].replace("@",""))+'">'+row[0]+'</span>'+(row[1]?'<span class="vr">'+row[1]+'</span>':'')+row[2]+'</div>'}).join("")+'</div>'}).join("");
      var box=document.createElement("div");box.className="bsec";box.innerHTML='<div class="bhead" style="background:'+col+'">'+name+' <span style="font-weight:500;opacity:.75;font-size:12px">'+subs.length+' '+tx("domains")+' · '+nvp+' '+tx("items")+'</span><span class="arrow">▾</span></div><div class="bbody">'+inner+'</div>';
      var bd=box.querySelector(".bbody"),hd=box.querySelector(".bhead"); hd.onclick=function(){bd.style.display=bd.style.display==="none"?"":"none";box.querySelector(".arrow").textContent=bd.style.display==="none"?"▸":"▾"}; sh.appendChild(box);
    });
    sh.querySelectorAll(".vh").forEach(function(v){v.onclick=function(){jumpHandle(v.dataset.h)}});
    var uh=$("#unique");uh.innerHTML=""; r.unique.forEach(function(u){var c=document.createElement("div");c.className="ucard";c.innerHTML='<div class="uh" data-h="'+esc(u[0].replace("@",""))+'">'+u[0]+'</div><div class="uv">'+u[1]+'</div><div class="ui">'+tx("meaning")+u[2]+'</div>';c.querySelector(".uh").onclick=function(){jumpHandle(u[0].replace("@",""))};uh.appendChild(c)});
  }
  function buildPills(){
    var tw=cur().tweets,wrap=$("#boardPills");wrap.innerHTML=""; var counts={all:tw.length};Object.keys(BOARDS).forEach(function(k){counts[k]=0}); tw.forEach(function(t){counts[t.b]=(counts[t.b]||0)+1});
    function mk(key,label,color){var p=document.createElement("button");p.className="pill";p.innerHTML=label+' <span class="cnt">'+(counts[key]||0)+'</span>';if(st.board===key){p.setAttribute("data-on","1");p.style.background=color;p.style.borderColor=color} p.onclick=function(){st.board=key;buildPills();render()};return p}
    wrap.appendChild(mk("all",tx("all"),"#e7b24d")); Object.keys(BOARDS).forEach(function(k){wrap.appendChild(mk(k,boardLabel(k),BOARDS[k].color))});
  }
  function pass(t){
    if(st.board!=="all"&&t.b!==st.board)return false;
    if(st.tier!=="all"&&(""+t.tier)!==st.tier)return false;
    if(st.lang!=="all"&&t.lang!==st.lang)return false;
    if(st.q){var q=st.q.toLowerCase(); var hay=(bodyOf(t)+" "+(t.x_zh||"")+" "+(t.x_en||"")+" @"+t.h+" "+(t.tags||[]).join(" ")).toLowerCase(); if(hay.indexOf(q)<0)return false}
    return true
  }
  function render(){
    var m=cur().meta,tw=cur().tweets.filter(pass); tw.sort(function(a,b){return st.sort==="hot"?b.eng-a.eng:(a.t<b.t?1:-1)});
    var kol=new Set(tw.map(function(t){return t.h})).size; $("#tstat").innerHTML=tx("show")+' <b>'+tw.length+'</b> / '+m.n_tweets+' · <b>'+kol+'</b> '+tx("kols")+' · '+tx("monitor")+' '+m.n_accounts+' '+tx("accounts");
    var s=$("#stream"); if(!tw.length){s.innerHTML='<div class="empty">'+tx("empty")+'</div>';return} s.innerHTML="";
    tw.forEach(function(t){
      var B=BOARDS[t.b]||{color:"#5b8def"}, body=bodyOf(t), tags=(t.tags||[]).map(function(x){return '<span class="tag" data-tag="'+esc(x)+'">'+esc(x)+'</span>'}).join("");
      var c=document.createElement("div"); c.className="card"; c.tabIndex=0; c.style.setProperty("--bc",B.color);
      c.innerHTML='<div class="chead"><span class="hand" data-h="'+esc(t.h)+'">@'+esc(t.h)+'</span><span class="bchip" style="background:'+B.color+'">'+boardShort(t.b)+'</span>'+(t.tier===1?'<span class="t1">'+tx("tier1")+'</span>':'')+'<span class="lang">'+(t.lang==="zh"?tx("langZh"):tx("langEn"))+'</span><span class="time mono">'+esc(t.t)+'</span></div><div class="cbody">'+hl(body,st.q)+'</div><div class="cfoot"><span class="eng mono"><span>♥ '+fmt(t.lk)+'</span><span>⟲ '+fmt(t.rt)+'</span><span>💬 '+fmt(t.rp)+'</span></span><span class="tags">'+tags+'</span><span class="open">'+tx("open")+'</span></div>';
      var bodyEl=c.querySelector(".cbody"); requestAnimationFrame(function(){if(bodyEl.scrollHeight>bodyEl.clientHeight+4){bodyEl.classList.add("clamp"); var mm=document.createElement("span"); mm.className="more"; mm.textContent=tx("more"); bodyEl.after(mm); mm.onclick=function(e){e.stopPropagation();bodyEl.classList.toggle("open");bodyEl.classList.toggle("clamp");mm.textContent=bodyEl.classList.contains("open")?tx("less"):tx("more")}}});
      c.onclick=function(){window.open(t.u,"_blank","noopener")}; c.onkeydown=function(e){if(e.key==="Enter")window.open(t.u,"_blank","noopener")};
      c.querySelector(".hand").onclick=function(e){e.stopPropagation();jumpHandle(t.h)}; c.querySelectorAll(".tag").forEach(function(tg){tg.onclick=function(e){e.stopPropagation();$("#q").value=tg.dataset.tag;st.q=tg.dataset.tag;$("#clr").style.display="block";render()}});
      s.appendChild(c);
    })
  }
  function renderAll(){syncUi();renderReport();buildPills();render()}
  var qi=$("#q"),clr=$("#clr"); qi.oninput=function(){st.q=qi.value.trim();clr.style.display=qi.value?"block":"none";render()}; clr.onclick=function(){qi.value="";st.q="";clr.style.display="none";qi.focus();render()};
  document.addEventListener("keydown",function(e){if(e.key==="/"&&document.activeElement!==qi){e.preventDefault();qi.focus()} if(e.key==="Escape"&&document.activeElement===qi){qi.value="";st.q="";clr.style.display="none";render()}});
  function seg(id,key){var el=$(id);el.querySelectorAll("button").forEach(function(b){b.onclick=function(){el.querySelectorAll("button").forEach(function(x){x.removeAttribute("data-on")});b.setAttribute("data-on","1");st[key]=b.dataset.v;render()}})}
  seg("#sortSeg","sort"); seg("#tierSeg","tier"); seg("#langSeg","lang");
  $("#reset").onclick=function(){st.board="all";st.tier="all";st.lang="all";st.sort="hot";st.q="";qi.value="";clr.style.display="none";[["#sortSeg","hot"],["#tierSeg","all"],["#langSeg","all"]].forEach(function(p){var el=$(p[0]);el.querySelectorAll("button").forEach(function(x){x.setAttribute("data-on",x.dataset.v===p[1]?"1":"")})});buildPills();render()};
  app.querySelectorAll(".langsw button").forEach(function(b){b.onclick=function(){uiLang=b.dataset.lang;renderAll()}});
  renderAll();
})();
</script>
