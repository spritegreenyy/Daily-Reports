<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KOL 交易主线 · 可视化终端 · 2026-07-12</title>
<style>html,body{margin:0;background:#0e1620}</style>
</head>
<body>
<div id="kolapp">
<style>
  #kolapp *{box-sizing:border-box}
  #kolapp{--ink:#0e1620;--panel:#16212e;--panel2:#1b2836;--line:#26374a;--tx:#e7edf4;--mut:#8fa0b3;--mut2:#63748a;--gold:#e7b24d;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    color:var(--tx);background:var(--ink);min-height:100vh;line-height:1.55;-webkit-font-smoothing:antialiased}
  #kolapp .mono{font-family:"SF Mono","JetBrains Mono",ui-monospace,Menlo,monospace;font-variant-numeric:tabular-nums}
  #kolapp b{color:#f4b74a;font-weight:700}
  #kolapp mark{background:rgba(231,178,77,.26);color:#ffe4a3;border-radius:2px;padding:0 3px;font-weight:600}
  #kolapp .wrap{max-width:1180px;margin:0 auto;padding:0 20px}
  /* masthead */
  #kolapp .mast{background:linear-gradient(120deg,#132234,#0e1620);border-bottom:1px solid var(--line);padding:22px 0 18px}
  #kolapp .mast h1{margin:0;font-size:22px;font-weight:800;letter-spacing:.5px}
  #kolapp .mast h1 .g{color:var(--gold)}
  #kolapp .mast .win{color:var(--mut);font-size:12.5px;margin-top:5px}
  #kolapp .mast .sub{color:var(--mut2);font-size:12px;margin-top:3px}
  #kolapp .mtop{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  #kolapp select.date{margin-left:auto;background:var(--panel2);color:var(--tx);border:1px solid var(--line);border-radius:7px;padding:6px 10px;font-size:13px;cursor:pointer}
  /* section titles */
  #kolapp .sect{padding:22px 0 6px}
  #kolapp .stitle{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--mut);text-transform:uppercase;
    display:flex;align-items:center;gap:10px;margin-bottom:14px}
  #kolapp .stitle::before{content:"";width:5px;height:15px;background:var(--gold);border-radius:2px}
  /* insights */
  #kolapp .ins{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
  #kolapp .icard{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px 16px}
  #kolapp .icard h3{margin:0 0 9px;font-size:14.5px;font-weight:700;line-height:1.4;color:#fff;text-wrap:balance;display:flex;gap:8px}
  #kolapp .inum{flex:0 0 auto;width:20px;height:20px;border-radius:6px;background:var(--gold);color:#0e1620;font-size:12px;
    font-weight:800;display:grid;place-items:center;margin-top:1px}
  #kolapp .icard li{list-style:none;font-size:12.8px;color:#cdd8e6;margin:6px 0;padding-left:12px;position:relative}
  #kolapp .icard li::before{content:"";position:absolute;left:0;top:8px;width:4px;height:4px;border-radius:50%;background:var(--mut2)}
  #kolapp .icard ul{margin:0;padding:0}
  /* board sections */
  #kolapp .bsec{margin-bottom:16px;border:1px solid var(--line);border-radius:11px;overflow:hidden;background:var(--panel)}
  #kolapp .bhead{padding:9px 14px;font-size:14px;font-weight:700;color:#0e1620;cursor:pointer;display:flex;align-items:center;gap:8px}
  #kolapp .bhead .arrow{margin-left:auto;font-size:12px;opacity:.7}
  #kolapp .bbody{padding:6px 14px 12px}
  #kolapp .sub{margin-top:11px}
  #kolapp .subh{font-size:11.5px;font-weight:700;letter-spacing:.5px;padding:2px 0 2px 8px;margin-bottom:5px;border-left:3px solid var(--sc)}
  #kolapp .vp{font-size:12.8px;color:#cdd8e6;margin:5px 0;padding-left:2px}
  #kolapp .vh{font-weight:700;color:var(--tx);cursor:pointer}
  #kolapp .vh:hover{color:var(--gold)}
  #kolapp .vr{color:var(--mut2);font-size:11px;margin:0 5px}
  /* unique */
  #kolapp .uq{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:12px}
  #kolapp .ucard{background:var(--panel);border:1px solid var(--line);border-left:3px solid #35bfad;border-radius:10px;padding:12px 14px}
  #kolapp .ucard .uh{font-weight:700;font-size:13px;color:#35bfad;cursor:pointer}
  #kolapp .ucard .uv{font-size:12.6px;color:#cdd8e6;margin:6px 0}
  #kolapp .ucard .ui{font-size:11.8px;color:var(--mut);border-top:1px solid var(--line);padding-top:7px;margin-top:7px}
  #kolapp .ucard .ui b,#kolapp .icard b{color:#f4b74a}
  /* divider to terminal */
  #kolapp .tdiv{margin:30px 0 0;border-top:1px dashed var(--line);padding-top:4px}
  /* controls (sticky) */
  #kolapp .ctrl{position:sticky;top:0;z-index:15;background:rgba(14,22,32,.94);backdrop-filter:blur(6px);padding:12px 0;border-bottom:1px solid var(--line)}
  #kolapp .pills{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
  #kolapp .pill{border:1px solid var(--line);background:var(--panel);color:var(--mut);border-radius:999px;padding:5px 13px;font-size:13px;cursor:pointer;transition:.14s;display:inline-flex;gap:7px;white-space:nowrap}
  #kolapp .pill:hover{color:var(--tx);border-color:var(--mut2)}
  #kolapp .pill .cnt{font-size:11px;color:var(--mut2)}
  #kolapp .pill[data-on="1"]{color:#0e1620;font-weight:600}
  #kolapp .pill[data-on="1"] .cnt{color:rgba(14,22,32,.6)}
  #kolapp .row2{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
  #kolapp .search{flex:1;min-width:190px;position:relative}
  #kolapp .search input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--tx);border-radius:8px;padding:9px 32px 9px 34px;font-size:14px;outline:none}
  #kolapp .search input:focus{border-color:var(--gold)}
  #kolapp .search .ic{position:absolute;left:11px;top:9px;color:var(--mut2)}
  #kolapp .search .clr{position:absolute;right:9px;top:7px;color:var(--mut2);cursor:pointer;font-size:16px;display:none}
  #kolapp .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  #kolapp .seg button{background:var(--panel);color:var(--mut);border:0;padding:8px 12px;font-size:12.5px;cursor:pointer}
  #kolapp .seg button+button{border-left:1px solid var(--line)}
  #kolapp .seg button[data-on="1"]{background:var(--panel2);color:var(--gold)}
  #kolapp .reset{background:none;border:1px solid var(--line);color:var(--mut);border-radius:8px;padding:8px 12px;font-size:12.5px;cursor:pointer}
  #kolapp .reset:hover{color:var(--tx)}
  #kolapp .tstat{font-size:12px;color:var(--mut);margin:10px 0}
  #kolapp .tstat b{color:var(--tx)}
  /* stream */
  #kolapp .stream{padding:4px 0 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:12px;align-items:start}
  #kolapp .card{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--bc,#5b8def);border-radius:10px;padding:12px 14px;cursor:pointer;transition:.14s;overflow:hidden}
  #kolapp .card:hover{background:var(--panel2);transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,.35)}
  #kolapp .card:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  #kolapp .chead{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
  #kolapp .hand{font-weight:700;font-size:13.5px}
  #kolapp .hand:hover{color:var(--gold)}
  #kolapp .bchip{font-size:10.5px;padding:1px 7px;border-radius:5px;font-weight:600;color:#0e1620}
  #kolapp .t1{font-size:10px;color:var(--gold);border:1px solid rgba(231,178,77,.4);border-radius:4px;padding:0 4px}
  #kolapp .lang{font-size:10px;color:var(--mut2);border:1px solid var(--line);border-radius:4px;padding:0 4px}
  #kolapp .time{margin-left:auto;font-size:11px;color:var(--mut2)}
  #kolapp .cbody{font-size:13.3px;color:#d3ddeb;white-space:pre-wrap;word-break:break-word;max-height:8.6em;overflow:hidden;position:relative}
  #kolapp .cbody.open{max-height:none}
  #kolapp .cbody.clamp::after{content:"";position:absolute;bottom:0;left:0;right:0;height:2.2em;background:linear-gradient(180deg,transparent,var(--panel))}
  #kolapp .card:hover .cbody.clamp::after{background:linear-gradient(180deg,transparent,var(--panel2))}
  #kolapp .more{font-size:11.5px;color:var(--mut2);margin-top:3px;display:inline-block;cursor:pointer}
  #kolapp .cfoot{display:flex;align-items:center;gap:10px;margin-top:10px;padding-top:9px;border-top:1px solid var(--line);flex-wrap:wrap}
  #kolapp .eng{display:flex;gap:11px;font-size:11.5px;color:var(--mut)}
  #kolapp .tags{display:flex;gap:5px;flex-wrap:wrap}
  #kolapp .tag{font-size:10.5px;color:var(--mut);background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:1px 6px;cursor:pointer}
  #kolapp .tag:hover{color:var(--tx)}
  #kolapp .open{margin-left:auto;font-size:11.5px;color:var(--gold);white-space:nowrap}
  #kolapp .empty{grid-column:1/-1;text-align:center;color:var(--mut2);padding:50px 20px}
  @media (max-width:560px){#kolapp .ins,#kolapp .uq,#kolapp .stream{grid-template-columns:1fr}}
  @media (prefers-reduced-motion:reduce){#kolapp *{transition:none!important}}
</style>

<div class="mast"><div class="wrap">
  <div class="mtop">
    <h1>KOL 交易主线<span class="g"> · </span>可视化终端</h1>
    <select class="date" id="dateSel"></select>
  </div>
  <div class="win" id="win"></div>
  <div class="sub" id="sub"></div>
</div></div>

<div class="wrap">
  <div class="sect"><div class="stitle">一 · 本日核心交易启示</div><div class="ins" id="insights"></div></div>
  <div class="sect"><div class="stitle">二 · 五大板块 · 逐条观点</div><div id="sections"></div></div>
  <div class="sect"><div class="stitle">三 · 独到 / 有启发性的观点</div><div class="uq" id="unique"></div></div>

  <div class="tdiv"></div>
  <div class="sect"><div class="stitle">四 · 全部推文 · 可检索（点击跳转原推）</div></div>
</div>

<div class="ctrl"><div class="wrap">
  <div class="pills" id="boardPills"></div>
  <div class="row2">
    <div class="search"><span class="ic">🔍</span>
      <input id="q" type="text" placeholder="搜索关键词 / @账号（按 / 聚焦，Esc 清空）" autocomplete="off">
      <span class="clr" id="clr">×</span></div>
    <div class="seg" id="sortSeg"><button data-v="hot" data-on="1">热度</button><button data-v="new">最新</button></div>
    <div class="seg" id="tierSeg"><button data-v="all" data-on="1">全部</button><button data-v="1">一线</button><button data-v="2">二线</button></div>
    <div class="seg" id="langSeg"><button data-v="all" data-on="1">中英</button><button data-v="zh">中文</button><button data-v="en">EN</button></div>
    <button class="reset" id="reset">重置</button>
  </div>
</div></div>

<div class="wrap"><div class="tstat" id="tstat"></div><div class="stream" id="stream"></div></div>

<script type="application/json" id="payload">{"data": {"2026-07-12": {"meta": {"date": "2026-07-12", "n_tweets": 0, "n_kols": 0, "n_accounts": 271, "generated": "2026-07-12 08:07", "title": "KOL 交易主线 · 可视化分类总结", "window": "过去 24h（截至北京时间 2026-07-12 16:07）", "subtitle": "约 0 位 KOL / 0 条信号推文 · 已过滤新闻搬运、纯数据搬运与无关灌水 · 按板块→子领域分类 · 重点观点已高亮标注　·　英文推优先译中，缺失时保留原文"}, "report": {"insights": [], "unique": [], "sections": [["宏观经济", []], ["地缘政治", []], ["大宗商品", []], ["天气气候", []], ["AI半导体", []]]}, "tweets": []}}, "boards": {"macro": {"label": "宏观经济", "color": "#5b8def", "short": "宏观"}, "geopolitics": {"label": "地缘政治", "color": "#ec6f57", "short": "地缘"}, "commodities": {"label": "大宗商品", "color": "#e0952f", "short": "大宗"}, "weather": {"label": "天气气候", "color": "#33bfad", "short": "天气"}, "ai_semis": {"label": "AI半导体", "color": "#b18ef0", "short": "AI"}}, "repColors": {"宏观经济": "#5b8def", "地缘政治": "#ec6f57", "大宗商品": "#e0952f", "股票": "#3fb36a", "AI半导体": "#b18ef0", "AI半导体科技": "#b18ef0", "AI / 半导体": "#b18ef0", "天气气候": "#33bfad"}, "dates": ["2026-07-12"]}</script>
<script>
(function(){
  var app=document.getElementById("kolapp");
  var P=JSON.parse(document.getElementById("payload").textContent);
  var DATA=P.data,BOARDS=P.boards,REPC=P.repColors,DATES=P.dates;
  var st={date:DATES[0],board:"all",tier:"all",lang:"all",sort:"hot",q:""};
  var $=function(s){return app.querySelector(s)};
  function esc(s){return (s||"").replace(/[&<>]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;"}[c]})}
  function hl(s,q){s=esc(s);if(!q)return s;try{var re=new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");return s.replace(re,"<mark>$1</mark>")}catch(e){return s}}
  function fmt(n){return n>=1000?(n/1000).toFixed(n>=10000?0:1)+"k":""+n}
  function cur(){return DATA[st.date]}
  function jumpHandle(h){$("#q").value="@"+h;st.q="@"+h;$("#clr").style.display="block";st.board="all";buildPills();render();
    $("#stream").scrollIntoView({behavior:"smooth",block:"start"})}

  var dsel=$("#dateSel");
  DATES.forEach(function(d){var o=document.createElement("option");o.value=d;o.textContent=d;dsel.appendChild(o)});
  dsel.value=st.date;
  dsel.onchange=function(){st.date=dsel.value;st.board="all";renderAll()};

  function renderReport(){
    var r=cur().report,m=cur().meta;
    $("#win").textContent=m.window;
    $("#sub").textContent=m.subtitle;
    // insights
    var ih=$("#insights");ih.innerHTML="";
    r.insights.forEach(function(it,i){
      var c=document.createElement("div");c.className="icard";
      c.innerHTML='<h3><span class="inum">'+(i+1)+'</span><span>'+esc(it.title)+'</span></h3>'+
        '<ul>'+it.points.map(function(p){return "<li>"+p+"</li>"}).join("")+'</ul>';
      ih.appendChild(c);
    });
    // sections (board -> subdomain -> viewpoints)
    var sh=$("#sections");sh.innerHTML="";
    r.sections.forEach(function(pair){
      var name=pair[0],subs=pair[1],col=REPC[name]||"#5b8def";
      var box=document.createElement("div");box.className="bsec";
      var nvp=subs.reduce(function(a,s){return a+s[1].length},0);
      var inner=subs.map(function(sd){
        var subn=sd[0],rows=sd[1];
        return '<div class="sub"><div class="subh" style="--sc:'+col+';color:'+col+'">'+esc(subn)+'</div>'+
          rows.map(function(row){
            return '<div class="vp"><span class="vh" data-h="'+esc(row[0].replace("@",""))+'">'+esc(row[0])+'</span>'+
              '<span class="vr">'+esc(row[1])+'</span>'+row[2]+'</div>';
          }).join("")+'</div>';
      }).join("");
      box.innerHTML='<div class="bhead" style="background:'+col+'">'+esc(name)+
        ' <span style="font-weight:500;opacity:.75;font-size:12px">'+subs.length+' 领域 · '+nvp+' 条</span>'+
        '<span class="arrow">▾</span></div><div class="bbody">'+inner+'</div>';
      var bd=box.querySelector(".bbody"),hd=box.querySelector(".bhead");
      hd.onclick=function(){bd.style.display=bd.style.display==="none"?"":"none";
        box.querySelector(".arrow").textContent=bd.style.display==="none"?"▸":"▾"};
      sh.appendChild(box);
    });
    // wire viewpoint handles
    sh.querySelectorAll(".vh").forEach(function(v){v.onclick=function(){jumpHandle(v.dataset.h)}});
    // unique
    var uh=$("#unique");uh.innerHTML="";
    r.unique.forEach(function(u){
      var c=document.createElement("div");c.className="ucard";
      c.innerHTML='<div class="uh" data-h="'+esc(u[0].replace("@",""))+'">'+esc(u[0])+'</div>'+
        '<div class="uv">'+esc(u[1])+'</div><div class="ui">交易含义：'+esc(u[2])+'</div>';
      c.querySelector(".uh").onclick=function(){jumpHandle(u[0].replace("@",""))};
      uh.appendChild(c);
    });
  }

  function buildPills(){
    var tw=cur().tweets,wrap=$("#boardPills");wrap.innerHTML="";
    var counts={all:tw.length};Object.keys(BOARDS).forEach(function(k){counts[k]=0});
    tw.forEach(function(t){counts[t.b]=(counts[t.b]||0)+1});
    function mk(key,label,color){var p=document.createElement("button");p.className="pill";
      p.innerHTML=label+' <span class="cnt">'+(counts[key]||0)+'</span>';
      if(st.board===key){p.setAttribute("data-on","1");p.style.background=color;p.style.borderColor=color}
      p.onclick=function(){st.board=key;buildPills();render()};return p}
    wrap.appendChild(mk("all","全部","#e7b24d"));
    Object.keys(BOARDS).forEach(function(k){wrap.appendChild(mk(k,BOARDS[k].label,BOARDS[k].color))});
  }
  function pass(t){
    if(st.board!=="all"&&t.b!==st.board)return false;
    if(st.tier!=="all"&&(""+t.tier)!==st.tier)return false;
    if(st.lang!=="all"&&t.lang!==st.lang)return false;
    if(st.q){var q=st.q.toLowerCase();if((t.x+" @"+t.h).toLowerCase().indexOf(q)<0)return false}
    return true}
  function render(){
    var m=cur().meta,tw=cur().tweets.filter(pass);
    tw.sort(function(a,b){return st.sort==="hot"?b.eng-a.eng:(a.t<b.t?1:-1)});
    var kol=new Set(tw.map(function(t){return t.h})).size;
    $("#tstat").innerHTML='当前显示 <b>'+tw.length+'</b> / '+m.n_tweets+' 条 · <b>'+kol+'</b> 位 KOL · 监测 '+m.n_accounts+' 账号';
    var s=$("#stream");
    if(!tw.length){s.innerHTML='<div class="empty">没有匹配的推文 —— 换个词或点「重置」。</div>';return}
    s.innerHTML="";
    tw.forEach(function(t){
      var B=BOARDS[t.b]||{short:"其他",color:"#5b8def"};
      var c=document.createElement("div");c.className="card";c.tabIndex=0;c.style.setProperty("--bc",B.color);
      var tags=(t.tags||[]).map(function(x){return '<span class="tag" data-tag="'+esc(x)+'">'+esc(x)+'</span>'}).join("");
      c.innerHTML='<div class="chead"><span class="hand" data-h="'+esc(t.h)+'">@'+esc(t.h)+'</span>'+
        '<span class="bchip" style="background:'+B.color+'">'+B.short+'</span>'+
        (t.tier===1?'<span class="t1">一线</span>':'')+'<span class="lang">'+(t.lang==="zh"?"中":"EN")+'</span>'+
        '<span class="time mono">'+esc(t.t)+'</span></div>'+
        '<div class="cbody">'+hl(t.x,st.q)+'</div>'+
        '<div class="cfoot"><span class="eng mono"><span>♥ '+fmt(t.lk)+'</span><span>⟲ '+fmt(t.rt)+'</span><span>💬 '+fmt(t.rp)+'</span></span>'+
        '<span class="tags">'+tags+'</span><span class="open">打开 ↗</span></div>';
      var body=c.querySelector(".cbody");
      requestAnimationFrame(function(){if(body.scrollHeight>body.clientHeight+4){body.classList.add("clamp");
        var mm=document.createElement("span");mm.className="more";mm.textContent="展开全文 ▾";body.after(mm);
        mm.onclick=function(e){e.stopPropagation();body.classList.toggle("open");body.classList.toggle("clamp");
          mm.textContent=body.classList.contains("open")?"收起 ▴":"展开全文 ▾"}}});
      c.onclick=function(){window.open(t.u,"_blank","noopener")};
      c.onkeydown=function(e){if(e.key==="Enter")window.open(t.u,"_blank","noopener")};
      c.querySelector(".hand").onclick=function(e){e.stopPropagation();jumpHandle(t.h)};
      c.querySelectorAll(".tag").forEach(function(tg){tg.onclick=function(e){e.stopPropagation();
        $("#q").value=tg.dataset.tag;st.q=tg.dataset.tag;$("#clr").style.display="block";render()}});
      s.appendChild(c);
    });
  }
  function renderAll(){renderReport();buildPills();render()}

  var qi=$("#q"),clr=$("#clr");
  qi.oninput=function(){st.q=qi.value.trim();clr.style.display=qi.value?"block":"none";render()};
  clr.onclick=function(){qi.value="";st.q="";clr.style.display="none";qi.focus();render()};
  document.addEventListener("keydown",function(e){
    if(e.key==="/"&&document.activeElement!==qi){e.preventDefault();qi.focus()}
    if(e.key==="Escape"&&document.activeElement===qi){qi.value="";st.q="";clr.style.display="none";render()}});
  function seg(id,key){var el=$(id);el.querySelectorAll("button").forEach(function(b){b.onclick=function(){
    el.querySelectorAll("button").forEach(function(x){x.removeAttribute("data-on")});b.setAttribute("data-on","1");st[key]=b.dataset.v;render()}})}
